<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Holo Q · Infinite Intelligence, on your machine</title>
    <meta name="description" content="A real AI thinks entirely in your browser no server, on the hologram substrate. The model is a content-addressed κ-object verified by re-derivation; conversations persist as a self-verifying Merkle-DAG; every answer is a re-derivable inference receipt (Law L5)." />
    <meta name="theme-color" content="#08090a" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <!-- Open Graph Protocol — rich preview when the link is shared -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Holo Q" />
    <meta property="og:title" content="Holo Q Infinite Intelligence, on your machine" />
    <meta property="og:description" content="A real AI thinks in your browser on the hologram substrate no server. Conversations are content-addressed κ-objects; every answer carries a re-derivable inference receipt (Law L5)." />
    <meta property="og:image" content="icon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Holo Q Infinite Intelligence, on your machine" />
    <meta name="twitter:description" content="A real AI thinks in your browser on the hologram substrate no server. Every answer is a re-derivable inference receipt." />
    <link rel="stylesheet" href="./ui/app.css" />
    <link rel="stylesheet" href="./_shared/holo-mobile.css" />
  </head>
  <body>
    <!-- Entry splash: the shared Hologram "streaming" boot screen. ONE source of truth
         for every Holo app — only the app="…" name differs. Self-contained, offline,
         Shadow DOM; the bar auto-tracks this app's real boot time. -->
    <script src="./holo-splash.js"></script>
    <holo-splash app="Holo Q"></holo-splash>

    <div id="app" aria-live="polite"></div>
    <!-- Offline runtime (C3): register the whole-runtime service worker + a pill that, when the
         network drops, confirms the app is still thinking on your machine (no-server, made literal). -->
    <div id="offline-pill" hidden style="position:fixed;left:12px;bottom:12px;z-index:9999;display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:999px;font:600 16px/1 system-ui,sans-serif;color:#d6f5e0;background:rgba(10,30,18,.86);border:1px solid rgba(80,220,140,.35);backdrop-filter:blur(8px);box-shadow:0 4px 18px rgba(0,0,0,.4)">
      <span style="width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80"></span>
      <span id="offline-pill-text">offline · still thinking on your machine</span>
    </div>
    <script>
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(() => {});
      (function () {
        var pill = document.getElementById("offline-pill");
        var sync = function () { pill.hidden = navigator.onLine; };
        addEventListener("online", sync); addEventListener("offline", sync); sync();
      })();
    </script>
    <script src="./_shared/holo-theme.js"></script>
    <script type="module" src="./ui/boot.js"></script>
  </body>
</html>
