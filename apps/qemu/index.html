<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>QEMU Hologram OS</title>
    <!-- Cross-origin isolation: the CC-6 code module (real QEMU over the hologram
         host ABI) runs on a worker and needs SharedArrayBuffer. GitHub Pages can't
         send COOP/COEP, so this shim registers a service worker that adds them and
         reloads once. It no-ops when the headers are already present (holo-serve). -->
    <script src="coi-serviceworker.min.js"></script>
    <!-- The real terminal component (ADR-010 / CC-11): xterm.js, the pinned,
         provenance-tracked build VS Code itself uses (vv/artifacts/cc13/vendor). -->
    <link rel="stylesheet" href="/.holo/sha256/ba8e6985669488981ccf40c0cefe3aba80722cb6c92de7ad628b0bd717faf2b6.css" data-holo-shared="xterm/xterm.css" />
    <style>
      :root { color-scheme: dark; --bg: var(--holo-bg); --dim: var(--holo-ink-dim); }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: #d4d4d4; display: flex; flex-direction: column;
        font: var(--holo-text-sm, 1rem)/1.4 ui-monospace, "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace; }

      /* Thin holospace chrome — identity · κ-address · lifecycle. */
      #bar { flex: 0 0 auto; display: flex; align-items: center; gap: 0.7rem;
        padding: 0.3rem 0.8rem; background: #0d1117; border-bottom: 1px solid #1b2128;
        font-size: var(--holo-text-sm, 1rem); user-select: none; }
      #bar .name { color: #e6edf3; font-weight: 600; letter-spacing: 0.02em; }
      #bar .tag { color: var(--dim); }
      #bar .k { color: #58a6ff; word-break: break-all; }
      #bar .sp { margin-left: auto; }
      #bar .stat { color: var(--dim); font-variant-numeric: tabular-nums; }
      #bar .dot { color: #d29922; }
      #bar .dot.on { color: #3fb950; } #bar .dot.off { color: #f85149; }
      #bar button { font: inherit; color: var(--dim); background: transparent;
        border: 1px solid #1b2128; border-radius: 5px; padding: 0.15rem 0.5rem; cursor: pointer; }
      #bar button:hover { color: #e6edf3; border-color: #30363d; }

      /* The terminal fills the rest; xterm mounts into #term. */
      #stage { position: relative; flex: 1 1 auto; min-height: 0; }
      #term { position: absolute; inset: 0; padding: 0.3rem 0 0 0.4rem; }
      .xterm { height: 100%; }

      /* Pre-boot status / error panel, over the (still empty) terminal. Once QEMU
         boots the guest, this hides and the REAL serial console takes the screen. */
      #overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: var(--bg); transition: opacity 0.25s; z-index: 5; }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #panel { max-width: 42rem; padding: 1.5rem 1.75rem; }
      #panel .ttl { color: #e6edf3; font-size: 1.05rem; font-weight: 600; margin-bottom: 0.2rem; }
      #panel .sub { color: var(--dim); margin-bottom: 1.1rem; }
      #panel .status { display: flex; align-items: center; gap: 0.6rem; color: #c9d1d9; }
      #panel .spin { color: #58a6ff; font: 700 13px/1 ui-monospace, Menlo, Consolas, monospace; min-width: 1.1em; display: inline-block; }
      #panel.err .status { color: #f85149; }
      #panel.err .spin { display: none; }
      #panel .hint { margin-top: 0.8rem; color: var(--dim); white-space: pre-wrap; }
      #panel code { color: #79c0ff; background: #161b22; padding: 0.05rem 0.35rem; border-radius: 4px; }
      #toast { position: fixed; bottom: 1rem; right: 1rem; background: #161b22; border: 1px solid #30363d;
        border-radius: var(--holo-radius-sm, 8px); padding: 0.45rem 0.8rem; font-size: var(--holo-text-sm, 1rem); opacity: 0; transition: opacity 0.2s; }
      #toast.show { opacity: 1; }

      /* The find-bar (xterm search addon UI). */
      #find { position: absolute; top: 0.4rem; right: 0.6rem; z-index: 6; display: flex; align-items: center; gap: 0.25rem;
        background: #161b22; border: 1px solid #30363d; border-radius: 7px; padding: 0.25rem 0.4rem; box-shadow: 0 6px 20px rgba(0,0,0,0.45); }
      #find[hidden] { display: none; }
      #find input { background: #0d1117; color: #d4d4d4; border: 1px solid #30363d; border-radius: 5px;
        padding: 0.2rem 0.45rem; font: inherit; width: 14rem; outline: none; }
      #find input:focus { border-color: #58a6ff; }
      #find .fc { color: #6a727c; font-size: var(--holo-text-sm, 1rem); min-width: 2.6rem; text-align: right; font-variant-numeric: tabular-nums; }
      #find button { color: #8b949e; background: transparent; border: 0; cursor: pointer; padding: 0.1rem 0.35rem; border-radius: 4px; font-size: var(--holo-text-sm, 1rem); }
      #find button:hover { color: #e6edf3; background: #21262d; }
    </style>
  </head>
  <body>
    <!-- Entry splash: the shared Hologram "streaming" boot screen. ONE source of truth
         for every Holo app — only the app="…" name differs. Self-contained, offline,
         Shadow DOM; the bar auto-tracks this app's real boot time. -->
    <script src="./holo-splash.js"></script>
    <holo-splash app="QEMU"></holo-splash>

    <div id="bar">
      <span class="name">QEMU</span>
      <span class="tag">· holospace</span>
      <span class="k" id="kaddr">holo://local</span>
      <span class="tag" id="arch">x86-64 · QEMU (TCG)</span>
      <span class="sp"></span>
      <span class="stat" id="mips"></span>
      <span class="dot" id="dot">●</span>
      <span class="tag" id="state">starting</span>
      <button id="saveBtn" title="snapshot the running machine to OPFS (CC-30)">⤓ save state</button>
      <button id="rebootBtn" title="reboot the guest">⟳ reboot</button>
    </div>
    <div id="stage">
      <div id="term"></div>
      <div id="find" hidden>
        <input id="findq" type="text" placeholder="find" spellcheck="false" autocomplete="off" aria-label="find in terminal" />
        <span id="findcount" class="fc"></span>
        <button id="findprev" title="previous match (Shift+Enter)">↑</button>
        <button id="findnext" title="next match (Enter)">↓</button>
        <button id="findclose" title="close (Esc)">✕</button>
      </div>
      <div id="overlay">
        <div id="panel">
          <div class="ttl">Hologram OS <span id="ptitle">real QEMU (x86-64) as a CC-6 code module</span></div>
          <div class="sub">qemu-system-x86_64 compiled to wasm over the hologram host ABI, booted by the engine (ADR-008/009 · CC-6).</div>
          <div class="status"><span class="spin" data-holo-spin="cascade"></span><span id="pstatus">loading module…</span></div>
          <div class="hint" id="phint"></div>
        </div>
      </div>
    </div>
    <div id="toast"></div>

    <!-- The full xterm.js (5.5.0) package as pinned UMD globals: terminal core +
         the official addons that make it a complete browser-native terminal — GPU
         rendering (WebGL), clickable links, search, Unicode-11 widths, OSC-52
         clipboard. Same components VS Code's terminal ships (ADR-010). -->
    <script src="/.holo/sha256/1f991ac3b4b283ebf96e60ae23a00a52765dd3a2e46fa6fdda9f1aab032f7495.js" data-holo-shared="xterm/xterm.js"></script>
    <script src="/.holo/sha256/bdaefa370b1bfc42ee88d46fe6072400902a4d4b2d45cd93438dda9b23c97089.js" data-holo-shared="xterm/addon-fit.js"></script>
    <script src="/.holo/sha256/9ffa9ac3ff6d47d4e6216ed1972ca8e0b5336cef744f50ebdc3f67b0ed727cdb.js" data-holo-shared="xterm/addon-webgl.js"></script>
    <script src="/.holo/sha256/f230a6c8211ce4614dda5441f27b603c7c1ca95151a655bc0efac6377ee643f0.js" data-holo-shared="xterm/addon-web-links.js"></script>
    <script src="/.holo/sha256/3cf52d71d9deb4ba60125087434c53e3fb35bb2249db9b13987991fd2db1c7bd.js" data-holo-shared="xterm/addon-search.js"></script>
    <script src="/.holo/sha256/b0c3be540a9984713aea996966c24ed1a639d11f60d44986b22661e3a8a148d0.js" data-holo-shared="xterm/addon-unicode11.js"></script>
    <script src="/.holo/sha256/c3fe3f1e8be371c7b2034170c6a2e3cc1b9dbe6c9f1f283cbc17ff456ef78818.js" data-holo-shared="xterm/addon-clipboard.js"></script>
    <script type="module">
      // Braille motion frames for the boot indicator (pinned unicode-animations 1.0.3).
      import { spinners } from "./unicode-animations.js";
      const $ = (id) => document.getElementById(id);
      const params = new URLSearchParams(location.search);

      // Surface the κ this holospace was opened by, if mounted through the gateway.
      const kparam = params.get("k") || params.get("id") || params.get("addr");
      if (kparam) $("kaddr").textContent = kparam.startsWith("holo://") ? kparam : "holo://" + kparam;

      // ── the real terminal (xterm.js) ─────────────────────────────────────
      const term = new Terminal({
        allowProposedApi: true, // the unicode11 addon (activeVersion) uses proposed API
        fontFamily: 'ui-monospace, "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace',
        fontSize: 14,
        cursorBlink: true,
        cursorStyle: "block",
        scrollback: 20000,
        convertEol: false, // the guest's tty already emits CRLF — render raw
        theme: {
          background: "#0a0a0a", foreground: "#d4d4d4", cursor: "#e6edf3", cursorAccent: "#0a0a0a",
          selectionBackground: "#264f78",
          black: "#0a0a0a", red: "#ff5f56", green: "#5fd75f", yellow: "#e3b341", blue: "#5f87ff",
          magenta: "#c586c0", cyan: "#56c4d0", white: "#d4d4d4",
          brightBlack: "#6a727c", brightRed: "#ff7b72", brightGreen: "#7ee787", brightYellow: "#f2cc60",
          brightBlue: "#79c0ff", brightMagenta: "#d2a8ff", brightCyan: "#a5d6ff", brightWhite: "#ffffff",
        },
      });
      // The full addon stack — xterm's own UX, nothing hand-rolled.
      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.loadAddon(new WebLinksAddon.WebLinksAddon());        // clickable URLs
      const uni = new Unicode11Addon.Unicode11Addon();          // correct wide/emoji widths
      term.loadAddon(uni);
      term.unicode.activeVersion = "11";
      const search = new SearchAddon.SearchAddon();             // buffer search (find-bar below)
      term.loadAddon(search);
      try { term.loadAddon(new ClipboardAddon.ClipboardAddon()); } catch (_) {} // OSC-52

      term.open($("term"));

      // GPU-accelerated rendering — load after open(); fall back gracefully if the
      // WebGL context is lost or unavailable (xterm then uses its DOM renderer).
      try {
        const webgl = new WebglAddon.WebglAddon();
        webgl.onContextLoss(() => webgl.dispose());
        term.loadAddon(webgl);
      } catch (_) { /* no WebGL → DOM renderer, still fully functional */ }

      const refit = () => { try { fit.fit(); } catch (_) {} };
      refit();
      new ResizeObserver(refit).observe($("stage"));
      addEventListener("resize", refit);

      // Real terminal copy/paste + find:
      //   Ctrl+Shift+C copy · Ctrl+Shift+V paste · Ctrl+Shift+F find.
      // (Plain Ctrl+C still reaches the guest as SIGINT.)
      term.attachCustomKeyEventHandler((e) => {
        if (e.type !== "keydown" || !e.ctrlKey || !e.shiftKey) return true;
        const k = e.key.toLowerCase();
        if (k === "c") { const s = term.getSelection(); if (s) navigator.clipboard?.writeText(s); return false; }
        if (k === "v") { navigator.clipboard?.readText().then((t) => worker && worker.postMessage({ type: "stdin", data: enc.encode(t) })); return false; }
        if (k === "f") { toggleFind(true); return false; }
        return true;
      });
      $("term").addEventListener("paste", (e) => {
        const t = e.clipboardData?.getData("text"); if (t && worker) worker.postMessage({ type: "stdin", data: enc.encode(t) });
      });

      // ── find-bar (xterm search addon) ────────────────────────────────────
      const FIND_OPTS = { decorations: {
        matchBackground: "#5a4711", activeMatchBackground: "#e3b341",
        matchOverviewRuler: "#e3b341", activeMatchColorOverviewRuler: "#ff8c00" } };
      function doFind(prev) {
        const q = $("findq").value;
        if (!q) { search.clearDecorations?.(); $("findcount").textContent = ""; return; }
        if (prev) search.findPrevious(q, FIND_OPTS); else search.findNext(q, FIND_OPTS);
      }
      function toggleFind(show) {
        const el = $("find");
        const on = show === undefined ? el.hidden : show;
        el.hidden = !on;
        if (on) { $("findq").focus(); $("findq").select(); doFind(false); }
        else { search.clearDecorations?.(); $("findcount").textContent = ""; term.focus(); }
      }
      search.onDidChangeResults?.((r) => {
        $("findcount").textContent = !r || !r.resultCount ? "0/0" : `${r.resultIndex + 1}/${r.resultCount}`;
      });
      $("findq").addEventListener("input", () => doFind(false));
      $("findq").addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); doFind(e.shiftKey); }
        else if (e.key === "Escape") { e.preventDefault(); toggleFind(false); }
      });
      $("findnext").addEventListener("click", () => doFind(false));
      $("findprev").addEventListener("click", () => doFind(true));
      $("findclose").addEventListener("click", () => toggleFind(false));

      // ── overlay + chrome helpers ─────────────────────────────────────────
      const setStatus = (t) => ($("pstatus").textContent = t);
      const showOverlay = () => { $("overlay").classList.remove("hidden"); $("panel").classList.remove("err"); $("phint").textContent = ""; };
      const hideOverlay = () => $("overlay").classList.add("hidden");
      const setState = (t, cls) => { $("state").textContent = t; $("dot").className = "dot" + (cls ? " " + cls : ""); };
      const fail = (text, hint) => {
        showOverlay();
        $("panel").classList.add("err");
        setStatus(text);
        $("phint").innerHTML = hint || "";
        setState("error", "off");
      };
      let toastT;
      const toast = (m) => { const el = $("toast"); el.textContent = m; el.classList.add("show"); clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove("show"), 1800); };

      // ── boot animation (unicode-animations) ───────────────────────────────
      const ANIM = spinners[params.get("anim")] || spinners.dna;
      let animTimer = null, animFrame = 0, animLabel = "";
      function startAnim(label) {
        stopAnim();
        animLabel = label || "";
        term.write("\x1b[?25l"); // hide the cursor while the spinner owns the line
        const draw = () => {
          const f = ANIM.frames[(animFrame = (animFrame + 1) % ANIM.frames.length)];
          term.write("\r\x1b[2K\x1b[38;5;111m" + f + "\x1b[0m  \x1b[90m" + animLabel + "\x1b[0m");
        };
        draw();
        animTimer = setInterval(draw, ANIM.interval || 90);
      }
      const setAnimLabel = (t) => { animLabel = t; };
      function stopAnim(clearLine) {
        if (animTimer) { clearInterval(animTimer); animTimer = null; }
        if (clearLine) term.write("\r\x1b[2K");
        term.write("\x1b[?25h"); // restore the cursor
      }

      // ── the workload worker ──────────────────────────────────────────────
      let worker = null;
      function startWorker() {
        hideOverlay();
        $("panel").classList.remove("err");
        setState("booting", "");
        $("mips").textContent = "";
        term.reset();
        term.write("\x1b[1mHologram OS\x1b[0m \x1b[90m booting an x86-64 guest under real QEMU (CC-6 code module)\x1b[0m\r\n\r\n");
        startAnim("loading module…");
        // Forward the whole query to the worker (it reads its own location.search):
        // ?module=, ?disk=, ?machine=, ?relay=, ?mem= — and ?cb= busts the worker
        // cache alongside the page on a fresh navigation.
        const url = "./qemu-worker.js" + location.search;
        worker = new Worker(url, { type: "module" });
        worker.onmessage = onMessage;
        worker.onerror = (e) => { stopAnim(true); fail("worker failed to start", escapeHtml(e.message || String(e))); };
      }
      function onMessage(e) {
        const m = e.data;
        switch (m.type) {
          case "status": setAnimLabel(m.text); break;   // the live boot-animation label
          case "booted":
            stopAnim(true);
            term.write("\x1b[2J\x1b[H");                 // clear → the guest console owns the screen
            setState("running", "on"); term.focus();
            break;
          case "stdout":
            term.write(new Uint8Array(m.data));
            break;
          case "mips":
            $("mips").textContent = m.mips >= 0.05 ? m.mips.toFixed(1) + " MIPS" : "";
            break;
          case "suspended": toast("state saved (CC-30)"); break;
          case "halt":
            stopAnim(true);
            setState("powered off", "off");
            term.write("\r\n\x1b[90m " + (m.reason || "halted") + " · press ⟳ reboot \x1b[0m\r\n");
            break;
          case "error":
            stopAnim(true);
            fail(m.text, m.hint
              ? escapeHtml(m.hint).replace(/([\w./-]*build-qemu-wasm\.sh)/g, "<code>$1</code>")
              : "");
            break;
        }
      }
      const enc = new TextEncoder();
      term.onData((d) => worker && worker.postMessage({ type: "stdin", data: enc.encode(d) }));

      function escapeHtml(s) { return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

      $("rebootBtn").addEventListener("click", () => { if (worker) worker.terminate(); startWorker(); });
      $("saveBtn").addEventListener("click", () => { if (worker) { worker.postMessage({ type: "suspend" }); toast("snapshotting…"); } });

      // Cross-origin isolation is required for the module. The shim reloads once to
      // get it on static hosts; if we're somehow still not isolated, the boot below
      // surfaces the real failure.
      if (!self.crossOriginIsolated) setStatus("enabling cross-origin isolation…");

      // A handle for the witness / automation (the repo's window.* idiom). `send`
      // delivers raw input the way a keystroke would; `save` triggers a κ-snapshot.
      window.qemu = {
        term, fit, search, toggleFind, spinners, anim: ANIM, startAnim, stopAnim,
        send: (s) => worker && worker.postMessage({ type: "stdin", data: enc.encode(s) }),
        save: () => worker && worker.postMessage({ type: "suspend" }),
      };
      startWorker();
    </script>
      <script src="/.holo/sha256/b4dbe84b9234d9b4672a632159fc7cbafb94c0af6da7cec9eedf2c325fe1667b.js" data-holo-shared="holo-theme.js"></script>
    <script src="/.holo/sha256/92dcac0de44530fe7a198607bd3daf734e02119a3c9c1ba15b871f8fc3c0782f.js" data-holo-shared="holo-manage.js" defer></script>
  </body>
</html>
