    <style>
      :root {
        color-scheme: dark;
        /* VS Code "Dark Modern" — exact workbench tokens (microsoft/vscode theme-defaults/dark_modern) */
        --vsc-bg: #1F1F1F; --vsc-fg: #CCCCCC; --vsc-chrome: #181818; --vsc-border: #2B2B2B;
        --vsc-accent: #0078D4; --vsc-tab-active-fg: #FFFFFF; --vsc-dim: #9D9D9D;

      /* ── Workbench: activity | sidebar | main ── */
      #workbench { flex: 1 1 auto; display: grid; grid-template-columns: 48px var(--sbw) 1fr; min-height: 0; position: relative; }

      /* ── Activity bar ── */

      .file:hover { background: var(--vsc-hover); }
      .file.active { background: var(--vsc-list-active); }
      .file .fn { flex: 1; overflow: hidden; text-overflow: ellipsis; }

      .file:hover .fdel { opacity: .55; } .file .fdel:hover { opacity: 1; background: var(--vsc-border); }

      #boot { position: absolute; inset: 0; z-index: 30; background: var(--vsc-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--vsc-dim); }

      /* ── Status bar ── */
      #statusbar { height: 22px; flex: 0 0 auto; background: var(--vsc-chrome); border-top: 1px solid var(--vsc-border); color: var(--vsc-fg); display: flex; align-items: stretch; justify-content: space-between; font-size: var(--holo-text-sm, 1rem); }

      #statusbar .sb-remote { display: flex; align-items: center; padding: 0 10px; background: var(--vsc-accent); color: #fff; }
      #statusbar .k { font-family: var(--vsc-mono); color: var(--vsc-fg); max-width: 24ch; overflow: hidden; text-overflow: ellipsis; }
      #statusbar .bad { color: #F85149; } #statusbar .ok { color: var(--vsc-fg); }

      /* ── Resizers ── */
      .rz { position: absolute; z-index: 20; } .rz-v { top: 0; bottom: 0; width: 5px; cursor: col-resize; } .rz-h { left: 0; right: 0; height: 5px; cursor: row-resize; }
      .rz:hover { background: var(--vsc-accent); }

      /* ── Live co-edit presence (serverless BroadcastChannel; avatars appear only when peers join) ── */
      #statusbar #presence { display: flex; align-items: center; }
      #statusbar #presence:empty { display: none; }
      #presence .pa { width: 16px; height: 16px; border-radius: 50%; display: grid; place-items: center; font: 700 var(--holo-text-sm, 1rem) var(--vsc-ui); color: #fff; border: 1.5px solid var(--vsc-chrome); margin-left: -5px; }
      #presence .pa:first-child { margin-left: 0; }
      .rc-caret { width: 2px; height: 18px; pointer-events: none; }
      .rc-flag { position: absolute; left: 0; top: -15px; font: 600 var(--holo-text-sm, 1rem) var(--vsc-ui); color: #fff; padding: 1px 5px; border-radius: 4px 4px 4px 0; white-space: nowrap; pointer-events: none; }

      /* ── Quick Open (Ctrl+P) + Command Palette (F1 / Ctrl+Shift+P) — VS Code's quick-input ── */
      #quick { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 600px; max-width: 92%; z-index: 50; background: #252526; border: 1px solid var(--vsc-border); border-top: 0; border-radius: 0 0 6px 6px; box-shadow: 0 6px 22px #0009; display: none; flex-direction: column; }
      #quick.on { display: flex; }
      #quick input { background: #3c3c3c; color: var(--vsc-fg); border: 1px solid var(--vsc-accent); margin: 6px; padding: 5px 8px; font: var(--holo-text-sm, 1rem) var(--vsc-ui); outline: none; border-radius: 2px; }
      #quicklist { max-height: 48vh; overflow: auto; padding-bottom: 4px; }
      #quicklist .qi { padding: 4px 12px; cursor: pointer; display: flex; gap: 10px; align-items: baseline; white-space: nowrap; }
      #quicklist .qi .ql { color: var(--vsc-fg); overflow: hidden; text-overflow: ellipsis; }
      #quicklist .qi .qd { color: var(--vsc-dim); font-size: var(--holo-text-sm, 1rem); }
      #quicklist .qi.sel, #quicklist .qi:hover { background: #04395e; }
      a { color: #4daafc; }

        if (!(openPath && (openPath.endsWith(".hc") || openPath.endsWith(".c"))) || !App) { rv.innerHTML = '<span style="color:var(--vsc-dim)">Open a .hc or .html file Run renders the running object live (compiled output, or the rendered app).</span>'; return; }
        let b; try { b = await App.build(editor.getValue()); } catch (e) { rv.innerHTML = `<span class="re">✗ ${esc(e.message)}</span>`; return; }
        let html = `<div class="rk">κ ${b.kappa}${b.hit ? '  ·  <span style="color:#e2c08d">⚡ O(1) rebind (cached, no recompile)</span>' : ""}</div>`;
        try { const r = await App.run(b.kappa), x = r.exports;
          for (const name of b.exports) { const fn = x[name]; let out = "(needs args)";
            try { if (typeof fn === "function" && fn.length === 0) out = " = " + fn(); else if (name === "main" || name === "demo") out = " = " + fn(); } catch { out = "(error)"; }
            html += `<div>${esc(name)}<span class="rr">${esc(out)}</span></div>`; }
        } catch (e) { html += `<span class="re">run error: ${esc(e.message)}</span>`; }
        rv.innerHTML = html;
      }

      // ── Holo Forge: BUILD · RUN · SHARE, wired into Monaco via its own action API (ADR-0051) ──
      // editor.addAction registers each in the Command Palette (F1), the context menu, AND a keybinding
      // — the native VS Code UX. The verbs run over the content-addressed substrate (window.HoloApp):
      // build compiles → a κ, run executes the wasm, share is the κ. Output streams to the terminal.
      const M = window.monaco;
      async function holoBuildRun() {
        const App = window.HoloApp;
        term.write("\r\n\x1b[38;5;208m⚒ holo build & run\x1b[0m  " + (openPath || "") + "\r\n");
        if (!App) { term.write("\x1b[33m  build·run·share not loaded\x1b[0m\r\n"); return; }
        let b;
        try { b = await App.build(editor.getValue()); }
        catch (e) {
          term.write(`\x1b[31m  ✗ ${e.message}\x1b[0m\r\n`);
          if (e.line) { editor.revealLineInCenter(e.line); editor.setPosition({ lineNumber: e.line, column: e.col || 1 }); editor.focus(); }
          return;
        }
        term.write(`\x1b[32m  ✓ built\x1b[0m  κ ${b.kappa}\r\n  receipt ${b.receipt}\r\n  exports: ${b.exports.join(", ")}${b.hit ? "   (O(1) rebind)" : ""}\r\n`);
        window.__holoKappa = b.kappa;
        try {
          const r = await App.run(b.kappa), x = r.exports;
          const fn = ["main", "demo"].find((n) => typeof x[n] === "function") || Object.keys(x)[0];
          if (fn && typeof x[fn] === "function") term.write(`\x1b[36m  → ${fn}() = ${x[fn]()}\x1b[0m\r\n`);
        } catch (e) { term.write(`\x1b[31m  run error: ${e.message}\x1b[0m\r\n`); }
      }
      async function holoShare() {
        const App = window.HoloApp;
        if (!App) { term.write("\r\n\x1b[33m  build·run·share not loaded\x1b[0m\r\n"); return; }
        // Always share the CURRENT editor content: build it (O(1) if unchanged) so share never depends
        // on a prior Ctrl+Enter, then hand out holo://κ.
        let k = window.__holoKappa;
        try { const b = await App.build(editor.getValue()); k = b.kappa; window.__holoKappa = k; }
        catch (e) { term.write(`\r\n\x1b[31m  ✗ ${e.message}\x1b[0m\r\n`); return; }
        const s = App.share(k);
        term.write(`\r\n\x1b[36m  shared → ${s.holo}\x1b[0m  (copied; resolves anywhere, re-derived no server)\r\n`);
        try { await (navigator.clipboard && navigator.clipboard.writeText(s.holo)); } catch {}
      }
      editor.addAction({ id: "holo.buildRun", label: "Holo: Build & Run (Holo-C → WebAssembly)",
        keybindings: [M.KeyMod.CtrlCmd | M.KeyCode.Enter], contextMenuGroupId: "navigation", contextMenuOrder: 1.5, run: holoBuildRun });
      editor.addAction({ id: "holo.share", label: "Holo: Share build (holo://κ)",
        contextMenuGroupId: "navigation", contextMenuOrder: 1.6, run: holoShare });
      // Go to Definition (F12): this Monaco build doesn't ship the built-in revealDefinition action,
      // so wire it explicitly to the same lookup the DefinitionProvider uses (jump to `int name(`).
      editor.addAction({ id: "holo.gotoDef", label: "Go to Definition", keybindings: [M.KeyCode.F12],
        contextMenuGroupId: "navigation", contextMenuOrder: 1.3, run: (ed) => {
          const pos = ed.getPosition(), model = ed.getModel(), w = model.getWordAtPosition(pos); if (!w) return;
          const text = model.getValue(), idx = text.search(new RegExp("^\\s*int\\s+" + w.word + "\\s*\\(", "m")); if (idx < 0) return;
          const line = text.slice(0, idx).split("\n").length, col = model.getLineContent(line).indexOf(w.word) + 1;
          ed.setPosition({ lineNumber: line, column: col }); ed.revealLineInCenter(line); ed.focus();
        } });
      window.__holoActions = true;
      window.__editor = editor;
      // Unambiguous title-bar buttons wired DIRECTLY to the handlers — no menu/palette to mis-target
      // (the native UX, and reliable for the in-browser Claude extension to click).
      $("hbtn-run").onclick = holoBuildRun;
      $("hbtn-share").onclick = holoShare;

      // ── Theme toggle (light / dark) — Monaco's own setTheme ──
      let themeDark = true;
      $("hbtn-theme").onclick = () => { themeDark = !themeDark; window.monaco.editor.setTheme(themeDark ? "holo-modern" : "vs"); };

      // ── Global search across all workspace files (Ctrl+Shift+F) ──
      function toggleSearch() { setView("search"); }
      function runSearch() {
        const q = $("searchq").value.trim(); const res = $("searchres"); res.innerHTML = ""; $("searchcount").textContent = "";
        if (!q) return;
        const list = JSON.parse(ws.files()); let n = 0; const rows = [];
        for (const f of list) {
          const text = new TextDecoder().decode(ws.read_path(f.path) || new Uint8Array());
          text.split("\n").forEach((ln, i) => {
            if (ln.toLowerCase().includes(q.toLowerCase())) { n++; const name = f.path.split("/").pop();
              rows.push(`<div class="sr" data-p="${f.path}" data-l="${i + 1}"><b>${name}:${i + 1}</b>  ${esc(ln.trim()).slice(0, 120)}</div>`); }
          });
        }
        $("searchcount").textContent = `${n} result${n === 1 ? "" : "s"} in ${list.length} files`;
        res.innerHTML = rows.join("");
        res.querySelectorAll(".sr").forEach((el) => el.onclick = () => { openFile(el.dataset.p); const l = +el.dataset.l; editor.revealLineInCenter(l); editor.setPosition({ lineNumber: l, column: 1 }); editor.focus(); });
      }
      $("hbtn-find").onclick = toggleSearch;
      $("searchq").oninput = runSearch;
      window.addEventListener("keydown", (e) => { if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === "F" || e.key === "f")) { e.preventDefault(); toggleSearch(); } });

      // ── Quick Open (Ctrl+P) + Command Palette (F1 / Ctrl+Shift+P) — VS Code's two defining moves, over
      // the same content-addressed file set + the holospace's own verbs. One lean shared quick-input. ──
      const COMMANDS = [
        { label: "Holo: Build & Run", hint: "mod+Enter", run: () => holoBuildRun() },
        { label: "Holo: Share (holo://κ)", run: () => holoShare() },
        { label: "File: New File", run: () => newFile() },
        { label: "Go to File…", hint: "mod+P", run: () => openQuick("files") },
        { label: "View: Close Editor", hint: "mod+W", run: () => openPath && closeTab(openPath) },
        { label: "Search: Find in Files", hint: "mod+Shift+F", run: () => setView("search") },
        { label: "Go to Symbol in Editor…", hint: "mod+Shift+O", run: () => openQuick("symbols") },
        { label: "Format Document", hint: "Shift+Alt+F", run: () => { const a = editor.getAction("editor.action.formatDocument"); if (a) a.run(); } },
        { label: "Rename Symbol", hint: "F2", run: () => { const a = editor.getAction("editor.action.rename"); if (a) a.run(); } },
        { label: "Go to References", hint: "Shift+F12", run: () => { const a = editor.getAction("editor.action.referenceSearch.trigger") || editor.getAction("editor.action.goToReferences"); if (a) a.run(); } },
        { label: "View: Explorer", run: () => setView("explorer") },
        { label: "View: Object Graph", run: () => showView("graph") },
        { label: "View: Run Preview", run: () => showView("run") },
        { label: "View: Terminal", run: () => showView("term") },
        { label: "View: Problems", run: () => showView("problems") },
        { label: "Preferences: Toggle Color Theme", run: () => $("hbtn-theme").click() },
      ];
      let quickSel = 0;
      function renderQuick(filter) {
        const f = (filter || "").toLowerCase();
        const matches = (renderQuick._items || []).filter((it) => (it.label + " " + (it.detail || "")).toLowerCase().includes(f));
        quickSel = Math.max(0, Math.min(quickSel, matches.length - 1));
        $("quicklist")._matches = matches;
        $("quicklist").innerHTML = matches.length
          ? matches.map((it, i) => `<div class="qi ${i === quickSel ? "sel" : ""}" data-i="${i}"><span class="ql">${esc(it.label)}</span>${it.detail ? `<span class="qd">${esc(it.detail)}</span>` : ""}${it.hint ? `<span class="qd" style="margin-left:auto">${esc(kbd(it.hint))}</span>` : ""}</div>`).join("")
          : '<div class="qi"><span class="qd">No matching results</span></div>';
        for (const el of $("quicklist").querySelectorAll(".qi[data-i]")) el.onclick = () => pickQuick(+el.dataset.i);
        const sel = $("quicklist").querySelector(".qi.sel"); if (sel) sel.scrollIntoView({ block: "nearest" });
      }
      function pickQuick(i) { const m = $("quicklist")._matches || []; const it = m[i]; closeQuick(); if (it && it.run) it.run(); }
      function closeQuick() { $("quick").classList.remove("on"); editor.focus(); }
      async function openQuick(mode) {
        if (mode === "symbols") {
          const syms = (await langReq("symbols", { text: editor.getValue() })) || [];
          renderQuick._items = syms.map((s) => ({ label: s.name, detail: s.detail || "function", run: () => { const p = editor.getModel().getPositionAt(s.selStart); editor.setPosition(p); editor.revealLineInCenter(p.lineNumber); editor.focus(); } }));
        } else {
          renderQuick._items = mode === "files"
            ? JSON.parse(ws.files()).map((f) => ({ label: baseName(f.path), detail: f.path, run: () => openFile(f.path) }))
            : COMMANDS;
        }
        quickSel = 0; $("quick").classList.add("on");
        const q = $("quickq"); q.value = ""; q.placeholder = mode === "files" ? "Go to File by name…" : mode === "symbols" ? "Go to Symbol… (functions)" : "Type a command…";
        renderQuick(""); q.focus();
      }
      $("quickq").oninput = (e) => { quickSel = 0; renderQuick(e.target.value); };
      $("quickq").onkeydown = (e) => {
        const m = $("quicklist")._matches || [];
        if (e.key === "ArrowDown") { e.preventDefault(); quickSel = Math.min(quickSel + 1, m.length - 1); renderQuick($("quickq").value); }
        else if (e.key === "ArrowUp") { e.preventDefault(); quickSel = Math.max(quickSel - 1, 0); renderQuick($("quickq").value); }
        else if (e.key === "Enter") { e.preventDefault(); pickQuick(quickSel); }
        else if (e.key === "Escape") { e.preventDefault(); closeQuick(); }
      };
      // Window-level capture so the chords work whether or not Monaco holds focus.
      window.addEventListener("keydown", (e) => {
        const k = (e.key || "").toLowerCase(), open = $("quick").classList.contains("on"), mod = e.ctrlKey || e.metaKey;
        if (mod && k === "p" && !e.shiftKey) { e.preventDefault(); e.stopPropagation(); if (!open) openQuick("files"); }
        else if ((mod && e.shiftKey && k === "p") || e.key === "F1") { e.preventDefault(); e.stopPropagation(); if (!open) openQuick("commands"); }
        else if (mod && e.shiftKey && k === "o") { e.preventDefault(); e.stopPropagation(); if (!open) openQuick("symbols"); }
      }, true);

      // ── Resizable: sidebar↔editor and editor↔panel (VS Code-style), driven by CSS variables ──
      const wb = $("workbench"), mainEl = $("main"); let sbW = 256, ph = 220;
      const rzv = document.createElement("div"); rzv.className = "rz rz-v";
      const rzh = document.createElement("div"); rzh.className = "rz rz-h";
      wb.appendChild(rzv); mainEl.appendChild(rzh);
      function applyLayout() {
        document.documentElement.style.setProperty("--sbw", sbW + "px");
        document.documentElement.style.setProperty("--ph", ph + "px");
        rzv.style.left = (48 + sbW - 2) + "px";
        rzh.style.bottom = (ph - 2) + "px";
        try { fit.fit(); } catch {}
      }
      applyLayout();
      function drag(handle, onMove) { handle.addEventListener("mousedown", (e) => { e.preventDefault(); document.body.style.userSelect = "none"; const mm = (ev) => onMove(ev); const mu = () => { removeEventListener("mousemove", mm); removeEventListener("mouseup", mu); document.body.style.userSelect = ""; }; addEventListener("mousemove", mm); addEventListener("mouseup", mu); }); }
      const wbRect = () => wb.getBoundingClientRect(), mRect = () => mainEl.getBoundingClientRect();
      drag(rzv, (e) => { sbW = Math.max(170, Math.min(600, e.clientX - wbRect().left - 48)); applyLayout(); });
      drag(rzh, (e) => { ph = Math.max(80, Math.min(mRect().height - 120, mRect().bottom - e.clientY)); applyLayout(); });

      // ── LIVE CO-EDIT PRESENCE — serverless, UOR-native real-time human↔agent collaboration. Peers in the
      // same holospace (browser panes/tabs + the in-browser agent) share cursors, selections and edits over a
      // zero-server BroadcastChannel; every peer converges to the SAME content address (κ) — convergence is
      // verifiable by re-derivation (Law L5), not just CRDT bookkeeping. Degrades to solo if unavailable.
      const coedit = (() => {
        const PAL = ["#0078D4", "#E2C08D", "#3FB950", "#F778BA", "#A371F7", "#FF7B72", "#56D4DD"];
        const q = new URLSearchParams(location.search);
        const roomId = q.get("id") || "local";
        const me = { id: Math.random().toString(36).slice(2, 8), name: q.get("user") || "You", kind: "human", color: PAL[0] };
        const peers = new Map();
        const styled = new Set();
        let ch = null, applyingRemote = false;
        try { ch = new BroadcastChannel("holo-coedit:" + roomId); } catch {}
        const styleEl = document.createElement("style"); document.head.appendChild(styleEl);
        const post = (type, extra) => { if (ch) try { ch.postMessage({ type, from: { id: me.id, name: me.name, kind: me.kind, color: me.color }, ...extra }); } catch {} };
        const ensurePeerStyle = (p) => { if (styled.has(p.id)) return; styled.add(p.id); styleEl.textContent += `.rc-sel-${p.id}{background:${p.color}33;border-radius:2px}`; };
        function makeCursor(p) {
          const node = document.createElement("div"); node.className = "rc-caret"; node.style.background = p.color;
          const flag = document.createElement("div"); flag.className = "rc-flag"; flag.style.background = p.color; flag.textContent = p.name; node.appendChild(flag);
          const widget = { getId: () => "rc-" + p.id, getDomNode: () => node, getPosition: () => p.position ? { position: p.position, preference: [Mu.editor.ContentWidgetPositionPreference.EXACT] } : null };
          editor.addContentWidget(widget);
          return { widget, decos: editor.createDecorationsCollection([]) };
        }
        function dropCursor(p) { if (p.cursor) { try { editor.removeContentWidget(p.cursor.widget); p.cursor.decos.clear(); } catch {} p.cursor = null; } }
        function renderCursor(p) {
          if (p.path !== openPath || !p.position) return dropCursor(p);
          if (!p.cursor) p.cursor = makeCursor(p);
          editor.layoutContentWidget(p.cursor.widget); ensurePeerStyle(p);
          const s = p.selection;
          if (s && (s.startLineNumber !== s.endLineNumber || s.startColumn !== s.endColumn)) p.cursor.decos.set([{ range: new Mu.Range(s.startLineNumber, s.startColumn, s.endLineNumber, s.endColumn), options: { className: "rc-sel-" + p.id } }]);
          else p.cursor.decos.clear();
        }
        function touch(from) { let p = peers.get(from.id); if (!p) { p = { ...from, seen: Date.now(), cursor: null }; peers.set(from.id, p); renderPresence(); } else { p.name = from.name; p.color = from.color; p.kind = from.kind; p.seen = Date.now(); } return p; }
        function applyRemote(fn) { applyingRemote = true; try { fn(); } catch {} applyingRemote = false; updateKappa(); lintNow(); if (activeView === "graph") renderGraph(); else if (activeView === "run") runPreview(); }
        function renderPresence() {
          const el = $("presence"); if (!el) return;
          const others = [...peers.values()]; if (!others.length) { el.innerHTML = ""; return; }   // solo → no clutter
          el.innerHTML = [me, ...others].map((p) => `<span class="pa" title="${esc(p.name)}${p.kind === "agent" ? " · agent" : ""}" style="background:${p.color}">${esc((p.name[0] || "?").toUpperCase())}</span>`).join("");
        }
        if (ch) ch.onmessage = (ev) => {
          const d = ev.data; if (!d || !d.from || d.from.id === me.id) return;
          const p = touch(d.from);
          if (d.type === "hello") { post("welcome"); if (openPath && models.has(openPath)) post("snapshot", { path: openPath, text: editor.getValue() }); }
          else if (d.type === "bye") { dropCursor(p); peers.delete(p.id); renderPresence(); }
          else if (d.type === "cursor") { p.path = d.path; p.position = d.position; p.selection = d.selection; renderCursor(p); }
          else if (d.type === "ops" && d.path === openPath) { const m = editor.getModel(); if (m) applyRemote(() => m.applyEdits((d.changes || []).map((c) => ({ range: new Mu.Range(c.range.startLineNumber, c.range.startColumn, c.range.endLineNumber, c.range.endColumn), text: c.text })))); }
          else if (d.type === "snapshot" && d.path === openPath) { const m = editor.getModel(); if (m && m.getValue() !== d.text) applyRemote(() => m.pushEditOperations([], [{ range: m.getFullModelRange(), text: d.text }], () => null)); }
          else if (d.type === "sync-req" && models.has(d.path)) post("snapshot", { path: d.path, text: models.get(d.path).getValue() });
        };
        setInterval(() => { const now = Date.now(); let changed = false; for (const p of [...peers.values()]) if (now - p.seen > 12000) { dropCursor(p); peers.delete(p.id); changed = true; } if (changed) renderPresence(); post("hello"); }, 5000);
        addEventListener("beforeunload", () => post("bye"));
        post("hello"); if (openPath) post("sync-req", { path: openPath }); renderPresence();
        return {
          get applyingRemote() { return applyingRemote; },
          broadcastOps: (path, changes) => { if (!peers.size) return; post("ops", { path, changes: changes.map((c) => ({ range: c.range, text: c.text })) }); },   // zero overhead when solo
          broadcastCursor: (path, sel) => { if (!peers.size) return; post("cursor", { path, position: { lineNumber: sel.positionLineNumber, column: sel.positionColumn }, selection: { startLineNumber: sel.startLineNumber, startColumn: sel.startColumn, endLineNumber: sel.endLineNumber, endColumn: sel.endColumn } }); },
          requestSync: (path) => post("sync-req", { path }),
          onFileSwitch: () => { for (const p of peers.values()) renderCursor(p); },
          join: ({ name, kind, color } = {}) => { if (name) me.name = name; if (kind) me.kind = kind; if (color) me.color = color; post("hello"); renderPresence(); },
          peers: () => [...peers.values()], me: () => ({ ...me }),
          setCursor: (path, line, column) => post("cursor", { path, position: { lineNumber: line, column }, selection: null }),
          applyEdit: (path, text) => { const m = models.get(path); if (!m) return false; applyingRemote = true; try { m.pushEditOperations([], [{ range: m.getFullModelRange(), text }], () => null); } catch {} applyingRemote = false; post("snapshot", { path, text }); if (path === openPath) { updateKappa(); lintNow(); } return true; },
        };
      })();
      window.HoloCoedit = coedit;
      // Immediate presence relay (separate from the debounced lint/save): broadcast edits + cursor as they happen.
      editor.onDidChangeModelContent((e) => { if (!coedit.applyingRemote) coedit.broadcastOps(openPath, e.changes); });
      editor.onDidChangeCursorSelection((e) => coedit.broadcastCursor(openPath, e.selection));

      window.__ready = true;
    </script>
