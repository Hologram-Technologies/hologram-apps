<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Holo Control the telemetry monitoring & control command center</title>
    <meta name="description" content="A single-pane command center for Hologram OS: a birds-eye view of every external connection (app · agent · resource · human · wallet) as a governable graph edge, with live signal-over-noise monitoring, a verifiable telemetry stream, and one-click power to throttle, restrict, pause or cut any of it. Consumes Holo Telemetry (ADR-0073); local-first, verify-don't-trust, calm by default." />
    <link rel="stylesheet" href="/_shared/holo-theme.css" data-holo-shared="holo-theme.css" />
    <link rel="stylesheet" href="/_shared/holo-mobile.css" data-holo-shared="holo-mobile.css" />
    <link rel="stylesheet" href="/_shared/holo-phi.css" data-holo-shared="holo-phi.css" />
    <style>
      :root {
        color-scheme: dark;
        --bg: var(--holo-bg); --panel: var(--holo-surface); --panel2: var(--holo-surface-2);
        --line: var(--holo-border); --dim: var(--holo-ink-dim); --ink: var(--holo-ink);
        --accent: var(--holo-accent); --ok: var(--holo-ok); --warn: var(--holo-warn); --bad: var(--holo-danger);
        /* the signal temperature scale, derived from the theme (no hardcoded colour): calm → hot */
        --calm: var(--dim); --t2: var(--accent);
        --t3: color-mix(in srgb, var(--warn) 65%, var(--accent)); --t4: var(--bad);
        --r: var(--holo-radius, 12px); --rl: var(--holo-radius-lg, 18px);
        --pill: var(--holo-radius-pill, 999px);
        --mono: var(--holo-font-mono, ui-monospace, "Cascadia Code", Menlo, Consolas, monospace);
        --sans: var(--holo-font-sans, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif);
        /* type scale bound to the OS ramp (holo-mobile.css --holo-text*) so every size
           tracks the one --holo-font-scale lever; the local rems are fallbacks only */
        --fs-label: var(--holo-text-sm, .9rem); --fs-body: var(--holo-text, 1rem);
        --fs-sub: var(--holo-text, .98rem); --fs-h: var(--holo-text-lg, 1.15rem);
        --fs-stat: var(--holo-text-xl, 1.7rem); --fs-hero: calc(var(--holo-text-xl, 2.125rem) * 1.22);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: var(--ink); overflow: hidden;
        font: var(--fs-body)/var(--holo-leading-moderate, 1.5) var(--sans);
        display: grid; grid-template-rows: auto 1fr; grid-template-columns: auto 1fr auto;
        grid-template-areas: "top top top" "rail stage inspector"; }
      .mono { font-family: var(--mono); }
      button { font: inherit; color: inherit; }
      ::-webkit-scrollbar { width: 10px; height: 10px; } ::-webkit-scrollbar-thumb { background: var(--line); border-radius: var(--pill); }

      /* ── TOP BAR: brand · SNR hero · big stats · telemetry-live · isolate ─────────────── */
      #top { grid-area: top; display: flex; align-items: center; gap: 1.4rem; padding: .7rem 1.1rem;
        background: var(--panel); border-bottom: 1px solid var(--line); user-select: none; }
      .brand { display: inline-flex; align-items: center; gap: .6rem; font-weight: var(--holo-weight-bold, 700); font-size: var(--fs-h); letter-spacing: .01em; white-space: nowrap; }
      .brand .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--ok);
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--ok) 60%, transparent); animation: pulse 2.6s ease-out infinite; }
      .brand .dot.alert { background: var(--bad); }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, currentColor 18%, transparent); } 70%,100% { box-shadow: 0 0 0 11px transparent; } }

      /* SNR hero gauge */
      #hero { display: inline-flex; align-items: center; gap: .8rem; }
      #hero .ring { width: 58px; height: 58px; flex: 0 0 auto; }
      #hero .num { display: flex; flex-direction: column; line-height: 1.05; }
      #hero .num b { font-size: var(--fs-hero); font-weight: var(--holo-weight-extrabold, 800); font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
      #hero .num span { font-size: var(--fs-label); color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }

      #stats { display: flex; gap: .9rem; }
      .stat { display: flex; flex-direction: column; gap: 2px; min-width: 92px; }
      .stat .v { font-size: var(--fs-stat); font-weight: var(--holo-weight-bold, 700); font-family: var(--mono); font-variant-numeric: tabular-nums; line-height: 1.1; }
      .stat .l { font-size: var(--fs-label); color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
      .stat.alert .v { color: var(--bad); }
      #top .sp { margin-left: auto; }

      .telpill { display: inline-flex; align-items: center; gap: .5rem; padding: .45rem .8rem; cursor: pointer;
        background: var(--panel2); border: 1px solid var(--line); border-radius: var(--pill); font-size: var(--fs-sub); }
      .telpill .d { width: 9px; height: 9px; border-radius: 50%; background: var(--ok); animation: pulse 2.6s ease-out infinite; }
      .telpill .d.off { background: var(--dim); animation: none; }
      .telpill .tp { color: var(--dim); font-family: var(--mono); font-size: var(--fs-label); }
      .isolate { display: inline-flex; align-items: center; gap: .5rem; padding: .55rem 1rem; cursor: pointer; font-size: var(--fs-sub); font-weight: var(--holo-weight-semibold, 600);
        background: color-mix(in srgb, var(--bad) 12%, transparent); color: var(--bad);
        border: 1px solid color-mix(in srgb, var(--bad) 40%, var(--line)); border-radius: var(--r); }
      .isolate:hover { background: color-mix(in srgb, var(--bad) 22%, transparent); }

      /* ── LEFT RAIL ────────────────────────────────────────────────────────────────── */
      #rail { grid-area: rail; display: flex; flex-direction: column; gap: 6px; padding: .9rem .7rem;
        background: var(--panel); border-right: 1px solid var(--line); width: 224px; }
      .lens { display: flex; align-items: center; gap: .75rem; padding: .7rem .8rem; cursor: pointer; font-size: var(--fs-sub);
        background: transparent; border: 1px solid transparent; border-radius: var(--r); text-align: left; width: 100%; color: var(--dim); }
      .lens:hover { background: var(--panel2); color: var(--ink); }
      .lens.on { background: color-mix(in srgb, var(--accent) 16%, transparent); border-color: color-mix(in srgb, var(--accent) 35%, var(--line)); color: var(--ink); font-weight: var(--holo-weight-semibold, 600); }
      .lens .ic { display: inline-flex; color: var(--accent); }
      .lens .meta { margin-left: auto; font-family: var(--mono); font-size: var(--fs-label); color: var(--dim); }
      .lens .meta.alert { color: var(--bad); font-weight: var(--holo-weight-bold, 700); }
      #rail .grow { flex: 1; }
      #rail .note { font-size: var(--fs-label); color: var(--dim); padding: .5rem .6rem; line-height: 1.5; border-top: 1px solid var(--line); }

      /* ── STAGE ────────────────────────────────────────────────────────────────────── */
      #stage { grid-area: stage; position: relative; overflow: hidden; display: flex; flex-direction: column; }
      .stagehd { display: flex; align-items: center; gap: .7rem; padding: .8rem 1.1rem; border-bottom: 1px solid var(--line); }
      .stagehd h2 { margin: 0; font-size: var(--fs-h); font-weight: var(--holo-weight-semibold, 600); }
      .stagehd .tools { margin-left: auto; display: flex; align-items: center; gap: .6rem; }
      .seg { display: inline-flex; background: var(--panel2); border: 1px solid var(--line); border-radius: var(--pill); padding: 3px; }
      .seg button { border: none; background: transparent; color: var(--dim); padding: .35rem .8rem; border-radius: var(--pill); cursor: pointer; font-size: var(--fs-label); }
      .seg button.on { background: color-mix(in srgb, var(--accent) 22%, transparent); color: var(--ink); }
      .ghost { border: 1px solid var(--line); background: var(--panel2); color: var(--ink); padding: .45rem .85rem; border-radius: var(--r); cursor: pointer; font-size: var(--fs-label); display: inline-flex; gap: .4rem; align-items: center; }
      .ghost:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }
      .view { flex: 1; min-height: 0; overflow: auto; }
      svg#orbit { width: 100%; height: 100%; display: block; }

      .empty { height: 100%; display: grid; place-items: center; text-align: center; padding: 2rem; }
      .empty .inner { max-width: 40ch; }
      .empty .big { font-size: var(--holo-text-lg, 1.5rem); color: var(--ink); margin-bottom: .5rem; font-weight: var(--holo-weight-semibold, 600); }
      .empty .hint { color: var(--dim); line-height: 1.6; }

      /* cards */
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .9rem; padding: 1.1rem; }
      .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--rl); padding: 1rem 1.1rem;
        cursor: pointer; display: flex; flex-direction: column; gap: .6rem; transition: border-color .2s, transform .12s; }
      .card:hover { border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); transform: translateY(-1px); }
      .card.alert { border-color: color-mix(in srgb, var(--bad) 50%, var(--line)); }
      .card .hd { display: flex; align-items: center; gap: .6rem; }
      .card .hd .ic { color: var(--accent); display: inline-flex; }
      .card .hd .name { font-weight: var(--holo-weight-semibold, 600); font-size: var(--fs-h); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .card .hd .badge { margin-left: auto; }
      .card .sub { font-size: var(--fs-label); color: var(--dim); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .card .row { display: flex; align-items: center; gap: .55rem; font-size: var(--fs-sub); color: var(--dim); }
      .spark { width: 100%; height: 34px; display: block; }

      .badge { display: inline-flex; align-items: center; gap: 5px; font-size: var(--fs-label); font-family: var(--mono);
        padding: 3px 10px; border-radius: var(--pill); border: 1px solid var(--line); color: var(--dim); white-space: nowrap; }
      .badge.signal { color: var(--t2); border-color: color-mix(in srgb, var(--t2) 45%, var(--line)); }
      .badge.alert { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 50%, var(--line)); }
      .badge.cut, .badge.throttled, .badge.restricted, .badge.paused { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 45%, var(--line)); }
      .badge.cut { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 55%, var(--line)); }
      .dot-k { width: 9px; height: 9px; border-radius: 50%; background: var(--calm); flex: 0 0 auto; }

      /* flows */
      .flow { display: grid; grid-template-columns: 1fr auto 1fr; gap: .6rem 1.6rem; padding: 1.3rem; align-items: start; }
      .flow .col h3 { margin: 0 0 .7rem; font-size: var(--fs-label); text-transform: uppercase; letter-spacing: .08em; color: var(--dim); }
      .flow .hub { align-self: center; text-align: center; color: var(--accent); display: flex; flex-direction: column; gap: .4rem; align-items: center; }
      .bar { display: grid; gap: 5px; margin-bottom: .8rem; cursor: pointer; }
      .bar .t { display: flex; justify-content: space-between; gap: .6rem; font-size: var(--fs-sub); }
      .bar .t .n { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .bar .t .v { font-family: var(--mono); color: var(--dim); }
      .bar .track { height: 10px; background: var(--panel2); border-radius: var(--pill); overflow: hidden; }
      .bar .track > i { display: block; height: 100%; border-radius: var(--pill); background: var(--t2); transition: width .4s ease; }
      .bar.egress .track > i { background: var(--t3); } .bar.alert .track > i { background: var(--bad); }

      /* telemetry stream */
      .stream { display: flex; flex-direction: column; gap: .55rem; padding: 1.1rem; }
      .sig { display: flex; align-items: center; gap: .8rem; padding: .8rem 1rem; background: var(--panel); border: 1px solid var(--line);
        border-radius: var(--rl); animation: rise .35s ease; }
      @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .sig .tag { font-size: var(--fs-label); font-family: var(--mono); text-transform: uppercase; padding: 3px 9px; border-radius: var(--pill);
        border: 1px solid var(--line); color: var(--dim); flex: 0 0 auto; }
      .sig .tag.span { color: var(--t2); border-color: color-mix(in srgb, var(--t2) 40%, var(--line)); }
      .sig .tag.metric { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, var(--line)); }
      .sig .tag.trace { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 50%, var(--line)); background: color-mix(in srgb, var(--accent) 10%, transparent); }
      .sig .tag.log { color: var(--dim); }
      .sig .tag.system { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); background: color-mix(in srgb, var(--accent) 9%, transparent); }
      .sig .tag.notice { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 45%, var(--line)); background: color-mix(in srgb, var(--ok) 9%, transparent); }
      .sig .nm { font-weight: var(--holo-weight-semibold, 600); }
      .sig .kx { font-family: var(--mono); color: var(--accent); font-size: var(--fs-label); cursor: copy; }
      .sig .sp { margin-left: auto; }
      .sig .split { font-size: var(--fs-label); }
      .split .rd { color: var(--ok); } .split .at { color: var(--warn); }
      .verify { border: 1px solid var(--line); background: var(--panel2); color: var(--ink); padding: .4rem .8rem; border-radius: var(--r); cursor: pointer; font-size: var(--fs-label); display: inline-flex; gap: .4rem; align-items: center; }
      .verify:hover { border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
      .verify.ok { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 50%, var(--line)); background: color-mix(in srgb, var(--ok) 12%, transparent); }
      .verify.bad { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 50%, var(--line)); }

      /* ── INSPECTOR ────────────────────────────────────────────────────────────────── */
      #inspector { grid-area: inspector; width: 0; overflow: hidden; background: var(--panel);
        border-left: 1px solid var(--line); transition: width .24s ease; display: flex; flex-direction: column; }
      #inspector.open { width: 380px; }
      #inspector .ihd { padding: 1rem 1.1rem; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: .6rem; font-size: var(--fs-h); font-weight: var(--holo-weight-semibold, 600); }
      #inspector .ihd .x { margin-left: auto; cursor: pointer; color: var(--dim); background: none; border: none; font-size: var(--holo-text-lg, 1.4rem); line-height: 1; }
      #inspector .body { padding: 1.1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.1rem; }
      .field { display: flex; flex-direction: column; gap: 5px; }
      .field .k { font-size: var(--fs-label); text-transform: uppercase; letter-spacing: .06em; color: var(--dim); }
      .field .v { font-size: var(--fs-sub); word-break: break-word; }
      .field .v.mono { font-family: var(--mono); }
      .timeline { width: 100%; height: 76px; display: block; background: var(--panel2); border: 1px solid var(--line); border-radius: var(--r); }
      .controls { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
      .ctl { padding: .8rem; border-radius: var(--r); border: 1px solid var(--line); background: var(--panel2);
        cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: var(--fs-sub); }
      .ctl:hover { border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
      .ctl .ic { color: var(--accent); display: inline-flex; }
      .ctl.cut { color: var(--bad); } .ctl.cut .ic { color: var(--bad); }
      .ctl.cut:hover { background: color-mix(in srgb, var(--bad) 12%, transparent); }
      .ctl[aria-pressed="true"] { background: color-mix(in srgb, var(--warn) 18%, transparent); border-color: var(--warn); color: var(--warn); }
      .ctl[aria-pressed="true"] .ic { color: var(--warn); }
      .receipts { display: flex; flex-direction: column; gap: 7px; }
      .receipts .r { display: flex; align-items: center; gap: .5rem; padding: .55rem .7rem; background: var(--panel2); border-radius: var(--r); font-size: var(--fs-label); }
      .receipts .r .kx { color: var(--accent); font-family: var(--mono); margin-left: auto; cursor: copy; }

      /* modal + toast */
      #scrim { position: fixed; inset: 0; background: color-mix(in srgb, var(--bg) 72%, transparent);
        display: none; place-items: center; z-index: 50; backdrop-filter: blur(3px); }
      #scrim.show { display: grid; }
      .modal { background: var(--panel); border: 1px solid var(--line); border-radius: var(--rl); padding: 1.4rem 1.5rem;
        max-width: 460px; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 16px 60px color-mix(in srgb, var(--bg) 55%, transparent); }
      .modal h3 { margin: 0; font-size: var(--fs-h); }
      .modal .blast { color: var(--dim); line-height: 1.6; }
      .modal .acts { display: flex; gap: .7rem; justify-content: flex-end; }
      .modal .acts button { padding: .6rem 1.1rem; border-radius: var(--r); border: 1px solid var(--line); background: var(--panel2); cursor: pointer; font-size: var(--fs-sub); }
      .modal .acts .go { background: color-mix(in srgb, var(--bad) 16%, transparent); color: var(--bad); border-color: color-mix(in srgb, var(--bad) 45%, var(--line)); font-weight: var(--holo-weight-semibold, 600); }
      #toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px); opacity: 0;
        background: var(--panel); border: 1px solid var(--line); border-radius: var(--r); padding: .8rem 1.2rem; font-size: var(--fs-sub);
        z-index: 60; transition: all .25s ease; display: flex; align-items: center; gap: .6rem; box-shadow: 0 8px 30px color-mix(in srgb, var(--bg) 50%, transparent); }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      #toast .kx { color: var(--accent); font-family: var(--mono); font-size: var(--fs-label); }

      @media (prefers-reduced-motion: reduce) { *, ::before, ::after { animation: none !important; transition: none !important; } }
      @media (max-width: 900px) { #rail { width: 64px; } .lens .label, .lens .meta, #rail .note { display: none; } #stats, #hero .num span { display: none; } #inspector.open { width: 100vw; position: absolute; inset: 0; } }
    </style>
  </head>
  <body>
    <!-- Entry splash: the shared Hologram "streaming" boot screen. ONE source of truth
         for every Holo app — only the app="…" name differs. Self-contained, offline,
         Shadow DOM; the bar auto-tracks this app's real boot time. -->
    <script src="./holo-splash.js"></script>
    <holo-splash app="Holo Control"></holo-splash>

    <header id="top">
      <span class="brand"><span class="dot" id="health"></span> Holo Control</span>
      <div id="hero">
        <svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
          <circle cx="18" cy="18" r="15.5" fill="none" stroke="var(--line)" stroke-width="3"></circle>
          <circle id="snrArc" cx="18" cy="18" r="15.5" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"
            stroke-dasharray="0 100" transform="rotate(-90 18 18)"></circle>
        </svg>
        <span class="num"><b id="snrNum"></b><span>signal / noise</span></span>
      </div>
      <div id="stats"></div>
      <span class="sp"></span>
      <button class="telpill" id="telpill" title="telemetry runtime status · click to copy the active W3C traceparent">
        <span class="d off" id="telDot"></span><span>telemetry</span><span class="tp" id="telTp">offline</span>
      </button>
      <button class="isolate" id="isolate" title="Cut all cross-origin egress (confirm)"><span id="isoIc"></span> Isolate</button>
    </header>

    <nav id="rail"></nav>

    <main id="stage">
      <div class="stagehd"><h2 id="stageTitle">Signal</h2><div class="tools" id="stageTools"></div></div>
      <div class="view" id="view"></div>
    </main>

    <aside id="inspector">
      <div class="ihd"><span id="iName"></span><button class="x" id="iClose">✕</button></div>
      <div class="body" id="iBody"></div>
    </aside>

    <div id="scrim"><div class="modal" id="modal"></div></div>
    <div id="toast"></div>

    <!-- shared runtime: theme engine (injects holo-ux.js, holo-fx.js, holo-telemetry.mjs) -->
    <script src="/_shared/holo-theme.js" data-holo-shared="holo-theme.js"></script>
    <!-- the app -->
    <script type="module" src="./script.js"></script>
  </body>
</html>
