<!doctype html>
<html lang="en" data-holo-kappa-auto="off" data-holo-boot="off">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Holo v86</title>
    <style>
      /* font-logos (public-domain / OFL) — real free-licensed OS marks rendered as sharp vector glyphs */
      @font-face { font-family: "font-logos"; font-display: swap; src: url("./vendor/font-logos/font-logos.woff2") format("woff2"); }
      :root { color-scheme: dark; --bg:#080a0d; --panel:#0d1117; --side:#0b0e13; --dim:#9aa6b2;
        --line:#1c232c; --acc:#5aa2ff; --ok:#46d27a; --amber:#e3a93b; --txt:#eef3f8; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: #cfd8e3; display: flex; flex-direction: column; overflow: hidden;
        font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }

      #body { flex: 1 1 auto; display: flex; min-height: 0; height: 100%; }
      .brand { font-weight: 750; color: var(--txt); font-size: 1.2rem; letter-spacing: 0.01em; }
      .brand b { color: var(--acc); font-weight: 750; }
      #sidehead { display: flex; flex-direction: column; gap: 0.55rem; padding: 0.2rem 0.3rem 0.8rem; }
      #count { color: var(--dim); font-size: 0.9rem; font-variant-numeric: tabular-nums; }
      #search { background: #0a0d12; border: 1px solid var(--line); border-radius: 10px; color: var(--txt);
        padding: 0.5rem 0.8rem; font: inherit; font-size: 0.95rem; width: 100%; }
      #search::placeholder { color: #5b6776; }
      #search:focus { outline: none; border-color: var(--acc); }

      /* ── sidebar (clean, large) ─────────────────────────────── */
      #side { flex: 0 0 19rem; background: var(--side); border-right: 1px solid var(--line);
        overflow-y: auto; padding: 0.8rem 0.7rem; }
      #chips { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0 0.3rem 0.8rem; }
      .chip { font-size: 0.9rem; color: var(--dim); background: transparent; border: 1px solid var(--line);
        border-radius: 999px; padding: 0.3rem 0.8rem; cursor: pointer; user-select: none; }
      .chip.on { color: #06140f; background: var(--acc); border-color: var(--acc); font-weight: 650; }

      .os { display: flex; align-items: center; gap: 0.7rem; width: 100%; text-align: left; cursor: pointer;
        background: transparent; border: 1px solid transparent; border-radius: 12px; padding: 0.7rem 0.8rem; color: inherit; }
      .os:hover { background: #11161d; }
      .os.sel { background: #14233a; border-color: #25406a; }
      .os .dot { width: 9px; height: 9px; border-radius: 50%; background: #3a4350; flex: 0 0 auto; }
      .os.ready .dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
      .os .nm { font-size: 1.02rem; font-weight: 600; color: var(--txt); flex: 1 1 auto; }
      .os .fam { font-size: 0.85rem; color: var(--dim); flex: 0 0 auto; }
      .os .lock { font-size: 0.85rem; color: var(--amber); flex: 0 0 auto; }

      /* ── stage + monitor ─────────────────────────────────── */
      #stage { flex: 1 1 auto; position: relative; min-width: 0; display: flex; flex-direction: column;
        background: radial-gradient(120% 90% at 50% 35%, #10151c 0%, #07090c 70%); overflow: hidden; }
      #ambient { position: absolute; inset: 0; pointer-events: none; z-index: 0;
        background: radial-gradient(45% 38% at 50% 42%, rgba(90,162,255,0.16), transparent 70%); filter: blur(8px); }
      /* Three.js 3D world behind the monitor — never intercepts input. */
      #bd { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; display: block; pointer-events: none; }
      .scenes { display: flex; gap: 0.35rem; }
      .scenes button { font: inherit; font-size: 0.84rem; color: var(--dim); background: #0d1117; border: 1px solid var(--line);
        border-radius: 8px; padding: 0.3rem 0.6rem; cursor: pointer; }
      .scenes button.on { color: var(--txt); border-color: var(--acc); background: #122033; }

      .toolbar { position: relative; z-index: 3; display: flex; align-items: center; gap: 0.6rem;
        padding: 0.35rem 0.9rem; }
      .toolbar .osname { font-weight: 650; color: var(--txt); font-size: 1.05rem; }
      .toolbar .sp { margin-left: auto; }
      .skins { display: flex; gap: 0.35rem; }
      .skins button { font: inherit; font-size: 0.86rem; color: var(--dim); background: #0d1117;
        border: 1px solid var(--line); border-radius: 8px; padding: 0.3rem 0.7rem; cursor: pointer; }
      .skins button:hover { color: var(--txt); border-color: #2a3340; }
      .skins button.on { color: var(--txt); border-color: var(--acc); background: #122033; }
      .tool { width: 40px; height: 36px; display: grid; place-items: center; font-size: 1rem; color: var(--dim);
        background: #0d1117; border: 1px solid var(--line); border-radius: 9px; cursor: pointer; }
      .tool:hover { color: var(--txt); border-color: #2a3340; }
      .tool.on { color: var(--txt); border-color: var(--acc); background: #122033; }
      #obj3dBtn { width: auto; padding: 0 0.6rem; font-size: 0.84rem; font-weight: 600; }
      #obj3dExit { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); z-index: 9; font: inherit; font-size: 0.9rem;
        font-weight: 600; color: var(--txt); background: rgba(12,18,28,0.72); backdrop-filter: blur(8px);
        border: 1px solid var(--acc); border-radius: 999px; padding: 0.5rem 1.1rem; cursor: pointer; box-shadow: 0 6px 24px rgba(0,0,0,0.5);
        opacity: 0.92; transition: opacity 0.2s, transform 0.2s; }
      #obj3dExit:hover { opacity: 1; transform: translateX(-50%) scale(1.04); }
      #obj3dExit[hidden] { display: none; }

      .rig { flex: 1 1 auto; display: grid; place-items: center; min-height: 0; padding: 0 1vw 0.6vw; position: relative; z-index: 1; }

      /* monitor skeleton — driven by per-skin CSS vars */
      .monitor { --bezel:#15171b; --bezel2:#0c0d10; --edge:rgba(255,255,255,.06); --pad:14px; --outer:16px;
        --screenr:8px; --scan:0; --tintc:transparent; --tinta:0; --glow:rgba(90,162,255,.25); --chin:0px;
        display: flex; flex-direction: column; align-items: center; max-width: 100%; max-height: 100%; }
      .bezel { position: relative; padding: var(--pad); padding-bottom: calc(var(--pad) + var(--chin));
        border-radius: var(--outer); background: linear-gradient(160deg, var(--bezel), var(--bezel2));
        box-shadow: 0 1px 0 var(--edge) inset, 0 -2px 6px rgba(0,0,0,.5) inset,
          0 30px 60px -20px rgba(0,0,0,.8), 0 0 90px -30px var(--glow); max-width: 100%; }
      /* Screen fills the viewport: the larger of the two 4:3 boxes that fit the available width and
         height. --rh = sidebar + bezel reserve · --rv = toolbar + bezel + stand reserve. */
      .screen { --rh: 21rem; --rv: 132px; position: relative; aspect-ratio: 4/3; height: auto;
        width: min(calc(100vw - var(--rh)), calc((100vh - var(--rv)) * 4 / 3));
        background: #000; border-radius: var(--screenr); overflow: hidden;
        box-shadow: 0 0 0 2px rgba(0,0,0,.6) inset; }
      #vm { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #000; display: none; }
      .screen .crt { position: absolute; inset: 0; pointer-events: none; z-index: 4; opacity: var(--scan);
        background:
          radial-gradient(120% 120% at 50% 50%, transparent 58%, rgba(0,0,0,.45) 100%),
          repeating-linear-gradient(to bottom, rgba(0,0,0,.16) 0 1px, transparent 1px 3px); }
      .screen .tint { position: absolute; inset: 0; pointer-events: none; z-index: 3;
        background: var(--tintc); opacity: var(--tinta); mix-blend-mode: screen; }
      .screen .glass { position: absolute; inset: 0; pointer-events: none; z-index: 5;
        background: linear-gradient(125deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.02) 18%, transparent 40%); }

      .led { position: absolute; right: 18px; bottom: calc(var(--pad) * 0.5); width: 7px; height: 7px;
        border-radius: 50%; background: var(--led, #46d27a); box-shadow: 0 0 9px var(--led, #46d27a); z-index: 6; }
      .badge { position: absolute; left: 0; right: 0; bottom: calc(var(--pad) * 0.28); text-align: center;
        font: 700 0.78rem/1 ui-sans-serif, system-ui; letter-spacing: 0.22em; color: var(--badgec, rgba(255,255,255,.28));
        text-shadow: 0 1px 0 rgba(255,255,255,.12); z-index: 6; }
      .stand { width: var(--standw, 30%); height: var(--standh, 26px); margin-top: -2px;
        background: linear-gradient(180deg, var(--bezel), var(--bezel2)); border-radius: 0 0 10px 10px;
        box-shadow: 0 14px 24px -12px rgba(0,0,0,.8); display: var(--standd, block); }
      .base { width: var(--basew, 46%); height: 10px; border-radius: 999px; margin-top: 4px;
        background: linear-gradient(180deg, var(--bezel), var(--bezel2)); box-shadow: 0 16px 26px -14px rgba(0,0,0,.85);
        display: var(--standd, block); }

      /* ── skins ─────────────────────────────────────────────── */
      .m-flat   { --bezel:#15171b; --bezel2:#0a0b0d; --pad:10px; --outer:14px; --screenr:6px; --scan:0; --standw:14%; --standh:30px; --basew:34%; --badgec:rgba(255,255,255,.18); }
      .m-crt    { --bezel:#dcd3c0; --bezel2:#b3a589; --edge:rgba(255,255,255,.4); --pad:30px; --outer:26px; --screenr:26px; --scan:0.5; --glow:rgba(120,200,255,.22); --standw:54%; --standh:34px; --basew:64%; --badgec:rgba(60,50,35,.55); --led:#65d6ff; }
      .m-mac    { --bezel:#e7dcc6; --bezel2:#c4b594; --edge:rgba(255,255,255,.45); --pad:26px; --chin:54px; --outer:20px; --screenr:14px; --scan:0.45; --standd:none; --badgec:rgba(70,58,40,.6); --led:#5fd0a0; }
      .m-imac   { --bezel:rgba(80,150,200,.42); --bezel2:rgba(20,70,110,.55); --edge:rgba(255,255,255,.6); --pad:26px; --outer:40px; --screenr:22px; --scan:0.4; --glow:rgba(90,200,255,.4); --standd:none; --badgec:rgba(255,255,255,.7); --led:#9fe7ff; }
      .m-trinitron { --bezel:#1a1c1f; --bezel2:#0a0b0c; --edge:rgba(255,255,255,.08); --pad:22px; --outer:14px; --screenr:12px; --scan:0.55; --glow:rgba(120,170,255,.18); --standw:50%; --standh:30px; --basew:60%; --badgec:rgba(255,255,255,.5); --led:#8fd0ff; }
      .m-amber  { --bezel:#101113; --bezel2:#050506; --edge:rgba(255,180,80,.10); --pad:24px; --outer:16px; --screenr:14px; --scan:0.7; --tintc:#ff9b1a; --tinta:0.10; --glow:rgba(255,160,40,.30); --standw:46%; --standh:30px; --basew:56%; --badgec:rgba(255,170,70,.6); --led:#ffb43b; }
      .m-imac .bezel { backdrop-filter: blur(4px); }
      /* CRT scanlines/tint/curvature are now rendered on the GPU inside the OS frame (holo-v86-screen) —
         disable the CSS overlays so they don't double up. The bezel + glass glare stay (chrome, not screen). */
      .screen .crt, .screen .tint { display: none; }

      /* Fullscreen: the monitor fills the display, OS screen maximized, a thin uniform bezel hugging it. */
      #monitor:fullscreen, #monitor:-webkit-full-screen { width: 100vw; height: 100vh; max-width: none; max-height: none;
        background: #000; justify-content: center; }
      #monitor:fullscreen .bezel, #monitor:-webkit-full-screen .bezel { padding: 14px; border-radius: 16px; }
      #monitor:fullscreen .stand, #monitor:fullscreen .base, #monitor:fullscreen .badge,
      #monitor:-webkit-full-screen .stand, #monitor:-webkit-full-screen .base, #monitor:-webkit-full-screen .badge { display: none; }
      #monitor:fullscreen .screen, #monitor:-webkit-full-screen .screen {
        width: min(calc(100vw - 28px), calc((100vh - 28px) * 4 / 3)); }

      /* ── on-screen panels (welcome / precompile) ───────────── */
      .panel { position: absolute; inset: 0; z-index: 2; display: none; place-items: center; padding: 6%;
        background: radial-gradient(120% 120% at 50% 40%, #0e131a, #05070a); color: #c3ccd6; text-align: center; }
      .panel.on { display: grid; }
      .panel .big { font-size: clamp(1.1rem, 2.4vw, 1.7rem); font-weight: 700; color: var(--txt); margin-bottom: 0.5rem; }
      .panel .big b { color: var(--acc); }
      .panel p { margin: 0.4rem auto; max-width: 30rem; font-size: 1rem; color: var(--dim); }
      .panel code { background: #11161d; border: 1px solid var(--line); border-radius: 7px; padding: 0.2rem 0.55rem;
        color: #dbe4ee; font: 0.95rem ui-monospace, Menlo, Consolas, monospace; }

      /* ── Welcome: a powered-on, hyper-real idle screen ─────────────────────────────── */
      #welcome { background: radial-gradient(130% 130% at 50% 34%, #0b1119 0%, #05070c 58%, #030407 100%); overflow: hidden; }
      .w-inner { position: relative; display: flex; flex-direction: column; align-items: center; gap: 0.55rem; }
      .w-glow { position: absolute; inset: -50% -35%; z-index: -1; pointer-events: none;
        background: radial-gradient(closest-side, rgba(90,162,255,0.22), transparent 70%); filter: blur(22px);
        animation: w-breathe 7s ease-in-out infinite; }
      @keyframes w-breathe { 0%,100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.14); } }
      .w-mark { font-size: clamp(2rem, 5.4vw, 3.6rem); font-weight: 800; letter-spacing: 0.01em; color: #eef3f8;
        display: inline-flex; align-items: baseline; text-shadow: 0 0 34px rgba(90,162,255,0.35); }
      .w-mark b { color: var(--acc); font-weight: 800; }
      .w-cursor { display: inline-block; width: 0.46em; height: 1.0em; margin-left: 0.18em; border-radius: 2px;
        background: var(--acc); box-shadow: 0 0 16px var(--acc); transform: translateY(0.06em); animation: w-blink 1.1s steps(1) infinite; }
      @keyframes w-blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
      .w-sub { font-size: clamp(0.95rem, 1.7vw, 1.2rem); color: #a7bacf; letter-spacing: 0.09em; }
      .w-hint { margin-top: 0.3rem; font-size: 0.92rem; color: #5d6b7d; }
      .w-hint kbd { font: inherit; color: #9fb3c9; background: #11161d; border: 1px solid var(--line);
        border-radius: 5px; padding: 0.05rem 0.4rem; }
      .w-by { margin-top: 1.7rem; font: 700 0.72rem/1 ui-monospace, Menlo, Consolas, monospace; letter-spacing: 0.34em;
        color: #5a6b80; display: inline-flex; align-items: center; gap: 0.55rem; }
      .w-by b { color: #93b8ea; letter-spacing: 0.26em; }
      .w-by::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--ok);
        box-shadow: 0 0 9px var(--ok); animation: w-breathe 2.6s ease-in-out infinite; }

      /* ── 3D gallery: the god-view of every machine, floating in deep space ─────────────── */
      #side { display: none; }                       /* the gallery replaces the flat sidebar */
      #gallery { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; perspective: 1600px;
        background: radial-gradient(150% 120% at 50% 28%, #0b1119 0%, #05070c 52%, #020305 100%);
        transition: opacity 0.55s ease, transform 0.55s ease; }
      #gallery.hide { opacity: 0; transform: scale(1.18); pointer-events: none; }   /* fly INTO the chosen machine */
      #g-top { display: flex; align-items: center; gap: 1.1rem; padding: 1rem 1.6rem; z-index: 3; }
      #g-top .brand { font-weight: 800; font-size: 1.35rem; color: var(--txt); letter-spacing: 0.01em;
        text-shadow: 0 0 26px rgba(90,162,255,0.3); } #g-top .brand b { color: var(--acc); }
      #g-search { margin-left: auto; background: #0a0d12; border: 1px solid var(--line); border-radius: 11px;
        color: var(--txt); padding: 0.55rem 0.95rem; width: 17rem; font: inherit; font-size: 0.95rem; }
      #g-search:focus { outline: none; border-color: var(--acc); }
      #g-count { color: var(--dim); font-size: 0.9rem; font-variant-numeric: tabular-nums; }
      #g-chips { display: flex; gap: 0.4rem; padding: 0 1.6rem 0.4rem; z-index: 3; flex-wrap: wrap; }
      .g-chip { font-size: 0.85rem; color: var(--dim); background: transparent; border: 1px solid var(--line);
        border-radius: 999px; padding: 0.28rem 0.8rem; cursor: pointer; }
      .g-chip.on { color: #06140f; background: var(--acc); border-color: var(--acc); font-weight: 650; }
      #g-scroll { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 1.5vh 5vw 2vh; }
      #g-world { transform-style: preserve-3d; transition: transform 0.3s ease-out; will-change: transform; }
      #g-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.7rem 1.5rem;
        transform-style: preserve-3d; }
      .tile { cursor: pointer; transform: translateZ(0); transition: transform 0.22s ease, opacity 0.4s; }
      .tile:hover { transform: translateZ(70px); }
      .tile .scr { aspect-ratio: 4/3; border-radius: 11px; position: relative; overflow: hidden; display: grid; place-items: center;
        background: linear-gradient(165deg, #0e151f, #06090e); border: 1px solid #18222e;
        box-shadow: 0 18px 44px -18px #000, 0 0 0 7px #0a0e13, 0 0 0 8px #05070a, 0 0 50px -14px rgba(90,162,255,0.12); }
      .tile.ready .scr { box-shadow: 0 18px 44px -16px #000, 0 0 0 7px #0a0e13, 0 0 0 8px #05070a, 0 0 60px -10px rgba(90,162,255,0.4); }
      .tile .scr .cover { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
      .tile .nm { font-weight: 700; color: #dbe6f2; font-size: 1.02rem; text-align: center; padding: 0.5rem;
        text-shadow: 0 0 18px rgba(90,162,255,0.35); }
      .tile:not(.ready) { opacity: 0.42; }
      .tile:not(.ready) .nm { text-shadow: none; color: #8a97a6; }
      .tile .dot { position: absolute; top: 9px; left: 9px; width: 8px; height: 8px; border-radius: 50%; background: #39424f; }
      .tile.ready .dot { background: var(--ok); box-shadow: 0 0 9px var(--ok); }
      .tile .cap { margin-top: 0.5rem; display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--dim); padding: 0 0.2rem; }
      .tile .cap .fam { color: #6b7a8c; }
      #g-by { text-align: center; padding: 0.8rem; font: 700 0.72rem/1 ui-monospace, Menlo, monospace; letter-spacing: 0.34em; color: #5a6b80; }
      #g-by b { color: #93b8ea; letter-spacing: 0.26em; }
      @media (prefers-reduced-motion: reduce) { .tile, #g-world, #gallery { transition: none; } .tile:hover { transform: none; } }
      /* WebGPU deep-substrate backdrop sits behind the gallery; content rides above it. */
      #g-bg { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; display: block; }
      #g-top, #g-chips, #g-scroll, #g-by, #g-meta { position: relative; z-index: 2; }
      #g-meta { text-align: center; font: 600 0.74rem/1.5 ui-monospace, Menlo, Consolas, monospace; letter-spacing: 0.05em;
        color: #6b7c90; padding: 0.1rem 1rem; }
      #g-meta b { color: #9fc2f0; font-weight: 700; }

      @media (max-width: 820px) { #side { flex-basis: 13rem; } .screen { --rh: 15rem; } }
    </style>
    <!-- Three.js (UMD → window.THREE) for the 3D worlds behind the monitor. -->
    <script src="./vendor/three.min.js"></script>
  </head>
  <body>
    <script src="./holo-splash.js"></script>
    <holo-splash app="Holo v86"></holo-splash>

    <!-- The god-view: every machine floating in deep space. Pick one to fly into it. -->
    <div id="gallery">
      <canvas id="g-bg"></canvas>
      <div id="g-top">
        <span class="brand">Holo&nbsp;<b>v86</b></span>
        <input id="g-search" placeholder="Search operating systems…" autocomplete="off" />
        <span id="g-count">—</span>
      </div>
      <div id="g-chips"></div>
      <div id="g-scroll"><div id="g-world"><div id="g-grid"></div></div></div>
      <div id="g-meta"></div>
      <div id="g-by">POWERED BY <b>HOLOGRAM&nbsp;OS</b></div>
    </div>

    <div id="body">
      <aside id="side">
        <div id="sidehead">
          <span class="brand">Holo&nbsp;<b>v86</b></span>
          <input id="search" placeholder="Search…" autocomplete="off" />
          <span id="count">—</span>
        </div>
        <div id="chips"></div>
        <div id="list"></div>
      </aside>

      <main id="stage">
        <canvas id="bd"></canvas>
        <div id="ambient"></div>
        <div class="toolbar">
          <span class="osname" id="osname">Select an operating system</span>
          <span class="sp"></span>
          <div class="scenes" id="scenes" title="3D world behind the monitor"></div>
          <div class="skins" id="skins"></div>
          <button class="tool" id="obj3dBtn" title="Orbit the machine in 3D (graphical OS)">🧊 3D</button>
          <button class="tool" id="rebootBtn" title="Reboot">⟳</button>
          <button class="tool" id="fsBtn" title="Fullscreen">⛶</button>
          <button class="tool" id="menuBtn" title="Back to menu">⌂</button>
        </div>
        <div class="rig">
          <div class="monitor m-crt" id="monitor">
            <div class="bezel">
              <div class="screen" id="screen">
                <iframe id="vm" allowfullscreen allow="cross-origin-isolated; clipboard-write; pointer-lock; fullscreen; keyboard-map"></iframe>
                <div class="tint"></div>
                <div class="crt"></div>
                <div class="glass"></div>
                <div class="panel on" id="welcome">
                  <div class="w-inner">
                    <div class="w-glow"></div>
                    <div class="w-mark">Holo&nbsp;<b>v86</b><span class="w-cursor"></span></div>
                    <div class="w-sub">every machine, one substrate</div>
                    <div class="w-hint">select a system to power on · <kbd>click</kbd> to take control</div>
                    <div class="w-by">POWERED BY <b>HOLOGRAM&nbsp;OS</b></div>
                  </div>
                </div>
                <div class="panel" id="precompile">
                  <div>
                    <div class="big" id="pc-name"></div>
                    <p id="pc-note"></p>
                    <p><code id="pc-cmd"></code></p>
                  </div>
                </div>
              </div>
              <div class="badge" id="badge">HOLOTRON</div>
              <div class="led"></div>
            </div>
            <div class="stand"></div>
            <div class="base"></div>
          </div>
        </div>
      </main>
    </div>

    <script type="module">
      import * as Backdrop from "./backdrop.mjs";
      import { coverSVG } from "./covers.mjs";
      const el = (id) => document.getElementById(id);
      let CAT = [], filter = "All", q = "", selected = null;
      let bdStarted = false, bdOK = false;

      const SKINS = [
        { id: "m-flat",      name: "Flat",      badge: "HOLO",     crt: { sharp: 4.5, curve: 0.000, scan: 0.00, mask: 0.00, maskType: 2, bloom: 0.10, vignette: 0.00, tintAmt: 0, tint: [1, 1, 1], bright: 1.00 } },
        { id: "m-crt",       name: "CRT",       badge: "HOLOTRON", crt: { sharp: 3.0, curve: 0.0, scan: 0.18, mask: 0.10, maskType: 2, bloom: 0.25, vignette: 0.18, tintAmt: 0, tint: [1, 1, 1], bright: 1.30 } },
        { id: "m-mac",       name: "Macintosh", badge: "holo",     crt: { sharp: 3.5, curve: 0.0, scan: 0.14, mask: 0.07, maskType: 2, bloom: 0.16, vignette: 0.14, tintAmt: 0, tint: [1, 1, 1], bright: 1.22 } },
        { id: "m-imac",      name: "iMac",      badge: "iHolo",    crt: { sharp: 4.0, curve: 0.0, scan: 0.10, mask: 0.05, maskType: 2, bloom: 0.20, vignette: 0.10, tintAmt: 0, tint: [1, 1, 1], bright: 1.16 } },
        { id: "m-trinitron", name: "Trinitron", badge: "HOLOTRON", crt: { sharp: 4.5, curve: 0.0, scan: 0.16, mask: 0.18, maskType: 1, bloom: 0.18, vignette: 0.12, tintAmt: 0, tint: [1, 1, 1], bright: 1.30 } },
        { id: "m-amber",     name: "Amber",     badge: "VT-HOLO",  crt: { sharp: 3.5, curve: 0.0, scan: 0.28, mask: 0.10, maskType: 2, bloom: 0.32, vignette: 0.22, tintAmt: 0.95, tint: [1.0, 0.72, 0.22], bright: 1.35 } },
      ];
      let curSkin = null;
      function postCRT() { const vm = el("vm"); if (vm && vm.contentWindow && curSkin) { try { vm.contentWindow.postMessage({ type: "holo-crt", profile: curSkin.crt }, "*"); } catch (_) {} } }
      const monitor = el("monitor");
      function applySkin(id) {
        const s = SKINS.find((x) => x.id === id) || SKINS[1];
        monitor.className = "monitor " + s.id;
        el("badge").textContent = s.badge;
        for (const b of el("skins").children) b.classList.toggle("on", b.dataset.skin === s.id);
        try { localStorage.setItem("holo-v86-skin", s.id); } catch (_) {}
        curSkin = s; postCRT();                 // push this skin's CRT profile to the booted OS (live)
      }
      function buildSkins() {
        for (const s of SKINS) { const b = document.createElement("button"); b.textContent = s.name; b.dataset.skin = s.id;
          b.addEventListener("click", () => applySkin(s.id)); el("skins").appendChild(b); }
        let saved = "m-crt"; try { saved = localStorage.getItem("holo-v86-skin") || saved; } catch (_) {}
        applySkin(saved);
      }

      const matchFamily = (o) => filter === "All"
        || (filter === "Linux" && /Linux/.test(o.family)) || (filter === "BSD" && o.family === "BSD")
        || (filter === "DOS" && o.family === "DOS") || (filter === "Other" && !/Linux|BSD|DOS/.test(o.family));
      const matchQ = (o) => !q || (o.name + " " + o.family + " " + o.notes).toLowerCase().includes(q);

      async function probeReady(o) {
        try { const r = await fetch(`/apps/${o.id}/index.html`, { method: "HEAD", cache: "no-store" }); o.ready = r.ok; }
        catch { o.ready = false; }
      }
      function render() {
        const list = el("list"); list.innerHTML = "";
        for (const o of CAT.filter((x) => matchFamily(x) && matchQ(x))) {
          const b = document.createElement("button");
          b.className = "os" + (o.ready ? " ready" : "") + (selected === o.id ? " sel" : "");
          b.innerHTML = `<span class="dot"></span><span class="nm">${o.name}</span>` +
            (o.ready ? `<span class="fam">${o.family}</span>` : `<span class="lock">locked</span>`);
          b.addEventListener("click", () => select(o));
          list.appendChild(b);
        }
        el("count").textContent = `${CAT.filter((o) => o.ready).length} ready · ${CAT.length} cataloged`;
        renderGallery();
        try { document.fonts.load('48px "font-logos"').then(renderGallery).catch(() => {}); } catch (_) {}   // repaint once the logo font is ready
      }
      // The 3D god-view: a tile per machine, floating in space; click flies into it.
      function renderGallery() {
        const grid = el("g-grid"); if (!grid) return; grid.innerHTML = "";
        for (const o of CAT.filter((x) => matchFamily(x) && matchQ(x))) {
          const t = document.createElement("div");
          t.className = "tile" + (o.ready ? " ready" : "");
          t.innerHTML = `<div class="scr">${coverSVG(o)}<span class="dot"></span></div>` +
            `<div class="cap"><span>${o.ready ? o.medium : "locked"}</span><span class="fam">${o.family}</span></div>`;
          t.addEventListener("click", () => enterOS(o));
          grid.appendChild(t);
        }
        const gc = el("g-count"); if (gc) gc.textContent = `${CAT.filter((o) => o.ready).length} ready · ${CAT.length} machines`;
      }
      function startBackdrop() {
        if (bdStarted) return; bdStarted = true;
        if (!Backdrop.available()) { bdOK = false; return; }
        bdOK = true;
        let saved = "galactic"; try { saved = localStorage.getItem("holo-v86-theme") || saved; } catch (_) {}
        Backdrop.start(el("bd"), saved).then(() => markScene(saved)).catch((e) => { console.warn("backdrop:", e); bdOK = false; });
      }
      function markScene(id) { for (const b of el("scenes").children) b.classList.toggle("on", b.dataset.scene === id); }
      // fly into the chosen machine + bring its 3D world alive (warp surge on entry)
      function enterOS(o) { el("gallery").classList.add("hide"); startBackdrop(); Backdrop.play(); if (Backdrop.boost) Backdrop.boost(); select(o); }
      const showPanel = (which) => { for (const id of ["welcome", "precompile"]) el(id).classList.toggle("on", id === which); };

      function select(o) {
        selected = o.id; render(); el("osname").textContent = o.name;
        if (o.ready) {
          el("vm").onload = () => { postCRT(); setTimeout(postCRT, 700); };   // apply the CRT skin once the OS frame loads
          el("vm").style.display = "block"; el("vm").src = `/apps/${o.id}/index.html`; showPanel(null);
        } else {
          el("vm").style.display = "none"; el("vm").src = "about:blank";
          el("pc-name").innerHTML = `${o.name} — <b style="color:var(--amber)">not precompiled</b>`;
          const pending = /^#/.test(o.cmd || "");
          el("pc-note").textContent = pending
            ? `This is a ${o.format} build — its adapter is on the roadmap.`
            : `Precompile it (${o.format}), restart the dev server, reload — it flips to ● ready:`;
          el("pc-cmd").textContent = o.cmd || `node tools/holo-v86-ingest.mjs ${o.id}`;
          showPanel("precompile");
        }
      }

      el("menuBtn").addEventListener("click", () => {
        exit3d();
        Backdrop.pause(); el("gallery").classList.remove("hide"); el("vm").src = "about:blank"; el("vm").style.display = "none"; selected = null; render(); showPanel("welcome");
      });
      (function buildScenes() {
        const names = { galactic: "Galactic", bridge: "Bridge", improbability: "Improbability" };
        if (!Backdrop.available()) { const s = el("scenes"); if (s) s.style.display = "none"; return; }
        for (const id of Backdrop.THEMES) { const b = document.createElement("button"); b.textContent = names[id] || id; b.dataset.scene = id;
          b.addEventListener("click", () => { startBackdrop(); Backdrop.setTheme(id); markScene(id); }); el("scenes").appendChild(b); }
      })();
      el("rebootBtn").addEventListener("click", () => { const s = el("vm").src; if (s && s !== "about:blank") { el("vm").src = "about:blank"; setTimeout(() => (el("vm").src = s), 60); } });
      el("fsBtn").addEventListener("click", () => { (monitor.requestFullscreen ? monitor : el("screen")).requestFullscreen?.(); });
      // ── 3D object mode (stage 1: orbit the live machine; view-only) ──────────────────
      let obj3dOn = false;
      const exitBtn = document.createElement("button");                     // floating "⎋ Esc — exit 3D" affordance
      exitBtn.id = "obj3dExit"; exitBtn.type = "button"; exitBtn.textContent = "⎋ Esc — exit 3D"; exitBtn.hidden = true;
      document.body.appendChild(exitBtn);
      async function grabGuestCanvas() {
        for (let i = 0; i < 30; i++) {
          try { const d = el("vm").contentDocument; if (d) { const c = d.querySelector("#screen canvas:not(#gl)"); if (c && c.width > 1 && c.height > 1) return c; } } catch (_) {}
          await new Promise((r) => setTimeout(r, 200));
        }
        return null;
      }
      async function enter3d() {
        if (obj3dOn || !Backdrop.available()) return;
        startBackdrop(); Backdrop.play();
        const cv = await grabGuestCanvas();
        if (!cv) { el("osname").textContent = "3D view needs a graphical OS (this one is text-mode)"; return; }
        obj3dOn = true; Backdrop.setObjectMode(true, cv);
        const bd = el("bd"); bd.style.zIndex = "5"; bd.style.pointerEvents = "auto";   // scene on top; CSS monitor runs underneath as the live texture source
        el("obj3dBtn").classList.add("on"); exitBtn.hidden = false;
      }
      function exit3d() {
        if (!obj3dOn) return;
        obj3dOn = false; Backdrop.setObjectMode(false);
        const bd = el("bd"); bd.style.zIndex = "0"; bd.style.pointerEvents = "none";
        el("obj3dBtn").classList.remove("on"); exitBtn.hidden = true;
      }
      el("obj3dBtn").addEventListener("click", () => (obj3dOn ? exit3d() : enter3d()));
      exitBtn.addEventListener("click", exit3d);
      window.addEventListener("keydown", (e) => { if (e.key === "Escape" && obj3dOn) { e.preventDefault(); exit3d(); } });
      el("search").addEventListener("input", (e) => { q = e.target.value.toLowerCase().trim(); render(); });
      el("g-search").addEventListener("input", (e) => { q = e.target.value.toLowerCase().trim(); render(); });
      (function buildGChips() {
        for (const f of ["All", "Linux", "BSD", "DOS", "Other"]) {
          const c = document.createElement("span"); c.className = "g-chip" + (f === "All" ? " on" : ""); c.textContent = f;
          c.addEventListener("click", () => { filter = f; for (const x of el("g-chips").children) x.classList.toggle("on", x.textContent === f); render(); });
          el("g-chips").appendChild(c);
        }
      })();
      (function parallax() {                                   // subtle camera tilt = depth + "stepping in" feel
        const sc = el("g-scroll"), w = el("g-world"); if (!sc || !w) return;
        sc.addEventListener("mousemove", (e) => { const r = sc.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width - 0.5, y = (e.clientY - r.top) / r.height - 0.5;
          w.style.transform = `rotateY(${x * 7}deg) rotateX(${-y * 6}deg)`; });
        sc.addEventListener("mouseleave", () => { w.style.transform = "rotateY(0deg) rotateX(0deg)"; });
      })();

      function buildChips() {
        for (const f of ["All", "Linux", "BSD", "DOS", "Other"]) {
          const c = document.createElement("span"); c.className = "chip" + (f === "All" ? " on" : ""); c.textContent = f;
          c.addEventListener("click", () => { filter = f; for (const x of el("chips").children) x.classList.toggle("on", x.textContent === f); render(); });
          el("chips").appendChild(c);
        }
      }

      buildSkins(); buildChips();
      (async () => {
        const cat = await (await fetch("./catalog.json", { cache: "no-store" })).json();
        CAT = cat.os; render();
        await Promise.all(CAT.map(probeReady)); render();
      })();
      // WebGPU deep-substrate backdrop — additive; the CSS gradient stays if WebGPU is unavailable.
      (async () => { try { const G = (await import("/_shared/holo-gallery-gpu.js")).default; await G.ready;
        if (G.gpuAvailable()) { const bg = G.createBackdrop(el("g-bg")); if (bg) bg.start(); } } catch (e) { console.warn("gallery backdrop:", e); } })();
      // Real O(1) dedup/meta readout — the substrate's content-addressing, in true numbers.
      (async () => { try { const m = await (await fetch("./meta.json", { cache: "no-store" })).json();
        el("g-meta").innerHTML = `<b>${m.machines}</b> machines · <b>${m.nominal}</b> nominal · only <b>${m.pinned}</b> pinned · <b>${m.leanerFactor}×</b> leaner · engine = <b>1</b> shared κ`;
      } catch (_) {} })();
    </script>
  </body>
</html>
