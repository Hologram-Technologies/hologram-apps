<!doctype html>
<html lang="en" data-holo-kappa-auto="off" data-holo-boot="off">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Holo Hub stream everything you can run</title>
<!-- HoloFX motion engine (data-holo-spin driver); kappa-auto/boot off to keep hub's own κ rendering unchanged -->
<script src="/_shared/holo-fx.js"></script>
<script src="/_shared/holo-ui-kernel.js"></script>
<meta name="description" content="The home for every holo-native thing. Each item is one self-verifying object named by its content streamed and rendered live in my browser, 100% serverless. Discover, watch, own, run. For people and AI agents alike." />

<style>

  :root{
    color-scheme: dark;
    --phi:1.618;
    --bg:#0b0b0f; --bg2:#101015; --surface:#16161d; --surface-2:#1d1d27; --surface-3:#262633;
    --border:#ffffff14; --border-2:#ffffff24; --ink:#f5f5fa; --dim:#aaaab8; --faint:#717182;
    --accent:#8a7bff; --accent-2:#c07bff; --ok:#46dca6; --warn:#ffc15a; --like:#3ea6ff;
    --glow1:#2a1d5e30; --glow2:#1d2e5e26; --chip:#1d1d27; --chip-on:#f5f5fa; --chip-on-ink:#0b0b0f;

    --s1:5px; --s2:8px; --s3:13px; --s4:21px; --s5:34px; --s6:55px;

    --fs-cap:.8rem; --fs-sm:.9rem; --fs:1rem; --fs-md:1.18rem; --fs-lg:1.45rem; --fs-xl:1.9rem; --fs-2xl:2.6rem;
    --radius:16px; --radius-sm:12px; --radius-xs:9px; --card-w:300px;
    --shadow:0 18px 50px -22px #000c, 0 4px 14px -8px #0009;
    --ease:cubic-bezier(.22,.61,.36,1);

    --header-h:60px; --rail-w:240px; --rail-min:72px; --maxw:1700px;
  }
  :root[data-theme="light"]{
    color-scheme: light;
    --bg:#ffffff; --bg2:#ffffff; --surface:#ffffff; --surface-2:#f3f3f6; --surface-3:#e8e8ee;
    --border:#0000001a; --border-2:#0000002b; --ink:#0f0f14; --dim:#5d5d6b; --faint:#8a8a98;
    --accent:#6a5cf0; --accent-2:#a64dff; --ok:#16a673; --warn:#c77b12; --like:#065fd4;
    --glow1:#6a5cf014; --glow2:#3d7cf012; --chip:#f1f1f4; --chip-on:#0f0f14; --chip-on-ink:#ffffff;
    --shadow:0 18px 44px -26px #0002, 0 3px 12px -8px #0001;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font:var(--fs)/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; font-synthesis:none;
    transition:background .35s var(--ease), color .25s var(--ease);
  }
  a{color:inherit;text-decoration:none}
  .mono{font-family:ui-monospace,"Cascadia Code",Menlo,Consolas,monospace}
  ::selection{background:color-mix(in srgb,var(--accent) 40%,transparent)}
  ::-webkit-scrollbar{width:11px;height:11px} ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px;border:3px solid transparent;background-clip:content-box}

  header{position:sticky;top:0;z-index:40;height:var(--header-h);display:flex;align-items:center;gap:var(--s3);
    padding:0 var(--s4);background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(18px) saturate(140%);
    border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:var(--s2);font-weight:760;letter-spacing:-.01em;font-size:var(--fs-md);cursor:pointer;flex:0 0 auto}
  .brand .mark{width:32px;height:32px;display:grid;place-items:center;border-radius:9px;color:#fff;font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 6px 18px -6px var(--accent)}
  .hdr-sp{flex:1 1 auto}

  .search{flex:0 0 auto;display:flex;align-items:center;gap:10px;height:42px;width:22rem;max-width:34vw;padding:0 16px;
    border:1px solid var(--border-2);border-radius:99px;background:var(--surface);transition:border-color .2s,box-shadow .2s}
  .search:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 16%,transparent)}
  .search .s-ic{width:20px;height:20px;flex:0 0 auto;color:var(--dim)}
  .search input{flex:1;min-width:0;height:100%;border:0;background:transparent;color:var(--ink);font-size:var(--fs);outline:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .icon-btn{width:40px;height:40px;flex:0 0 auto;display:grid;place-items:center;border-radius:50%;cursor:pointer;
    border:0;background:transparent;color:var(--ink);font-size:1.1rem;transition:background .2s}
  .icon-btn:hover{background:var(--surface-2)}

  .layout{display:flex;align-items:flex-start;max-width:var(--maxw);margin:0 auto}
  #rail{position:sticky;top:var(--header-h);flex:0 0 var(--rail-w);width:var(--rail-w);
    height:calc(100vh - var(--header-h));overflow-y:auto;overflow-x:hidden;padding:var(--s3) var(--s2) var(--s4);
    scrollbar-width:thin;transition:flex-basis .22s var(--ease),width .22s var(--ease)}
  #rail::-webkit-scrollbar{width:8px}
  .col{flex:1 1 auto;min-width:0}
  .rail-item{display:flex;align-items:center;gap:var(--s3);width:100%;border:0;background:transparent;color:var(--ink);
    cursor:pointer;border-radius:var(--radius-xs);padding:10px var(--s3);font:560 var(--fs-sm)/1.2 inherit;text-align:left;transition:background .14s}
  .rail-item:hover{background:var(--surface-2)}
  .rail-item.on{background:var(--surface-3);font-weight:680}
  .rail-item.on .rail-ic{color:var(--accent)}
  .rail-ic{flex:0 0 24px;width:24px;height:24px;display:grid;place-items:center;color:var(--dim)}
  .rail-ic svg{width:21px;height:21px}
  .rail-item.on .rail-ic svg{stroke-width:2.3}
  .rail-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rail-grp{padding:var(--s4) var(--s3) var(--s1);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:700}
  .rail-div{height:1px;background:var(--border);margin:var(--s2) var(--s3)}
  .rail-foot{padding:var(--s4) var(--s3) 0;color:var(--faint);font-size:.72rem;line-height:1.5}
  .scrim{display:none}

  body.rail-min #rail{flex-basis:var(--rail-min);width:var(--rail-min)}
  body.rail-min .rail-label,body.rail-min .rail-grp,body.rail-min .rail-foot{display:none}
  body.rail-min .rail-item{justify-content:center;padding:11px 0}

  body.watching #rail{display:none}

  body.embedded{--header-h:0px}
  body.embedded header{display:none}

  main{max-width:var(--maxw);margin:0 auto;padding:var(--s4)}
  .view{display:none} .view.on{display:block;animation:fade .3s var(--ease)}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:var(--s4) var(--s3)}
  .empty{color:var(--faint);padding:var(--s6) 0;text-align:center}

  .hero{position:relative;height:60vh;min-height:360px;overflow:hidden;
    margin:calc(-1*var(--s4)) calc(-1*var(--s4)) var(--s5);background:#05070a}
  .hero .hbg{position:absolute;inset:0;background:#05070a center/cover no-repeat;transform:scale(1.03)}
  .hero .hbg svg{width:100%;height:100%}
  .hero .hscrim{position:absolute;inset:0;background:
    linear-gradient(90deg,color-mix(in srgb,var(--bg) 95%,transparent) 0%,color-mix(in srgb,var(--bg) 68%,transparent) 40%,transparent 66%),
    linear-gradient(0deg,var(--bg) 2%,transparent 44%)}
  .hero .hbody{position:absolute;left:var(--s5);right:var(--s5);bottom:var(--s5);max-width:min(42rem,66%)}
  .hero h1{font-size:clamp(2.1rem,4.6vw,4rem);font-weight:820;line-height:1.04;letter-spacing:-.022em;margin:0 0 var(--s2);color:#fff;text-shadow:0 2px 22px #0009}
  .hero .hmeta{display:flex;flex-wrap:wrap;gap:var(--s2);align-items:center;color:#cfd3df;font-size:var(--fs);margin-bottom:var(--s3)}
  .hero .hmeta .k{color:var(--ok);font-weight:600}
  .hero p{color:#dbe1ea;font-size:var(--fs-md);line-height:1.5;margin:0 0 var(--s4);max-width:36rem;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hero .hcta{display:flex;gap:var(--s3);align-items:center}
  .hbtn{display:inline-flex;align-items:center;gap:9px;height:52px;padding:0 26px;border:0;border-radius:99px;
    font-weight:700;font-size:var(--fs);cursor:pointer;background:var(--surface-2);color:var(--ink);transition:.15s var(--ease)}
  .hbtn:hover{background:var(--surface-3)}
  .hbtn.primary{background:#fff;color:#0b0b0f} .hbtn.primary:hover{filter:brightness(.92)}
  .hbtn svg{width:22px;height:22px}
  .rail{margin:var(--s5) 0}
  .rail .rh{display:flex;align-items:baseline;gap:var(--s3);margin:0 0 var(--s3)}
  .rail .rh h2{font-size:var(--fs-lg);font-weight:680;margin:0;letter-spacing:-.015em}
  .rail .rh .sub{color:var(--faint);font-size:var(--fs)}
  .strip{display:flex;gap:var(--s3);overflow-x:auto;overflow-y:hidden;scroll-snap-type:x proximity;scrollbar-width:none;padding-bottom:var(--s2)}
  .strip::-webkit-scrollbar{display:none}
  .strip>.card{width:var(--card-w);flex:0 0 var(--card-w);scroll-snap-align:start}
  @media(max-width:560px){ .hero{height:54vh;min-height:300px} .hero .hbody{left:var(--s4);right:var(--s4);bottom:var(--s4)} }

  .card{cursor:pointer;display:flex;flex-direction:column;gap:var(--s3);border-radius:var(--radius);transition:transform .2s var(--ease)}
  .card:hover{transform:translateY(-2px)}
  .cover{position:relative;aspect-ratio:var(--phi);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);
    box-shadow:var(--shadow);display:grid;place-items:center;isolation:isolate}
  .cover .bg{position:absolute;inset:0;z-index:0}
  .cover .bg svg{display:block;width:100%;height:100%}

  .cover::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;
    background:linear-gradient(115deg,transparent 32%,#ffffff26 46%,#ffffff10 52%,transparent 64%);
    transform:translateX(-130%);transition:transform .9s var(--ease)}
  .card:hover .cover::after{transform:translateX(130%)}
  .cover .ic{position:relative;z-index:2;width:37%;max-width:152px;aspect-ratio:1;border-radius:26%;padding:18px;
    background:linear-gradient(160deg,#14141ccc,#0a0a12d9);backdrop-filter:blur(10px);border:1px solid #ffffff33;
    display:grid;place-items:center;transition:transform .3s var(--ease);
    box-shadow:0 18px 44px -12px #000c, 0 0 0 1px color-mix(in srgb,var(--ca,#8a7bff) 42%,transparent),
      0 0 60px -8px color-mix(in srgb,var(--ca,#8a7bff) 78%,transparent)}
  .card:hover .cover .ic{transform:scale(1.06)}
  .cover .ic img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 10px #0007)}
  .cover .badge{position:absolute;z-index:5;left:13px;top:13px;font-size:1rem;font-weight:800;letter-spacing:.03em;
    text-transform:uppercase;border-radius:99px;padding:7px 16px;color:#fff;box-shadow:0 6px 18px -8px #000a;backdrop-filter:blur(4px)}
  .cover .badge.new{background:linear-gradient(135deg,var(--accent),var(--accent-2))}
  .cover .badge.upd{background:var(--warn);color:#19120a}
  .cover .badge.own{background:var(--ok);color:#04231a}

  .cover .pv{position:absolute;inset:0;z-index:1;overflow:hidden;opacity:0;transition:opacity .45s var(--ease);pointer-events:none}
  .cover.previewing .pv{opacity:1}
  .cover .pv iframe{position:absolute;top:0;left:0;border:0;background:#0b0b14;pointer-events:none;
    filter:saturate(.82) contrast(1.04) brightness(.9)}
  .cover .tint{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .45s var(--ease);pointer-events:none;
    background:radial-gradient(125% 135% at 50% -12%, transparent 46%, #0b0b14 116%),
      linear-gradient(180deg, color-mix(in srgb,var(--ca,#8a7bff) 24%,transparent), transparent 40%)}
  .cover.previewing .tint{opacity:1}
  .cover.previewing .ic,.cover.previewing .play{opacity:0}

  .cover .art{position:absolute;inset:0;z-index:0;width:100%;height:100%;object-fit:cover}
  .cover .tint.show{opacity:1}
  .cover .dur{position:absolute;z-index:5;right:12px;bottom:12px;background:#000c;backdrop-filter:blur(4px);color:#fff;
    font-size:1rem;font-weight:700;padding:5px 12px;border-radius:8px;letter-spacing:.02em}
  .cover .play{position:absolute;z-index:3;inset:0;display:grid;place-items:center;opacity:0;transition:opacity .2s;background:#0004}
  .card:hover .cover .play{opacity:1}
  .cover .play span{width:58px;height:58px;border-radius:50%;background:#000a;backdrop-filter:blur(6px);display:grid;place-items:center;
    color:#fff;font-size:1.4rem;border:1px solid #fff5;padding-left:4px}
  .meta{display:flex;gap:var(--s3);padding:0 2px}
  .meta .av{width:38px;height:38px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:.95rem;overflow:hidden}
  .meta .av img{width:100%;height:100%;object-fit:cover}
  .meta .txt{min-width:0;flex:1}
  .meta h4{margin:0;font-size:1.06rem;font-weight:660;line-height:1.32;letter-spacing:-.01em;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meta .chan{color:var(--dim);font-size:var(--fs);margin-top:4px;display:flex;align-items:center;gap:6px}
  .meta .chan .vrf{color:var(--like)}

  .shead{display:flex;align-items:baseline;gap:var(--s3);margin:var(--s5) 0 var(--s4)}
  .shead:first-child{margin-top:var(--s2)}
  .shead h2{font-size:var(--fs-lg);font-weight:680;margin:0;letter-spacing:-.015em}
  .shead .sub{color:var(--faint);font-size:var(--fs-sm)}

  #watch{display:none}
  #watch.on{display:block;animation:fade .3s var(--ease)}
  .watch-wrap{max-width:2200px;margin:0 auto;padding:var(--s4) var(--s5);
    display:grid;grid-template-columns:minmax(0,1.618fr) minmax(340px,1fr);gap:var(--s5)}
  body.watching .layout{max-width:none}

  body.theater .watch-wrap{grid-template-columns:1fr;max-width:none;gap:var(--s4)}
  body.theater .player{width:100%;max-width:calc((100vh - 150px) * 1.7778);margin:0 auto}
  @media(max-width:1000px){ .watch-wrap{grid-template-columns:1fr;gap:var(--s4);padding:var(--s4)} }

  .player{position:relative;border-radius:var(--radius);overflow:hidden;background:#000;border:1px solid var(--border);
    box-shadow:var(--shadow);aspect-ratio:16/9}
  .player iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff;opacity:0;transition:opacity .4s var(--ease)}
  .player.ready iframe{opacity:1}
  .player .boot{position:absolute;inset:0;z-index:2;display:grid;place-items:center;gap:var(--s3);background:var(--bg2);
    color:var(--dim);text-align:center;transition:opacity .4s;pointer-events:none}
  .player.ready .boot{opacity:0}
  .player .boot .ring{font:700 30px/1 ui-monospace,Menlo,Consolas,monospace;color:var(--accent);display:inline-block}

  .player .ptop{position:absolute;z-index:3;inset:0 0 auto 0;padding:var(--s3) var(--s3) var(--s5);
    background:linear-gradient(#0008,transparent);opacity:0;transition:opacity .2s;pointer-events:none}
  .player:hover .ptop,.player:focus-within .ptop,.player:not(.ready) .ptop{opacity:1}
  .player .live{display:inline-flex;align-items:center;gap:8px;background:#000a;backdrop-filter:blur(6px);
    color:#fff;font-size:.92rem;font-weight:700;padding:7px 13px;border-radius:99px}
  .player .live .rd{width:8px;height:8px;border-radius:50%;background:#ff4b4b;box-shadow:0 0 9px #ff4b4b;animation:pulse 1.8s infinite}
  .player .live .v{color:var(--ok)}

  .player .pbar{position:absolute;z-index:4;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:space-between;
    gap:var(--s3);padding:var(--s5) var(--s3) var(--s3);background:linear-gradient(transparent,#000b 65%);
    opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none}
  .player:hover .pbar,.player:focus-within .pbar{opacity:1;transform:none;pointer-events:auto}
  .player .pbar-l{display:flex;align-items:center;gap:9px;color:#fff;font-size:.95rem;font-weight:650;text-shadow:0 1px 6px #000c;min-width:0}
  .player .pbar-l svg{width:21px;height:21px;flex:0 0 auto}
  .player .pbar-r{display:flex;align-items:center;gap:7px;flex:0 0 auto}
  .player .pbtn{display:grid;place-items:center;width:44px;height:44px;border-radius:50%;border:0;
    background:#0006;backdrop-filter:blur(6px);color:#fff;cursor:pointer;transition:background .15s,transform .15s}
  .player .pbtn:hover{background:#000c;transform:scale(1.06)}
  .player .pbtn.on{background:var(--accent);color:#fff}
  .player .pbtn svg{width:23px;height:23px}

  .w-title{font-size:var(--fs-lg);font-weight:680;letter-spacing:-.015em;margin:var(--s4) 0 var(--s2)}
  .w-bar{display:flex;align-items:center;gap:var(--s3);flex-wrap:wrap}
  .w-chan{display:flex;align-items:center;gap:var(--s3);min-width:0;flex:1;flex-wrap:wrap}
  .w-chan .av{width:42px;height:42px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;overflow:hidden}
  .w-chan .av img{width:100%;height:100%;object-fit:cover}
  .w-chan .who{flex:0 1 auto;min-width:0}
  .w-chan .who b{font-size:var(--fs);font-weight:620;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .w-chan .who small{color:var(--faint);font-size:var(--fs-cap)}
  .w-actions{display:flex;align-items:center;gap:var(--s2);flex-wrap:wrap}
  .w-actk{display:none}
  body.ksurf .w-actk{display:flex;align-items:center}
  body.ksurf .w-actions>.seg, body.ksurf #wShare, body.ksurf #wSave{display:none}   /* κ action row supersedes the legacy DOM row */
  .cm-compose-k{display:none;margin-bottom:var(--s5)}
  body.ksurf .cm-compose-k{display:block}
  body.ksurf #cmCompose{display:none}   /* κ composer (input + buttons) supersedes the legacy DOM composer */
  .w-headk{display:none}
  body.ksurf .w-headk{display:block;flex:1}
  body.ksurf .w-chan>.av, body.ksurf .w-chan>.who, body.ksurf #wGet, body.ksurf #wBuy{display:none}   /* κ channel header supersedes the legacy DOM header */
  .qk{display:none}
  body.ksurf .search>.s-ic, body.ksurf #q{display:none}
  body.ksurf .search>.qk{display:block;width:100%}   /* κ search field supersedes the legacy DOM input */
  .up-headk{display:none}
  body.ksurf .up-headk{display:block}
  body.ksurf .up-head{display:none}   /* κ up-next header supersedes the legacy DOM one */
  body.ksurf #wMore{display:none}   /* κ description is always expanded — the clamp toggle is redundant */
  .seg{display:flex;align-items:center;background:var(--surface-2);border-radius:99px;overflow:hidden;flex:0 0 auto}
  .seg button{border:0;background:transparent;color:var(--ink);font:600 var(--fs)/1 inherit;white-space:nowrap;padding:10px 15px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .16s}
  .seg button:hover{background:var(--surface-3)}
  .seg .sp{width:1px;align-self:stretch;background:var(--border-2)}
  .seg button.act{color:var(--like)}
  .abtn{border:0;background:var(--surface-2);color:var(--ink);border-radius:99px;padding:10px 17px;font:600 var(--fs)/1 inherit;white-space:nowrap;flex:0 0 auto;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .16s}
  .abtn:hover{background:var(--surface-3)}
  .abtn.act{background:color-mix(in srgb,var(--ok) 20%,transparent);color:var(--ok)}
  .abtn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff}
  .abtn.primary:hover{filter:brightness(1.08)}
  .abtn.wallet{background:transparent;border:1px solid color-mix(in srgb,var(--ok) 45%,var(--border-2));color:var(--ok)}

  .w-desc{margin-top:var(--s4);background:var(--surface-2);border-radius:var(--radius-sm);padding:var(--s3) var(--s4)}
  .w-desc .stat{font-weight:600;font-size:var(--fs-sm);display:flex;gap:var(--s3);flex-wrap:wrap;color:var(--ink)}
  .w-desc .stat .v{color:var(--ok)}
  .w-desc .body{margin-top:var(--s2);color:var(--ink);font-size:var(--fs-sm);line-height:1.6}
  .w-desc .body p{margin:0 0 var(--s2)}
  .w-desc .body .lbl{color:var(--accent);font-weight:700;margin-right:6px}
  .w-desc.clamp .body{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .w-desc .more{margin-top:var(--s1);background:none;border:0;color:var(--ink);font-weight:700;font-size:var(--fs-sm);cursor:pointer;padding:0}
  .w-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--s2);margin-top:var(--s3)}

<script type="module">

const ADOPTED_MODEL = "did:holo:sha256:40e306a68628bd0e6f51b1dfa9dff9fac18a2db901a41f8f38d8ecf37a97ca78";
const FEATURED = ["org.hologram.HoloAtlas","org.hologram.HoloQ","org.hologram.HoloMusic","org.hologram.HoloCode","org.hologram.HoloWallet","org.hologram.HoloJupyter"];

const enc = new TextEncoder();
const jcs = (v) => v===null||typeof v!=="object" ? JSON.stringify(v)
  : Array.isArray(v) ? "["+v.map(jcs).join(",")+"]"
  : "{"+Object.keys(v).sort().map(k=>JSON.stringify(k)+":"+jcs(v[k])).join(",")+"}";
async function kappa(content){
  const d = await crypto.subtle.digest("SHA-256", enc.encode(jcs(content)));
  return [...new Uint8Array(d)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

const hint = (s)=>{ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; };

const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const n=document.createElement(t);if(c)n.className=c;if(h!=null)n.innerHTML=h;return n;};
const abs = (p)=> p ? ("/"+String(p).replace(/^\/+/,"")) : "";
const esc = (s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ── κ-render substrate migration (Phase 3 slice 1 · flagged ?ksurface=1) ───────────────────────────
// A card's cover becomes a declarative holo:Surface — content-addressed (κ), L5-verified, and drawn by
// the OS κ-render substrate (WebGPU, DOM fallback) via the SAME render() spine, not bespoke DOM/CSS.
import HoloSurface from "/_shared/holo-surface.mjs";
const KSURF = !new URLSearchParams(location.search).has("nok");   // default ON — the κ-substrate is how Hub renders; ?nok=1 = kill-switch
if(KSURF) document.body.classList.add("ksurf");
const KSTORE = new Map();
const kHex = (k)=>String(k).replace(/^did:holo:sha256:/,"");
const shaRaw = async (b)=>{ const d=await crypto.subtle.digest("SHA-256", b instanceof Uint8Array?b:new Uint8Array(b)); return [...new Uint8Array(d)].map(x=>x.toString(16).padStart(2,"0")).join(""); };
const kResolve = async (k)=>{ const b=KSTORE.get(kHex(k)); if(!b) throw new Error("κ not found"); return b; };
const kVerify  = async (k,b)=> (await shaRaw(b))===kHex(k);    // re-derive on receipt (Law L5)
const hx2 = (h)=>{ h=String(h||"#8a7bff").replace("#",""); if(h.length===3) h=h.split("").map(c=>c+c).join(""); return [parseInt(h.slice(0,2),16)/255, parseInt(h.slice(2,4),16)/255, parseInt(h.slice(4,6),16)/255]; };
// rasterise any cover art (raster OR svg) to a PNG, content-address it (κ), stash for L5 resolution.
async function rasterizeToKappa(url, W, H){
  return new Promise((res)=>{
    const img=new Image(); img.crossOrigin="anonymous";
    img.onload=()=>{ try{
      const c=document.createElement("canvas"); c.width=W; c.height=H; const g=c.getContext("2d");
      const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
      if(iw&&ih){ const ar=iw/ih, tr=W/H; let dw=W,dh=H,dx=0,dy=0; if(ar>tr){dh=H;dw=H*ar;dx=(W-dw)/2;} else {dw=W;dh=W/ar;dy=(H-dh)/2;} g.drawImage(img,dx,dy,dw,dh); }
      else { g.drawImage(img,0,0,W,H); }
      c.toBlob(async(blob)=>{ if(!blob) return res(null); const bytes=new Uint8Array(await blob.arrayBuffer()); const h=await shaRaw(bytes); KSTORE.set(h,bytes); res("did:holo:sha256:"+h); }, "image/png");
    }catch{ res(null); } };
    img.onerror=()=>res(null); img.src=url;
  });
}
// the cover, rendered by the κ-substrate: the thumbnail as an image-κ (raster OR svg→png), else a
// fill+title surface — composited BEHIND the existing overlays (play/badge/dur/hover-preview kept).
async function renderKCover(coverEl, p, accent){
  const a=hx2(accent), W=360, H=220;
  let imgK=null; const artUrl=p.art || (typeof coverArt==="function"? null : null);
  if(p.art){ imgK = await rasterizeToKappa(p.art, W, H); }
  const scene = imgK
    ? { "@type":"holo:Surface", kind:"container", w:W, h:H, layout:"stack", pad:0, gap:0, radius:0, fill:[0,0,0,0], children:[{ kind:"image", src:imgK, w:W, h:H }] }
    : { "@type":"holo:Surface", kind:"container", w:W, h:H, layout:"stack", pad:18, gap:8, radius:0, fill:[0.08,0.09,0.13,1], accent:[a[0],a[1],a[2],1], accentH:54,
        children:[ { kind:"text", text:String(p.name||""), textSize:23, h:64, textColor:[0.97,0.98,1,1] }, { kind:"text", text:String(p.channel||"")+"  (verified)", textSize:15, h:30, textColor:[0.62,0.65,0.76,1] } ] };
  const bytes=enc.encode(jcs(scene)); const k="did:holo:sha256:"+await shaRaw(bytes); KSTORE.set(kHex(k),bytes);
  const stage=document.createElement("div"); stage.style.cssText="position:absolute;left:-99999px;top:0"; document.body.appendChild(stage);
  let canvas=null;
  try{ const out=await HoloSurface.renderSurface(stage, k, { resolve:kResolve, verify:kVerify }); coverEl.dataset.kbackend=out.backend||""; canvas=stage.querySelector("canvas"); }
  catch(e){ coverEl.dataset.kerror=String(e&&e.message||e); }
  if(canvas){ canvas.className="kart"; canvas.style.cssText="position:absolute;inset:0;width:100%;height:100%;z-index:0"; const old=coverEl.querySelector("img.art, .bg"); if(old) old.replaceWith(canvas); else coverEl.prepend(canvas); }
  stage.remove();
}

// render a κ-surface scene directly INTO an element (the watch panels): content-addressed + L5.
async function renderKScene(targetEl, scene, opts={}){
  if(!targetEl) return;
  const bytes=enc.encode(jcs(scene)); const k="did:holo:sha256:"+await shaRaw(bytes); KSTORE.set(kHex(k),bytes);
  try{ const out=await HoloSurface.renderSurface(targetEl, k, { resolve:kResolve, verify:kVerify }); targetEl.dataset.kbackend=out.backend||"";
    if(opts.stretch){ const cv=targetEl.querySelector("canvas"); if(cv){ cv.style.width="100%"; cv.style.height="auto"; cv.style.display="block"; } } }
  catch(e){ targetEl.dataset.kerror=String(e&&e.message||e); }
}
// INTERACTIVE κ-surface: a scene whose `button` nodes carry content-addressed action ids; the host
// supplies the `actions` map (id→fn). The substrate dispatches via the conscience gate (P7), runs NO
// inline code (L4/L5), and emits no telemetry (P5). This is how every interactive control composes.
async function renderKSceneActions(targetEl, scene, actions, opts={}){
  if(!targetEl) return;
  const bytes=enc.encode(jcs(scene)); const k="did:holo:sha256:"+await shaRaw(bytes); KSTORE.set(kHex(k),bytes);
  try{ const out=await HoloSurface.renderSurface(targetEl, k, { resolve:kResolve, verify:kVerify, actions }); targetEl.dataset.kbackend=out.backend||"";
    if(opts.stretch){ const cv=targetEl.querySelector("canvas"); if(cv){ cv.style.width="100%"; cv.style.height="auto"; cv.style.display="block"; } } }
  catch(e){ targetEl.dataset.kerror=String(e&&e.message||e); }
}
// the watch action row (Like / Dislike / Share / Save) as κ-surface BUTTONS — state→scene, re-rendered
// on every action. Wired to the same vote/save/share handlers the legacy DOM row uses (?nok=1).
async function renderActionRowK(p){
  const host=$("#wActK"); if(!host||!p) return;
  const v=myVote(p.id), liked=v===1, disliked=v===-1, saved=isSaved(p.id), acc=[0.26,0.52,1,1];
  const likeN=fmt(counts(p).likes+(liked?1:0));
  const W=440, cols=4, gap=10, pad=2, h=44;
  const scene={ "@type":"holo:Surface", kind:"container", w:W, h, layout:"grid", cols, gap, pad, fill:[0,0,0,0], children:[
    { kind:"button", action:"like",    label:`👍 ${likeN}`,            h:40, radius:999, toggleable:true, toggled:liked,    accent:acc, aria:liked?"Remove like":"Like" },
    { kind:"button", action:"dislike", label:"👎",                     h:40, radius:999, toggleable:true, toggled:disliked, accent:acc, aria:disliked?"Remove dislike":"Dislike" },
    { kind:"button", action:"share",   label:"↗ Share",               h:40, radius:999, aria:"Share this" },
    { kind:"button", action:"save",    label:saved?"✓ Saved":"🔖 Save", h:40, radius:999, toggleable:true, toggled:saved, accent:acc, aria:saved?"Remove from library":"Save to library" },
  ] };
  const actions={
    like:    ()=>{ setVote(p.id, myVote(p.id)===1?0:1); syncVote(p); renderActionRowK(p); },
    dislike: ()=>{ setVote(p.id, myVote(p.id)===-1?0:-1); syncVote(p); renderActionRowK(p); },
    share:   async()=>{ const url=location.origin+location.pathname+"#watch/"+(p.ident||p.id);
      try{ if(navigator.share){ await navigator.share({title:p.name,url}); } else { await navigator.clipboard.writeText(url); toast("Link copied anyone can open it in one tap"); } }catch{} },
    save:    ()=>{ const s=toggleSaved(p.id); $("#wSave").classList.toggle("act",s); $("#wSave").innerHTML=s?"✓ Saved":"🔖 Save"; toast(s?"Saved to my library":"Removed from library"); renderActionRowK(p); },
  };
  await renderKSceneActions(host, scene, actions);
}
// the comment COMPOSER (text field + Cancel/Comment) as a κ-surface: the `input` kind paired with `button`s.
// Rendered ONCE per watch-open — the live <input> is the source of truth, so typing never re-renders the
// scene (that would destroy focus/caret); Comment/Enter read the field's current value at dispatch time.
async function renderComposerK(p){

function rankFor(current, all, history){
  const watched=new Set(history||[]);
  const kwOf=(p)=>new Set([...(p.keywords||[]),...(p.categories||[]),typeOf(p),shelfOf(p)].map(x=>String(x).toLowerCase()));
  const curKw=current?kwOf(current):new Set();
  const histKw=new Set(); (history||[]).map(id=>all.find(p=>p.id===id)).filter(Boolean).forEach(p=>kwOf(p).forEach(k=>histKw.add(k)));
  const score=(p)=>{
    if(current&&p.id===current.id) return -1;
    let s = counts(p).streams/1e6 * 0.4;
    let overlap=0; for(const k of kwOf(p)) if(curKw.has(k)) overlap++;
    let hov=0;     for(const k of kwOf(p)) if(histKw.has(k)) hov++;
    s += overlap*1.0 + hov*0.5;
    if(current && shelfOf(p)===shelfOf(current)) s+=0.6;
    if(current && p.channel===current.channel) s+=0.8;
    return s;
  };
  const reason=(p)=>{
    if(current){
      if(p.channel===current.channel) return `More from ${current.channel}`;
      let best=null,bv=0; for(const k of kwOf(p)) if(curKw.has(k)&&k.length>3){ best=k; break; }
      if(best) return `Because you're watching ${current.name}`;
      if(shelfOf(p)===shelfOf(current)) return `More in ${shelfOf(current)}`;
    }
    const last=(history||[]).map(id=>all.find(x=>x.id===id)).find(Boolean);
    if(last && last.id!==(current&&current.id)) return `Because you watched ${last.name}`;
    return "Popular on Holo Hub";
  };
  return all.map(p=>({p,score:score(p),why:reason(p)}))
    .filter(x=>x.score>=0).sort((a,b)=> b.score-a.score || (a.p.id<b.p.id?-1:1));
}

function mountPreview(card,p){

  ifr.style.cssText=`width:${LW}px;height:${Math.round(LW*ratio)}px;transform:scale(${(w/LW).toFixed(4)});transform-origin:top left;border:0`;

    const id="u"+i;
    kids.push({ kind:"button", action:id, w:W, h:thH+12, radius:12, fill:[0,0,0,0], aria:q.name, children:[
      { kind:"container", w:W, layout:"row", gap:10, pad:0, fill:[0,0,0,0], children:[
        { kind:"container", w:thW, h:thH, radius:10, pad:0, layout:"stack", fill:[acc[0],acc[1],acc[2],1], accent: imgK?null:[Math.min(1,acc[0]*1.25),Math.min(1,acc[1]*1.25),Math.min(1,acc[2]*1.25),1], accentH: imgK?0:thH, children:thumbKids },
        { kind:"container", w:bodyW, h:thH, pad:0, gap:3, layout:"stack", fill:[0,0,0,0], children:[
          { kind:"text", text:String(q.name||""), textSize:14, h:38, textColor:[0.97,0.98,1,1] },
          { kind:"text", text:String(q.channel||"")+" ✓", textSize:12, h:16, textColor:[0.62,0.65,0.76,1] },
          { kind:"text", text:`${fmt(cc.streams)} streams · ${ago(q.date)}`, textSize:11, h:15, textColor:[0.55,0.58,0.68,1] },
          { kind:"text", text:"✦ "+String(why||""), textSize:11, h:15, textColor:[0.50,0.62,0.95,1] },
        ] },
      ] },
    ] });
    actions[id]=()=>openWatch(q, !!q.isMedia);
  }
  renderKSceneActions(host, { "@type":"holo:Surface", kind:"container", w:W, layout:"stack", gap:8, pad:0, fill:[0,0,0,0], children:kids }, actions, {stretch:true});
}

const THEME_KEY="holo-hub:theme";
function applyTheme(t){ document.documentElement.setAttribute("data-theme",t); $("#themeBtn").textContent=t==="light"?"☾":"☀"; }
$("#themeBtn").onclick=()=>{ const cur=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light"; localStorage.setItem(THEME_KEY,cur); applyTheme(cur); };
applyTheme(localStorage.getItem(THEME_KEY) || (matchMedia("(prefers-color-scheme: light)").matches?"light":"dark"));

let toastT; function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),3200); }

load().catch(e=>console.error(e));

const EMBEDDED = (()=>{ try{ return !!window.parent && window.parent!==window; }catch{ return true; } })();
if(EMBEDDED){
  document.body.classList.add("embedded");
  const announce=()=>{ try{ parent.postMessage({type:"holo:search:ready", app:"Holo Hub", scope:"apps · media · files"}, "*"); }catch{} };
  announce(); addEventListener("pageshow",announce);
  Promise.all(["Music","Video","Files"].map(loadMedia)).catch(()=>{});
  addEventListener("message",(e)=>{ const d=e.data; if(!d||d.type!=="holo:search") return;
    const q=String(d.q||"").trim();
    if(q){ setView("search"); doSearch(q); } else if($("#watch").classList.contains("on")||$("#view-search").classList.contains("on")){ setView("home"); } });
}
</script>
