<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Holo Pass</title>
<style>
  :root { color-scheme: dark; --bg: var(--holo-bg, #141417); --fg: var(--holo-fg, #e8eaf0); --dim: var(--holo-dim, #8a90a2);
    --card: var(--holo-surface, #1b1d24); --line: var(--holo-border, #2a2d38); --accent: var(--holo-accent, #3584e4); --ok: #2ec27e; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font: 15px/1.5 var(--holo-font-sans, system-ui, -apple-system, "Segoe UI", sans-serif); }
  .wrap { max-width: 720px; margin: 0 auto; padding: 18px 18px 64px; }
  header { display: flex; align-items: center; gap: 10px; padding: 6px 0 14px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 650; letter-spacing: -0.01em; }
  header .sub { color: var(--dim); font-size: 12px; }
  .search { width: 100%; padding: 11px 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--card); color: var(--fg); font-size: 15px; outline: none; }
  .search:focus { border-color: var(--accent); }
  .row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; cursor: default; }
  .row:hover { background: var(--card); }
  .fav { width: 30px; height: 30px; border-radius: 8px; background: var(--card); border: 1px solid var(--line); display: grid; place-items: center; font-size: 14px; flex: none; overflow: hidden; }
  .fav img { width: 100%; height: 100%; object-fit: cover; }
  .meta { min-width: 0; flex: 1; }
  .meta b { font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta small { color: var(--dim); }
  .kind { font-size: 11px; color: var(--dim); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; text-transform: uppercase; letter-spacing: .04em; }
  .act { display: flex; gap: 6px; }
  button { font: inherit; border: 1px solid var(--line); background: var(--card); color: var(--fg); border-radius: 9px; padding: 7px 12px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.ghost { background: transparent; }
  .empty { color: var(--dim); text-align: center; padding: 48px 0; }
  .fab { position: fixed; right: 22px; bottom: 22px; border-radius: 999px; padding: 13px 18px; font-weight: 600; }
  dialog { border: 1px solid var(--line); background: var(--card); color: var(--fg); border-radius: 16px; padding: 18px; width: min(440px, 92vw); }
  dialog::backdrop { background: rgba(4,7,12,.6); }
  label { display: block; font-size: 12px; color: var(--dim); margin: 12px 0 4px; }
  input, select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--bg); color: var(--fg); font: inherit; }
  .pw { display: flex; gap: 8px; } .pw input { flex: 1; font-family: ui-monospace, monospace; }
  .dlg-act { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 9px 16px; font-size: 13px; opacity: 0; transition: opacity .2s; }
  .toast.on { opacity: 1; }
  .save { border: 1px solid var(--accent); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .save b { font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="fav" aria-hidden="true">🔐</div>
    <div><h1>Holo Pass</h1><div class="sub" id="sub">one biometric · every login · post-quantum · serverless</div></div>
  </header>
  <input id="q" class="search" placeholder="Search logins…" autocomplete="off" />
  <div id="savePrompt"></div>
  <div id="list"></div>
</div>
<button id="add" class="fab primary">＋ Add</button>
<div id="toast" class="toast"></div>

<dialog id="dlg">
  <h3 id="dlgTitle" style="margin:0 0 4px">Add login</h3>
  <div style="color:var(--dim);font-size:12px">Stored encrypted under your biometric — never typed, never on a server.</div>
  <label>Website (exact origin)</label><input id="f-origin" placeholder="https://mail.google.com" />
  <label>Kind</label>
  <select id="f-kind"><option value="password">Password</option><option value="passkey">Passkey</option><option value="web3">Web3 / wallet</option></select>
  <label>Username</label><input id="f-user" placeholder="you@example.com" autocomplete="off" />
  <label>Secret</label>
  <div class="pw"><input id="f-secret" type="text" autocomplete="off" /><button id="gen" type="button" class="ghost">Generate</button></div>
  <div class="dlg-act"><button id="cancel" class="ghost">Cancel</button><button id="save" class="primary">Save</button></div>
</dialog>

<script type="module">
import { holoVaultClient, generatePassword } from "/_shared/holo-vault-bridge.mjs";
const vault = holoVaultClient(window.parent);
const $ = (s) => document.querySelector(s);
const listEl = $("#list"), qEl = $("#q"), dlg = $("#dlg");
let entries = [], filter = "", editingId = null;

const toast = (m) => { const t = $("#toast"); t.textContent = m; t.classList.add("on"); setTimeout(() => t.classList.remove("on"), 1600); };
const host = (u) => { try { return new URL(u).host; } catch { return u; } };

function render() {
  const f = filter.trim().toLowerCase();
  const rows = entries.filter((e) => !f || (e.origin + " " + (e.username || "")).toLowerCase().includes(f))
    .sort((a, b) => host(a.origin).localeCompare(host(b.origin)));
  if (!rows.length) { listEl.innerHTML = `<div class="empty">${entries.length ? "No matches." : "No logins yet. Add your first — it's encrypted under your biometric."}</div>`; return; }
  listEl.innerHTML = "";
  for (const e of rows) {
    const row = document.createElement("div"); row.className = "row";
    row.innerHTML = `<div class="fav"><img alt="" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(host(e.origin))}&sz=64" onerror="this.replaceWith(document.createTextNode('🌐'))"></div>
      <div class="meta"><b>${host(e.origin)}</b><small>${e.username || "—"}</small></div>
      <span class="kind">${e.kind}</span>
      <div class="act"><button data-reveal="${e.id}" class="ghost">Reveal</button><button data-edit="${e.id}" class="ghost">Edit</button></div>`;
    listEl.appendChild(row);
  }
}

async function refresh() { try { entries = await vault.list(); render(); } catch (e) { listEl.innerHTML = `<div class="empty">Vault locked. Unlock with your biometric.</div>`; } }

listEl.addEventListener("click", async (ev) => {
  const rv = ev.target.closest("[data-reveal]"), ed = ev.target.closest("[data-edit]");
  if (rv) { try { const r = await vault.reveal(rv.getAttribute("data-reveal")); await navigator.clipboard?.writeText?.(r.secret).catch(() => {}); toast("Revealed + copied (biometric confirmed)"); } catch (e) { toast("Reveal needs your biometric"); } }
  if (ed) { const e = entries.find((x) => x.id === ed.getAttribute("data-edit")); openDlg(e); }
});
qEl.addEventListener("input", () => { filter = qEl.value; render(); });

function openDlg(e) {
  editingId = e ? e.id : null;
  $("#dlgTitle").textContent = e ? "Edit login" : "Add login";
  $("#f-origin").value = e ? e.origin : ""; $("#f-kind").value = e ? e.kind : "password";
  $("#f-user").value = e ? (e.username || "") : ""; $("#f-secret").value = "";
  dlg.showModal();
}
$("#add").addEventListener("click", () => openDlg(null));
$("#cancel").addEventListener("click", () => dlg.close());
$("#gen").addEventListener("click", () => { $("#f-secret").value = generatePassword({ length: 20 }); });
$("#save").addEventListener("click", async () => {
  const origin = $("#f-origin").value.trim(); if (!origin) { toast("Website required"); return; }
  try { await vault.put({ origin, kind: $("#f-kind").value, username: $("#f-user").value.trim() || null, secret: $("#f-secret").value || null }); dlg.close(); await refresh(); toast("Saved"); }
  catch (e) { toast("Save failed: " + e.message); }
});

// shell → app messages: search forwarding + "save this login?" prompt (P3 autofill capture)
window.addEventListener("message", (e) => {
  const d = e.data || {};
  if (d.type === "holo:search") { filter = d.q || ""; qEl.value = filter; render(); }
  if (d.t === "holo-vault:save-prompt") {
    $("#savePrompt").innerHTML = `<div class="save"><b>Save this login?</b><br><small>${host(d.origin)} · ${d.username || ""}</small><div class="dlg-act"><button class="ghost" id="sp-no">Not now</button><button class="primary" id="sp-yes">Save</button></div></div>`;
    $("#sp-yes").onclick = async () => { await vault.put({ origin: d.origin, kind: "password", username: d.username || null, secret: d.secret || null }); $("#savePrompt").innerHTML = ""; await refresh(); toast("Login saved"); };
    $("#sp-no").onclick = () => { $("#savePrompt").innerHTML = ""; };
  }
});

refresh();
</script>
</body>
</html>
