<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Holo ASCII</title>
    <meta name="description" content="Holo ASCII — a native, κ-addressable text→ASCII (FIGlet) encoder for Hologram OS. The same algorithm and the same 328 .flf fonts as patorjk's TAAG, vendored as the byte source of truth: output is byte-identical, not a lookalike. Fonts are lazy, content-addressed κ-objects, re-verified on read (Law L5). No CDN (Law L4)." />

    <!-- shared runtime mount: /_shared/ → /usr/lib/holo -->
    <script type="importmap">
      { "imports": { "holo-ascii": "/_shared/holo-ascii.mjs" } }
    </script>
    <link rel="stylesheet" href="/_shared/holo-theme.css" />
    <link rel="stylesheet" href="/_shared/holo-mobile.css" />
    <!-- holo-theme.js boots theming + Holo UX + window.HoloFX (one canonical wire, Law L2) -->
    <script src="/_shared/holo-theme.js"></script>

    <style>
      :root {
        color-scheme: dark;
        --bg: var(--holo-bg); --panel: var(--holo-surface); --line: var(--holo-border);
        --dim: var(--holo-ink-dim); --ink: var(--holo-ink); --accent: var(--holo-accent, #7ee787);
        --ok: var(--holo-ok, #1a7f37); --bad: var(--holo-danger, #ff6b6b);
        --mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: var(--ink); display: flex; flex-direction: column; overflow: hidden;
        font: var(--holo-text-sm, 1rem)/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

      /* ── top chrome ─────────────────────────────────────────────── */
      #bar { flex: 0 0 auto; display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
        padding: .4rem .8rem; background: var(--panel); border-bottom: 1px solid var(--line);
        font: var(--holo-text-sm, 1rem) var(--mono); user-select: none; }
      #bar .logo { width: 22px; height: 22px; color: var(--accent); flex: 0 0 auto; }
      #bar .name { color: var(--ink); font-weight: 800; letter-spacing: .02em; }
      #bar .tag2 { color: var(--dim); }
      #bar .sp { margin-left: auto; }
      #kappa { color: var(--accent); font: var(--holo-text-sm, .9rem) var(--mono); max-width: 40vw; }
      #kappa .lbl { color: var(--dim); margin-right: .4em; }

      /* ── controls ───────────────────────────────────────────────── */
      #controls { flex: 0 0 auto; display: flex; gap: .55rem; flex-wrap: wrap; align-items: center;
        padding: .6rem .8rem; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--panel) 60%, transparent); }
      .ctl { display: flex; flex-direction: column; gap: .2rem; }
      .ctl label { font: 700 .7rem var(--mono); letter-spacing: .08em; text-transform: uppercase; color: var(--dim); }
      #text { flex: 1 1 280px; min-width: 200px; }
      input, select, button { font: var(--holo-text-sm, 1rem) var(--mono); color: var(--ink);
        background: var(--bg); border: 1px solid var(--line); border-radius: var(--holo-radius-sm, 8px);
        padding: .5rem .65rem; min-height: 38px; }
      input:focus, select:focus { outline: none; border-color: var(--accent); }
      #font { min-width: 200px; }
      #layout { min-width: 150px; }
      #width { width: 96px; }
      .actions { display: flex; gap: .4rem; align-items: flex-end; margin-left: auto; }
      button { cursor: pointer; background: var(--panel); }
      button:hover { border-color: var(--accent); color: var(--ink); }
      button.cta { color: #06140a; background: var(--accent); border-color: var(--accent); font-weight: 700; }
      button.copied { color: var(--ok); border-color: var(--ok); }

      /* ── presets ────────────────────────────────────────────────── */
      #presets { flex: 0 0 auto; display: flex; gap: .35rem; flex-wrap: wrap; align-items: center;
        padding: .35rem .8rem; border-bottom: 1px solid var(--line); }
      #presets .plbl { color: var(--dim); font: 700 .7rem var(--mono); letter-spacing: .08em; text-transform: uppercase; margin-right: .2rem; }
      #presets button { padding: .25rem .55rem; min-height: 0; border-radius: 999px; font-size: .82rem; color: var(--dim); }
      #presets button.on { color: var(--accent); border-color: var(--accent); }

      /* ── stage ──────────────────────────────────────────────────── */
      #stage { flex: 1 1 auto; min-height: 0; position: relative; overflow: auto; padding: 1.1rem; }
      #art { margin: 0; font: 700 var(--holo-text-sm, 0.81rem)/1.05 var(--mono); color: var(--accent);
        white-space: pre; tab-size: 8; text-shadow: 0 0 18px color-mix(in srgb, var(--accent) 35%, transparent); }
      body.wrap #art { white-space: pre-wrap; word-break: break-all; }
      #empty { color: var(--dim); font: var(--holo-text-sm, 1rem) var(--mono); }

      /* ── status ─────────────────────────────────────────────────── */
      #status { flex: 0 0 auto; display: flex; align-items: center; gap: .7rem;
        padding: .35rem .8rem; border-top: 1px solid var(--line); background: var(--panel);
        font: .8rem var(--mono); color: var(--dim); }
      #status .sx { color: var(--accent); min-width: 1.2em; display: inline-block; }
      #status .dim { color: var(--dim); } #status .verok { color: var(--ok); }
      #status .err { color: var(--bad); }
    </style>
  </head>
  <body data-holo-boot="off">
    <!-- Entry splash: the shared Hologram "streaming" boot screen. ONE source of truth
         for every Holo app — only the app="…" name differs. Self-contained, offline,
         Shadow DOM; the bar auto-tracks this app's real boot time. -->
    <script src="./holo-splash.js"></script>
    <holo-splash app="Holo ASCII"></holo-splash>

    <div id="bar">
      <svg class="logo" viewBox="0 0 128 128" fill="currentColor"><g>
        <rect x="34" y="20" width="16" height="16" rx="2"/><rect x="54" y="20" width="16" height="16" rx="2"/><rect x="74" y="20" width="16" height="16" rx="2"/>
        <rect x="14" y="40" width="16" height="16" rx="2"/><rect x="94" y="40" width="16" height="16" rx="2"/>
        <rect x="14" y="60" width="16" height="16" rx="2"/><rect x="34" y="60" width="16" height="16" rx="2"/><rect x="54" y="60" width="16" height="16" rx="2"/><rect x="74" y="60" width="16" height="16" rx="2"/><rect x="94" y="60" width="16" height="16" rx="2"/>
        <rect x="14" y="80" width="16" height="16" rx="2"/><rect x="94" y="80" width="16" height="16" rx="2"/>
        <rect x="14" y="100" width="16" height="16" rx="2"/><rect x="94" y="100" width="16" height="16" rx="2"/>
      </g></svg>
      <span class="name">Holo ASCII</span>
      <span class="tag2">text → ASCII · 328 κ-fonts</span>
      <span class="sp"></span>
      <span id="kappa"><span class="lbl">font κ</span><span id="kappaval" data-holo-kappa-skip>—</span></span>
    </div>

    <div id="controls">
      <div class="ctl" id="text"><label for="textIn">Text</label>
        <input id="textIn" type="text" value="Hologram" autocomplete="off" spellcheck="false" /></div>
      <div class="ctl"><label for="font">Font</label>
        <input id="font" list="fonts" value="Graffiti" autocomplete="off" spellcheck="false" />
        <datalist id="fonts"></datalist></div>
      <div class="ctl"><label for="layout">Layout</label>
        <select id="layout">
          <option value="default">default</option>
          <option value="full">full width</option>
          <option value="fitted">fitted</option>
          <option value="controlled smushing">controlled smush</option>
          <option value="universal smushing">universal smush</option>
        </select></div>
      <div class="ctl"><label for="width">Width</label>
        <input id="width" type="number" min="0" max="400" step="1" value="80" /></div>
      <div class="actions">
        <button id="wrapBtn" title="Toggle line wrap">Wrap</button>
        <button id="dlBtn" title="Download as .txt">Download</button>
        <button id="copyBtn" class="cta" title="Copy ASCII to clipboard">Copy</button>
      </div>
    </div>

    <div id="presets"><span class="plbl">Quick</span></div>

    <div id="stage"><pre id="art"></pre><div id="empty" hidden>Type something above.</div></div>

    <div id="status">
      <span class="sx" id="spin"></span>
      <span id="stat">loading fonts…</span>
    </div>

    <script type="module">
      import { renderAscii, listFonts, loadFont, fontKappa, DEFAULT_FONT } from "holo-ascii";

      const $ = (id) => document.getElementById(id);
      const textIn = $("textIn"), fontIn = $("font"), layoutSel = $("layout"), widthIn = $("width");
      const art = $("art"), empty = $("empty"), statEl = $("stat"), spinEl = $("spin");
      const kappaVal = $("kappaval"), copyBtn = $("copyBtn"), dlBtn = $("dlBtn"), wrapBtn = $("wrapBtn");
      const FX = () => window.HoloFX;

      const PRESETS = ["Graffiti", "ANSI Shadow", "Standard", "Slant", "Big", "Doom", "Banner3", "Ghost"];
      let allFonts = [];

      // Build the quick-preset chips.
      for (const name of PRESETS) {
        const b = document.createElement("button");
        b.textContent = name; b.dataset.font = name;
        b.addEventListener("click", () => { fontIn.value = name; syncPresets(); render(); });
        $("presets").appendChild(b);
      }
      function syncPresets() {
        const cur = fontIn.value;
        for (const b of $("presets").querySelectorAll("button")) b.classList.toggle("on", b.dataset.font === cur);
      }

      function setStatus(msg, cls) { statEl.textContent = msg; statEl.className = cls || ""; }

      // Show the active font's dual-axis κ as a streaming-braille chip (HoloFX upgrades it).
      function showKappa(font) {
        const k = fontKappa(font);
        const fresh = document.createElement("span"); fresh.id = "kappaval";
        if (k) { fresh.setAttribute("data-holo-kappa", k); fresh.textContent = k; }
        else { fresh.textContent = "—"; fresh.setAttribute("data-holo-kappa-skip", ""); }
        kappaVal.replaceWith(fresh);
        // re-grab + upgrade
        const el = $("kappaval");
        if (k && FX() && FX().kappa) { try { FX().kappa(el, k, { width: 16 }); } catch (_) {} }
      }

      let seq = 0, spinHandle = null;
      async function render() {
        const text = textIn.value;
        const font = fontIn.value || DEFAULT_FONT;
        const layout = layoutSel.value;
        const width = parseInt(widthIn.value, 10);
        const mine = ++seq;

        // spinner while a (possibly uncached) font loads
        if (FX() && FX().spin) { if (spinHandle) spinHandle.stop(""); spinHandle = FX().spin(spinEl, "dna"); }
        setStatus(`rendering · ${font}…`);
        try {
          const out = await renderAscii(text, {
            font,
            horizontalLayout: layout && layout !== "default" ? layout : undefined,
            width: Number.isFinite(width) && width > 0 ? width : undefined,
          });
          if (mine !== seq) return; // a newer render superseded us
          art.textContent = out || "";
          empty.hidden = !!(out && out.trim());
          const lines = out ? out.split("\n") : [];
          const cols = lines.reduce((m, l) => Math.max(m, l.length), 0);
          if (spinHandle) { spinHandle.stop("◆"); spinHandle = null; }
          setStatus(`${font} · ${cols}×${lines.length} · κ-verified`, "verok");
          showKappa(font);
        } catch (e) {
          if (mine !== seq) return;
          if (spinHandle) { spinHandle.stop("✕"); spinHandle = null; }
          art.textContent = "";
          empty.hidden = false; empty.textContent = "Couldn't render that font.";
          setStatus(String(e && e.message || e), "err");
        }
      }

      // debounce typing
      let t = null;
      const debounced = () => { clearTimeout(t); t = setTimeout(render, 120); };
      textIn.addEventListener("input", debounced);
      widthIn.addEventListener("input", debounced);
      layoutSel.addEventListener("change", render);
      fontIn.addEventListener("change", () => { syncPresets(); render(); });

      // actions
      copyBtn.addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(art.textContent); }
        catch (_) { const ta = document.createElement("textarea"); ta.value = art.textContent; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
        copyBtn.classList.add("copied"); copyBtn.textContent = "Copied ✓";
        setTimeout(() => { copyBtn.classList.remove("copied"); copyBtn.textContent = "Copy"; }, 1200);
      });
      dlBtn.addEventListener("click", () => {
        const blob = new Blob([art.textContent], { type: "text/plain" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
        a.download = `${(textIn.value || "ascii").replace(/[^\w.-]+/g, "_").slice(0, 40)}.${fontIn.value || "txt"}.txt`;
        a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      });
      wrapBtn.addEventListener("click", () => { document.body.classList.toggle("wrap"); wrapBtn.classList.toggle("on", document.body.classList.contains("wrap")); });

      // boot: populate font list, then first render
      (async () => {
        try {
          allFonts = await listFonts();
          const dl = $("fonts");
          dl.innerHTML = allFonts.map((n) => `<option value="${n.replace(/"/g, "&quot;")}"></option>`).join("");
          setStatus(`${allFonts.length} fonts ready`);
        } catch (e) { setStatus("font list unavailable — " + (e.message || e), "err"); }
        syncPresets();
        render();
      })();
    </script>
  </body>
</html>
