<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Holo Files the native explorer for Hologram OS</title>
<link rel="icon" href="icon.svg" />
<link rel="stylesheet" href="_shared/holo-mobile.css" />
<!-- Holo UI (theme/look engine) + Holo UX (device-tier profile) — every object wears the one design
     system, and the host's native feel is resolved from holo-platform. No framework, no CDN (Law L4). -->
<!-- The ONE embed guard (holo-embed.js): sets html[data-embedded] before paint when hosted in the
     shell, so Files drops its own tab strip and never double-draws the frame. Standalone keeps it. -->
<script src="_shared/holo-embed.js"></script>
<script src="_shared/holo-ui-kernel.js"></script>
<script type="module" src="_shared/holo-ux.js"></script>
<script type="module" src="_shared/holo-object.js"></script>
<!-- Holo Cloud's data layer (HoloWebDAV, classic global) — so Files mounts the SAME content-addressed
     OPFS κ-store the Holo Cloud app uses: a file sent here appears there and vice versa. -->
<script src="_shared/holo-webdav.js"></script>
<style>
  :root{
    color-scheme: dark;
    --accent:#3aa0ff; --accent-ink:#fff;
    --bg:#0b0f17; --chrome:#0e131dF2; --panel:#121826; --panel2:#161d2c; --hover:#1b2433; --sel:#1f3553;
    --line:#222c3d; --line2:#2c3850; --ink:#e6ecf5; --dim:#9aa7bd; --faint:#6b7890;
    --ok:#34d399; --bad:#fb6f7d; --warn:#f5b545;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sys:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --r:10px; --side-w:236px; --details-w:300px; --row-h:30px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font:var(--holo-text-sm, 1rem)/1.5 var(--sys);-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;user-select:none}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  ::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#33415a;border:3px solid transparent;background-clip:content-box;border-radius:99px}
  ::-webkit-scrollbar-thumb:hover{background:#46587a;background-clip:content-box}

  /* ── command bar (the toolbar + breadcrumb address bar) ─────────────────────────────── */
  #bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--chrome);border-bottom:1px solid var(--line);
    backdrop-filter:blur(14px);flex:0 0 auto;height:46px}
  .nav{display:flex;gap:2px}
  .ico{width:30px;height:30px;border-radius: var(--holo-radius-sm, 8px);display:grid;place-items:center;color:var(--dim)}
  .ico:hover{background:var(--hover);color:var(--ink)} .ico:disabled{opacity:.32;background:none;cursor:default}
  .ico svg{width:17px;height:17px}
  #crumbs{flex:1;display:flex;align-items:center;gap:1px;min-width:0;height:30px;padding:0 6px;background:var(--panel);
    border:1px solid var(--line);border-radius: var(--holo-radius-sm, 8px);overflow:hidden}
  .crumb{display:flex;align-items:center;gap:5px;padding:3px 7px;border-radius:6px;color:var(--ink);white-space:nowrap;font-size: var(--holo-text-sm, 1rem)}
  .crumb:hover{background:var(--hover)} .crumb .sep{color:var(--faint);margin:0 -2px} .crumb.root{color:var(--dim)}
  .crumb svg{width:14px;height:14px;opacity:.85}
  #search{display:flex;align-items:center;gap:6px;width:200px;height:30px;padding:0 9px;background:var(--panel);
    border:1px solid var(--line);border-radius: var(--holo-radius-sm, 8px);color:var(--dim);transition:width .15s,border-color .15s}
  #search:focus-within{border-color:var(--accent);width:240px} #search input{flex:1;background:none;border:0;color:var(--ink);outline:none;font:inherit;min-width:0}
  #search svg{width:15px;height:15px}
  .views{display:flex;gap:1px;background:var(--panel);border:1px solid var(--line);border-radius: var(--holo-radius-sm, 8px);padding:2px}
  .vbtn{width:28px;height:24px;border-radius:6px;display:grid;place-items:center;color:var(--dim)}
  .vbtn:hover{color:var(--ink)} .vbtn.on{background:var(--accent);color:var(--accent-ink)} .vbtn svg{width:15px;height:15px}

  /* ── body: sidebar · main · details ─────────────────────────────────────────────────── */
  #body{flex:1;display:flex;min-height:0}
  #side{width:var(--side-w);flex:0 0 auto;background:var(--chrome);border-right:1px solid var(--line);overflow-y:auto;padding:8px 8px 20px}
  .sgroup{margin:6px 4px 4px;font:600 var(--holo-text-sm, 1rem) var(--sys);letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
  .sitem{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius: var(--holo-radius-sm, 8px);color:var(--ink);cursor:pointer;font-size: var(--holo-text-sm, 1rem)}
  .sitem:hover{background:var(--hover)} .sitem.on{background:var(--sel)} .sitem.on .si-ico{color:var(--accent)}
  .si-ico{width:18px;height:18px;flex:0 0 auto;color:var(--dim);display:grid;place-items:center} .si-ico svg{width:18px;height:18px}
  .sitem small{margin-left:auto;color:var(--faint);font:var(--holo-text-sm, 1rem) var(--mono)}

  #main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg)}
  #list{flex:1;overflow:auto;position:relative}

  /* table / details view */
  table.det{width:100%;border-collapse:collapse;font-size: var(--holo-text-sm, 1rem)}
  table.det thead th{position:sticky;top:0;background:var(--bg);text-align:left;color:var(--faint);font-weight:600;
    padding:7px 10px;border-bottom:1px solid var(--line);z-index:2;font-size: var(--holo-text-sm, 1rem);cursor:pointer;white-space:nowrap}
  table.det thead th:hover{color:var(--ink)}
  table.det td{padding:0 10px;height:var(--row-h);border-bottom:1px solid #ffffff08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0}
  table.det tr{cursor:default} table.det tbody tr:hover{background:var(--hover)} table.det tr.sel{background:var(--sel)!important}
  .nm{display:flex;align-items:center;gap:9px;min-width:0} .nm .gl{width:18px;height:18px;flex:0 0 auto}
  .nm .t{overflow:hidden;text-overflow:ellipsis} .kcell{font:var(--holo-text-sm, 1rem) var(--mono);color:var(--accent);opacity:.85}
  .vchip{display:inline-flex;align-items:center;gap:4px;font:var(--holo-text-sm, 1rem) var(--mono);color:var(--faint)}
  .vchip.ok{color:var(--ok)} .vchip.bad{color:var(--bad)} .vchip svg{width:12px;height:12px}

  /* list (compact) */
  .listv{padding:6px} .lrow{display:flex;align-items:center;gap:10px;padding:6px 9px;border-radius:7px;cursor:default}
  .lrow:hover{background:var(--hover)} .lrow.sel{background:var(--sel)} .lrow .meta{margin-left:auto;color:var(--faint);font:var(--holo-text-sm, 1rem) var(--mono)}

  /* grid / tiles */
  .grid{display:grid;gap:10px;padding:14px}
  .grid.icons{grid-template-columns:repeat(auto-fill,minmax(108px,1fr))}
  .grid.tiles{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
  .cell{border-radius:11px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:default;text-align:center;border:1px solid transparent}
  .cell:hover{background:var(--hover)} .cell.sel{background:var(--sel);border-color:var(--line2)}
  .cell .gl{width:46px;height:46px} .cell .cn{font-size: var(--holo-text-sm, 1rem);line-height:1.3;word-break:break-word;max-width:100%}
  .grid.tiles .cell{flex-direction:row;align-items:center;text-align:left;padding:12px} .grid.tiles .gl{width:38px;height:38px;flex:0 0 auto}
  .grid.tiles .ct{min-width:0} .grid.tiles .cn{font-size: var(--holo-text-sm, 1rem)} .grid.tiles .csub{font:var(--holo-text-sm, 1rem) var(--mono);color:var(--accent);opacity:.8;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* columns (Finder miller view) */
  .cols{display:flex;height:100%;overflow-x:auto}
  .col{width:240px;flex:0 0 auto;border-right:1px solid var(--line);overflow-y:auto;padding:5px}
  .col .lrow.sel{background:var(--sel)}
  .col .chev{margin-left:auto;color:var(--faint)}

  /* ── Home landing page (the Files "Home" tab) ───────────────────────────────────────── */
  #homepg{padding:26px 30px;overflow:auto;height:100%}
  .hhead{display:flex;align-items:center;gap:14px;margin-bottom:4px}
  .hhead img{width:40px;height:40px} .hhead h1{font-size:20px;margin:0;font-weight:650}
  .hsub{color:var(--dim);margin:2px 0 22px;font-size: var(--holo-text-sm, 1rem)}
  .qsec{font:600 var(--holo-text-sm, 1rem) var(--sys);letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:18px 0 10px}
  .qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .qcard{display:flex;align-items:center;gap:13px;padding:15px;background:var(--panel);border:1px solid var(--line);border-radius:13px;cursor:pointer;transition:transform .1s,border-color .1s,background .1s}
  .qcard:hover{transform:translateY(-1px);border-color:var(--line2);background:var(--panel2)}
  .qcard .qi{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;background:#0c1220;border:1px solid var(--line);color:var(--accent)} .qcard .qi svg{width:21px;height:21px}
  .qcard .qn{font-weight:600;font-size: var(--holo-text-sm, 1rem)} .qcard .qd{color:var(--faint);font-size: var(--holo-text-sm, 1rem);margin-top:2px}
  .qcard .qx{margin-left:auto;color:var(--faint);font:var(--holo-text-sm, 1rem) var(--mono)}

  /* ── details pane ───────────────────────────────────────────────────────────────────── */
  #details{width:var(--details-w);flex:0 0 auto;background:var(--chrome);border-left:1px solid var(--line);overflow-y:auto;display:none}
  #details.on{display:block} body.nodet #details{display:none}
  .dprev{height:172px;display:grid;place-items:center;background:radial-gradient(120% 90% at 50% 0,#15203400,#0a0e16);border-bottom:1px solid var(--line);overflow:hidden}
  .dprev .gl{width:74px;height:74px} .dprev img,.dprev .codeprev{max-width:100%;max-height:100%}
  .codeprev{font:var(--holo-text-sm, 1rem)/1.45 var(--mono);color:var(--dim);padding:12px;white-space:pre;overflow:hidden;width:100%;height:100%}
  .dpad{padding:16px} .dname{font-size: var(--holo-text-sm, 1rem);font-weight:650;word-break:break-word;display:flex;align-items:center;gap:8px}
  .dmeta{margin-top:14px;display:grid;gap:10px}
  .drow{display:grid;gap:3px} .drow .l{font:600 var(--holo-text-sm, 1rem) var(--sys);text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .drow .v{font-size: var(--holo-text-sm, 1rem);word-break:break-all} .drow .v.k{font:var(--holo-text-sm, 1rem) var(--mono);color:var(--accent)}
  .vbtnbig{margin-top:16px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:10px;
    background:var(--accent);color:var(--accent-ink);font-weight:600;border:1px solid var(--accent)}
  .vbtnbig:hover{filter:brightness(1.08)} .vbtnbig.ok{background:#0e2c22;border-color:var(--ok);color:var(--ok)} .vbtnbig.bad{background:#2c1014;border-color:var(--bad);color:var(--bad)}
  .vbtnbig svg{width:16px;height:16px}
  .lawnote{margin-top:10px;font-size: var(--holo-text-sm, 1rem);color:var(--faint);line-height:1.5}

  /* the κ re-derive ripple — a little magic when verifying (Law L5) */
  @keyframes ripple{0%{transform:scale(.4);opacity:.55}100%{transform:scale(2.4);opacity:0}}
  .ripple{position:absolute;inset:0;margin:auto;width:60px;height:60px;border-radius:50%;border:2px solid var(--accent);pointer-events:none;animation:ripple .9s ease-out forwards}

  /* ── status bar ─────────────────────────────────────────────────────────────────────── */
  #status{flex:0 0 auto;display:flex;align-items:center;gap:14px;height:26px;padding:0 12px;background:var(--chrome);
    border-top:1px solid var(--line);color:var(--faint);font:var(--holo-text-sm, 1rem) var(--sys)}
  #status .sp{margin-left:auto} #status b{color:var(--dim);font-weight:600} #status .k{color:var(--accent);font-family:var(--mono)}
  #status .badge{display:inline-flex;align-items:center;gap:5px;color:var(--ok)} #status .badge svg{width:12px;height:12px}

  /* empty + toast + context menu */
  .empty{position:absolute;inset:0;display:grid;place-content:center;text-align:center;color:var(--faint);gap:14px;padding:30px}
  .empty .ebtn{display:inline-flex;gap:8px;align-items:center;padding:9px 16px;border-radius:9px;background:var(--accent);color:var(--accent-ink);font-weight:600}
  #toast{position:fixed;left:50%;bottom:42px;transform:translate(-50%,12px);background:#0d1220f5;border:1px solid var(--line2);border-radius:99px;
    padding:8px 16px;font-size: var(--holo-text-sm, 1rem);opacity:0;pointer-events:none;transition:.18s;z-index:60;box-shadow:0 10px 30px #0008}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  #ctx{position:fixed;z-index:70;min-width:188px;background:#0e1422f7;border:1px solid var(--line2);border-radius:10px;padding:5px;
    box-shadow:0 16px 50px #000a;backdrop-filter:blur(12px);display:none}
  #ctx.on{display:block} .mi{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:7px;font-size: var(--holo-text-sm, 1rem);cursor:pointer}
  .mi:hover{background:var(--accent);color:var(--accent-ink)} .mi.sepb{border-top:1px solid var(--line);margin-top:4px;padding-top:10px}
  .mi svg{width:15px;height:15px;opacity:.85} .mi.danger{color:var(--bad)} .mi.danger:hover{background:var(--bad);color:#fff}
  /* the two consolidating popovers (view · ⋯) — abstract the toolbar's many controls into two buttons */
  .popmenu{position:fixed;z-index:70;min-width:208px;background:#0e1422f7;border:1px solid var(--line2);border-radius:10px;padding:5px;
    box-shadow:0 16px 50px #000a;backdrop-filter:blur(12px);display:none}
  .popmenu.on{display:block}
  .popmenu .views{display:flex;flex-direction:column;gap:1px}
  .popmenu .mi,.popmenu .vbtn{width:100%;height:auto;justify-content:flex-start;gap:10px;padding:8px 11px;border-radius:7px;
    background:none;border:0;color:var(--ink);font:inherit;text-align:left;cursor:pointer}
  .popmenu .mi span,.popmenu .vbtn span{font-size:var(--holo-text-sm,1rem)}
  .popmenu .mi:hover,.popmenu .vbtn:hover{background:var(--accent);color:var(--accent-ink)}
  .popmenu .vbtn.on{background:var(--accent);color:var(--accent-ink)}
  .popmenu .mi svg,.popmenu .vbtn svg{width:16px;height:16px;opacity:.9;flex:0 0 auto}
  #dualToggle.on,#detailsToggle.on{background:color-mix(in srgb,var(--accent) 22%,transparent)}

  /* ── per-OS skins — the same model, the host's native chrome ────────────────────────── */
  html[data-os="macos"], html[data-os="ios"], html[data-os="ipados"]{ --r:9px }
  html[data-os="macos"] #bar, html[data-os="ipados"] #bar{justify-content:flex-start} /* Finder toolbar feel */
  html[data-os="macos"] #crumbs, html[data-os="ipados"] #crumbs{background:transparent;border-color:transparent}
  html[data-os="macos"] #side, html[data-os="ios"] #side, html[data-os="ipados"] #side{background:#10141cd9}
  html[data-os="windows"] .views .vbtn.on{border-radius:6px} /* Fluent */
  html[data-os="windows"] #crumbs{border-radius:5px} html[data-os="windows"] #search{border-radius:5px}
  html[data-os="android"] #bar, html[data-os="ios"] #bar{height:52px}
  html[data-os="android"] .sitem, html[data-os="ios"] .sitem{padding:11px 10px;font-size: var(--holo-text-sm, 1rem)} /* bigger touch targets */
  html[data-os="android"] table.det td, html[data-os="ios"] table.det td{height:42px}
  html[data-os="linux"] #crumbs .crumb{background:var(--panel2);border:1px solid var(--line);margin-right:3px;border-radius:7px} /* Adwaita pathbar pills */
  html[data-touch="1"] ::-webkit-scrollbar{width:0}
</style>
</head>
<body class="nodet">
    <!-- Entry splash: the shared Hologram "streaming" boot screen. ONE source of truth
         for every Holo app — only the app="…" name differs. Self-contained, offline,
         Shadow DOM; the bar auto-tracks this app's real boot time. -->
    <script src="./holo-splash.js"></script>
    <holo-splash app="Holo Files"></holo-splash>

  <!-- tab strip -->
  <div id="tabs">
    <div class="tabstrip" id="tabstrip"></div>
    <button class="ico tabadd" id="tabadd" title="New tab">{i:plus}</button>
  </div>
  <!-- command bar — nav · address · search · view · ⋯  (everything else folds into the two menus) -->
  <div id="bar">
    <div class="nav">
      <button class="ico" id="back" title="Back" disabled>{i:back}</button>
      <button class="ico" id="fwd" title="Forward" disabled>{i:fwd}</button>
      <button class="ico" id="up" title="Up" disabled>{i:up}</button>
      <button class="ico" id="refresh" title="Refresh">{i:refresh}</button>
      <button class="ico" id="cmdbtn" title="Commands (Ctrl/⌘ P)">⌘</button>
    </div>
    <div id="crumbs"></div>
    <div id="search"><span>{i:search}</span><input id="q" placeholder="Search" autocomplete="off" spellcheck="false"/></div>
    <button class="ico" id="viewBtn" title="View" aria-haspopup="menu">{i:vdetails}</button>
    <button class="ico" id="moreBtn" title="More" aria-haspopup="menu">{i:more}</button>
  </div>
  <!-- view menu — one button opens the five layouts -->
  <div id="viewmenu" class="popmenu" role="menu">
    <div class="views" id="views">
      <button class="vbtn" data-v="details" title="Details">{i:vdetails}<span>Details</span></button>
      <button class="vbtn" data-v="list" title="List">{i:vlist}<span>List</span></button>
      <button class="vbtn" data-v="tiles" title="Tiles">{i:vtiles}<span>Tiles</span></button>
      <button class="vbtn" data-v="grid" title="Icons">{i:vgrid}<span>Icons</span></button>
      <button class="vbtn" data-v="columns" title="Columns">{i:vcolumns}<span>Columns</span></button>
    </div>
  </div>
  <!-- overflow menu — the less-frequent actions, abstracted away -->
  <div id="moremenu" class="popmenu" role="menu">
    <button class="mi" id="newfolder" title="New folder" style="display:none">{i:newfolder}<span>New folder</span></button>
    <button class="mi" id="emptybin" title="Empty Recycle Bin" style="display:none">🗑<span>Empty Recycle Bin</span></button>
    <button class="mi" id="sortBtn" title="Sort & group">{i:sort}<span>Sort &amp; group</span></button>
    <button class="mi" id="dualToggle" title="Dual pane">{i:splitpane}<span>Dual pane</span></button>
    <button class="mi" id="detailsToggle" title="Details pane">{i:info}<span>Details pane</span></button>
  </div>

  <div id="body">
    <!-- sidebar -->
    <nav id="side" aria-label="Locations"></nav>
    <!-- main -->
    <div id="main">
      <div id="list"></div>
    </div>
    <!-- second pane (dual-pane) -->
    <div id="pane2" aria-label="Second pane">
      <div id="p2bar">
        <button class="ico" id="p2back" title="Back">{i:back}</button>
        <button class="ico" id="p2up" title="Up">{i:up}</button>
        <div id="p2crumbs"></div>
        <button class="ico" id="p2close" title="Close pane">{i:x}</button>
      </div>
      <div id="p2list"></div>
    </div>
    <!-- details -->
    <aside id="details" aria-label="Details"></aside>
  </div>

  <!-- status -->
  <div id="status">
    <span id="st-count"></span>
    <span id="st-sel"></span>
    <span class="sp"></span>
    <span class="badge">{i:shield}<span>content-addressed</span></span>
  </div>

  <div id="toast"></div>
  <div id="ctx"></div>

<script type="module">
import HoloFiles, { fmtBytes, kindOf, extOf } from "./_shared/holo-files.js";

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const root = document.documentElement;

/* ── inline icon set (content-light, no CDN) — file glyphs + chrome glyphs ───────────── */
const I = {
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>',
  fwd:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0114.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0020.5 15"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  newfolder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M12 11v4M10 13h4"/></svg>',

// inflate {i:name} placeholders in the static HTML
document.body.innerHTML = document.body.innerHTML.replace(/\{i:(\w+)\}/g, (_, n) => I[n] || "");
const glyphFor = (n) => n.kind === "dir" ? I.folder : n.kind === "app" ? I.app : n.kind === "location" ? (I[n.glyph]||I.drive) : I[kindOf(n.name)] || I.file;

/* ── native-OS adaptation (the same shell, tuned to the host) ───────────────────────── */
const P = HoloFiles.platform();
const SKIN = HoloFiles.skinFor(P);
root.setAttribute("data-os", P.os);
root.setAttribute("data-touch", P.touch ? "1" : "0");
// Embedded in a holospace (an iframe in the shell)? The holospace already provides tabs + a frame,
// so drop our OWN tab strip — one toolbar, no overlap, a clean native-explorer window.
try { if (window.self !== window.top) root.setAttribute("data-embedded", "1"); } catch (e) { root.setAttribute("data-embedded", "1"); }
root.style.setProperty("--accent", P.accent || "#3aa0ff");
if (P.font) root.style.setProperty("--sys", P.font);
document.title = "Holo Files";   // the OS is implicit in the native chrome — not stated in the window
const mod = (e) => P.apple ? e.metaKey : e.ctrlKey;

/* ── state + history ────────────────────────────────────────────────────────────────── */
let view = localStorage.getItem("holo.files.view") || SKIN.defaultView || "details";
let trail = [];                 // breadcrumb stack of nodes (trail[0] = a location)
let items = [];                 // current listing
let sel = null;                 // selected node
let sortKey = "name", sortDir = 1;
let groupBy = localStorage.getItem("holo.files.group") || "none";
(()=>{ try{ const s=(localStorage.getItem("holo.files.sort")||"").split(":"); if(s[0]){ sortKey=s[0]; sortDir=+s[1]||1; } }catch{} })();
let histBack = [], histFwd = [];
let selSet = new Set();          // multi-select: node ids
let anchorIdx = -1;              // shift-range anchor
let tabs = [], activeTab = 0;    // each tab owns its trail/history/view/selection
let dragSrc = null;              // drag-and-drop: the node(s) being dragged
let dragFromPane = null;         // which pane a drag started in ('a' = main, 'b' = second pane)
let dualOn = false;              // dual-pane on?
let p2 = { trail:[], hist:[], items:[], sel:null };   // the second pane's independent state
const listCache = new Map();    // node.id → children (for columns + speed)
const toast = (m) => { const t = $("#toast"); t.textContent = m; t.classList.add("show"); clearTimeout(toast._); toast._ = setTimeout(() => t.classList.remove("show"), 1900); };

async function childrenOf(n){ if(listCache.has(n.id)) return listCache.get(n.id); const c = await HoloFiles.list(n); listCache.set(n.id, c); return c; }

/* ── sidebar ────────────────────────────────────────────────────────────────────────── */
const LOCS = HoloFiles.ROOTS();
/* ── file tags — colored + persisted; content files follow their κ (tag once → tagged everywhere) ── */
const TAGS=[{id:"red",name:"Red",color:"#ff5f57"},{id:"orange",name:"Orange",color:"#febc2e"},{id:"yellow",name:"Yellow",color:"#f5d90a"},{id:"green",name:"Green",color:"#34d399"},{id:"blue",name:"Blue",color:"#3aa0ff"},{id:"purple",name:"Purple",color:"#a78bfa"},{id:"gray",name:"Gray",color:"#9aa7bd"}];
const TAGMAP=Object.fromEntries(TAGS.map(t=>[t.id,t]));
let tagStore=(()=>{ try{ return JSON.parse(localStorage.getItem("holo.files.tags")||"{}")||{}; }catch{ return {}; } })();
const saveTags=()=>{ try{ localStorage.setItem("holo.files.tags",JSON.stringify(tagStore)); }catch{} };
const tagKey=(n)=> n&&n.did?("κ:"+String(n.did).split(":").pop()):((n&&n.path)||(n&&n.name)||"");
const tagsOf=(n)=> tagStore[tagKey(n)]||[];
function toggleTag(n,id){ const k=tagKey(n); const s=new Set(tagStore[k]||[]); s.has(id)?s.delete(id):s.add(id); if(s.size) tagStore[k]=[...s]; else delete tagStore[k]; saveTags(); }
const tagDots=(n)=>{ const t=tagsOf(n); return t.length?`<span class="tagdots">${t.slice(0,4).map(id=>`<i class="td" style="background:${(TAGMAP[id]||{}).color||'#888'}"></i>`).join("")}</span>`:""; };
function refreshTags(){ if(!searchMode && !isHome() && view!=="columns"){ try{ renderListing(); markSelection(); }catch{} } renderSide(); if(sel) renderDetails(sel); }
async function filterByTag(id){
  searchMode=true; sel=null; const list=$("#list"); list.innerHTML=`<div class="empty">Gathering tagged objects…</div>`;
  const out=[];
  for(const k in tagStore){ if(!tagStore[k].includes(id)) continue;
    if(k.startsWith("κ:")){ try{ const r=await HoloFiles.resolveInput("holo://"+k.slice(2)); if(r&&r.kind==="node") out.push(r.node); }catch{} }
    else if(k.startsWith("/")){ out.push({ id:"tag:"+k, name:k.split("/").pop(), path:k, kind:"file", source:"opfs", did:"", bytes:null, mime:HoloFiles.mimeOf(k) }); }
  }
  items=out; const t=TAGMAP[id]||{name:id,color:"#888"};
  list.innerHTML=`<div class="srhead"><span><i class="td" style="display:inline-block;width:10px;height:10px;background:${t.color};vertical-align:middle"></i> ${out.length} object${out.length===1?"":"s"} tagged <b>${esc(t.name)}</b></span></div>`+(out.length?`<div class="listv">`+out.map((n,i)=>rowList(n,i)).join("")+`</div>`:`<div class="empty" style="position:static;padding:30px">No objects with this tag yet.</div>`);
  wireRows(); setStatus();
}

function renderSide(){
  const side = $("#side");
  const used={}; for(const k in tagStore) for(const id of tagStore[k]) used[id]=(used[id]||0)+1;
  const tagItems = TAGS.filter(t=>used[t.id]);
  side.innerHTML = `<div class="sgroup">Locations</div>` + LOCS.map((l,i)=>
    `<div class="sitem" data-loc="${i}"><span class="si-ico">${I[l.glyph]||I.drive}</span><span>${l.name}</span></div>`).join("")
    + (tagItems.length?`<div class="sgroup">Tags</div>`+tagItems.map(t=>`<div class="sitem tagitem" data-tag="${t.id}"><span class="si-ico"><i class="td" style="background:${t.color};width:11px;height:11px"></i></span><span>${t.name}</span><small>${used[t.id]}</small></div>`).join(""):"")
    + `<div class="sgroup">Pinned</div>` + LOCS.slice(0,3).map((l,i)=>
    `<div class="sitem" data-loc="${i}" style="opacity:.85"><span class="si-ico">${I[l.glyph]||I.drive}</span><span>${l.name}</span></div>`).join("");
  $$("#side .sitem[data-loc]").forEach(el=> el.onclick = ()=> openLocation(LOCS[+el.dataset.loc]));
  $$("#side .tagitem").forEach(el=> el.onclick = ()=> filterByTag(el.dataset.tag));
  markSide();
}
function markSide(){ const cur = trail[0]; $$("#side .sitem").forEach(el=> el.classList.toggle("on", cur && LOCS[+el.dataset.loc] && LOCS[+el.dataset.loc].source===cur.source && LOCS[+el.dataset.loc].path===cur.path)); }

/* ── navigation ─────────────────────────────────────────────────────────────────────── */
function openLocation(loc, push=true){ if(push) pushHist(); trail = [loc]; sel=null; selSet.clear(); anchorIdx=-1; render(); }
async function drillInto(n, push=true){
  if(n.source==="trash"){ await HoloFiles.restoreTrash(n); listCache.clear(); render(); toast("Restored "+n.name); return; }   // opening a bin item restores it
  if(n.kind==="file"){ select(n); return; }
  if(push) pushHist();
  trail = [...trail, n]; sel=null; selSet.clear(); anchorIdx=-1; render();
}
function crumbTo(i){ pushHist(); trail = trail.slice(0, i+1); sel=null; selSet.clear(); anchorIdx=-1; render(); }
function up(){ if(trail.length>1){ pushHist(); trail.pop(); sel=null; selSet.clear(); anchorIdx=-1; render(); } }
function pushHist(){ histBack.push(trail.slice()); histFwd.length=0; }
function back(){ if(!histBack.length) return; histFwd.push(trail.slice()); trail = histBack.pop(); sel=null; selSet.clear(); anchorIdx=-1; render(); }
function fwd(){ if(!histFwd.length) return; histBack.push(trail.slice()); trail = histFwd.pop(); sel=null; selSet.clear(); anchorIdx=-1; render(); }

const cur = () => trail[trail.length-1];
const isHome = () => trail.length===0;

/* ── render ─────────────────────────────────────────────────────────────────────────── */
async function render(){
  if(searchMode){ searchMode=false; const q=$("#q"); if(q && q.value) q.value=""; }   // navigating exits search
  if(tabs[activeTab]) tabs[activeTab].trail=trail; renderTabs();                       // keep the active tab label live
  $("#back").disabled = !histBack.length; $("#fwd").disabled = !histFwd.length; $("#up").disabled = trail.length<=1;
  markSide(); renderCrumbs();
  const list = $("#list");
  if(isHome()){ renderHome(); $("#newfolder").style.display="none"; setStatus(); return; }
  const node = cur();
  $("#newfolder").style.display = (node.source==="opfs"||node.source==="desktop") ? "" : "none";
  $("#emptybin").style.display = (node.source==="trash") ? "" : "none";
  list.innerHTML = `<div class="empty">Loading…</div>`;
  let kids; try{ kids = await childrenOf(node); }catch(e){ list.innerHTML = `<div class="empty">Couldn't read this location.<div style="color:var(--faint);font:var(--holo-text-sm, 1rem) var(--mono)">${(e.message||e)}</div></div>`; return; }
  items = sortItems(applyFilter(kids));
  if(view==="columns") renderColumns(); else { renderListing(); markSelection(); }
  setStatus(); if(sel) renderDetails(sel);
}
function renderCrumbs(){
  const c = $("#crumbs");
  if(isHome()){ c.innerHTML = `<span class="crumb root">${I.home}<span>Home</span></span>`; return; }
  c.innerHTML = trail.map((n,i)=>{
    const g = n.kind==="location" ? (I[n.glyph]||I.drive) : "";
    return `<span class="crumb${i===0?' root':''}" data-i="${i}">${g}<span>${esc(n.name)}</span></span>${i<trail.length-1?`<span class="sep">${I.chev.replace(/width="2"/, 'width="1.6"')}</span>`:""}`;
  }).join("");
  $$("#crumbs .crumb").forEach(el=> el.dataset.i!=null && (el.onclick = ()=> crumbTo(+el.dataset.i)));
}

function renderListing(){
  const list = $("#list");
  if(!items.length){ list.innerHTML = emptyState(); wireEmpty(); return; }
  const groups = groupsOf();
  if(view==="details") list.innerHTML = tableView(groups);
  else if(view==="list") list.innerHTML = groups.map(g=>(g.key?`<div class="grouphdr">${esc(g.key)}<small>${g.idxs.length}</small></div>`:"")+`<div class="listv">`+g.idxs.map(i=>rowList(items[i],i)).join("")+`</div>`).join("");
  else list.innerHTML = `<div class="grid ${view==="tiles"?"tiles":"icons"}">`+items.map((n,i)=>cellView(n,i,view)).join("")+`</div>`;
  wireRows();
}
function tableView(groups){
  const h = (k,l)=>`<th data-k="${k}">${l}${sortKey===k?(sortDir>0?" ▲":" ▼"):""}</th>`;
  let body="";
  for(const g of groups){
    if(g.key) body += `<tr class="grouphdr"><td colspan="5">${esc(g.key)}<small>${g.idxs.length}</small></td></tr>`;
    body += g.idxs.map(i=>{ const n=items[i], s=statusOf(n); return `<tr data-i="${i}" class="${sel&&sel.id===n.id?'sel':''}">
        <td><div class="nm"><span class="gl" style="color:${tint(n)}">${glyphFor(n)}</span><span class="t">${esc(n.name)}</span>${tagDots(n)}</div></td>
        <td class="kcell">${kshort(n.did)}</td>
        <td style="color:var(--dim)">${n.bytes!=null?fmtBytes(n.bytes):""}</td>
        <td style="color:var(--dim)">${typeLabel(n)}</td>
        <td><span class="gstat ${s.cls}">${s.label?`<i class="gdot"></i>${s.label}`:""}</span></td>
      </tr>`; }).join("");
  }
  return `<table class="det"><thead><tr>${h("name","Name")}${h("did","Content address (κ)")}${h("bytes","Size")}${h("kind","Type")}<th title="Sealed = κ-pinned + immutable · Local = your editable working copy (the content-addressed analog of git status)">Status</th></tr></thead><tbody>${body}</tbody></table>`;
}
const rowList = (n,i)=>`<div class="lrow ${sel&&sel.id===n.id?'sel':''}" data-i="${i}"><span class="gl" style="width:18px;height:18px;color:${tint(n)}">${glyphFor(n)}</span><span class="t">${esc(n.name)}</span>${tagDots(n)}<span class="meta">${n.did?kshort(n.did):(n.role||"")} ${n.bytes!=null?'· '+fmtBytes(n.bytes):''}</span></div>`;

  ? `<div class="cell sel-${sel&&sel.id===n.id} ${sel&&sel.id===n.id?'sel':''}" data-i="${i}"><span class="gl" style="color:${tint(n)}">${glyphFor(n)}</span><div class="ct"><div class="cn">${esc(n.name)}</div><div class="csub">${n.did?kshort(n.did):typeLabel(n)}</div></div></div>`

async function renderColumns(){
  const list = $("#list");
  // build a column per trail level by listing each level's children, highlighting the next-in-trail
  const cols = [];
  for(let i=0;i<trail.length;i++){
    let kids=[]; try{ kids = await childrenOf(trail[i]); }catch{}
    kids = sortItems(kids);
    const nextSel = trail[i+1];
    cols.push(`<div class="col" data-level="${i}">`+kids.map((n,j)=>{
      const on = nextSel && nextSel.id===n.id || (sel && i===trail.length-1 && sel.id===n.id);
      return `<div class="lrow ${on?'sel':''}" data-level="${i}" data-name="${esc(n.name)}"><span class="gl" style="width:16px;height:16px;color:${tint(n)}">${glyphFor(n)}</span><span class="t">${esc(n.name)}</span>${(n.kind==='dir'||n.kind==='app')?`<span class="chev">${I.chev}</span>`:""}</div>`;
    }).join("")+`</div>`);
    columnCache[i]=kids;
  }
  list.innerHTML = `<div class="cols">`+cols.join("")+`</div>`;
  $$(".cols .col").forEach(col=>{ const lvl=+col.dataset.level; $$(".lrow",col).forEach((r,j)=>{ r.onclick=()=>{ const n=columnCache[lvl][j]; trail=trail.slice(0,lvl+1); if(n.kind==='dir'||n.kind==='app') drillInto(n,true); else { trail=trail.slice(0,lvl+1); select(n);} }; }); });
  const c = list.querySelector(".cols"); if(c) c.scrollLeft = c.scrollWidth;
}
const columnCache = {};

function wireRows(){
  $$("#list [data-i]").forEach(el=>{
    const n = items[+el.dataset.i];
    el.onclick = (e)=>{ select(n, e); };
    el.ondblclick = ()=>{ (n.kind==="dir"||n.kind==="app") ? drillInto(n) : openFile(n); };
    el.oncontextmenu = (e)=>{ e.preventDefault(); if(!selSet.has(n.id)) select(n); openCtx(e, n); };
    // drag-and-drop: every FILE drags OUT carrying its holo://κ (paste anywhere) + the real bytes
    // (drop onto the desktop / another app). Home files are also internal-move sources; Home folders
    // accept drops (move). A κ link dropped IN materializes (handled on #main).
    if(n.kind==="file" || n.source==="opfs"){
      el.setAttribute("draggable","true");
      el.addEventListener("dragstart",(e)=>{
        dragSrc = (selSet.has(n.id)&&selSet.size>1) ? selectedNodes() : [n]; dragFromPane="a";
        el.classList.add("dragging");
        try{
          const link = holoLinkOf(n);                                  // holo://<hex> — sync if the κ is known/prewarmed
          if(link){ e.dataTransfer.setData("text/uri-list", link+"\r\n"); e.dataTransfer.setData("text/plain", link); }
          const warm = dragBlobs.get(n.id);                            // the real bytes → a droppable file on the OS
          if(warm) e.dataTransfer.setData("DownloadURL", `${warm.mime}:${n.name}:${warm.url}`);
          e.dataTransfer.effectAllowed = "copyMove";
        }catch{}
      });
      el.addEventListener("dragend",()=>{ el.classList.remove("dragging"); dragSrc=null; dragFromPane=null; $$(".dropok").forEach(x=>x.classList.remove("dropok")); });
      if((n.source==="opfs" || n.source==="desktop") && n.kind==="dir"){
        el.addEventListener("dragover",(e)=>{ if(dragSrc){ e.preventDefault(); e.stopPropagation(); el.classList.add("dropok"); } });
        el.addEventListener("dragleave",()=> el.classList.remove("dropok"));
        el.addEventListener("drop", async (e)=>{ if(!dragSrc) return; e.preventDefault(); e.stopPropagation(); el.classList.remove("dropok"); const srcs=dragSrc; dragSrc=null;
          if(n.source==="desktop"){ srcs.filter(s=>s.source==="desktop").forEach(s=> HoloFiles.deskMove(s, n)); return; }   // desktop move → the shell applies (unification)
          await dropAcross(n.path, srcs); });
      }
    }
  });
  $$("table.det thead th[data-k]").forEach(th=> th.onclick = ()=>{ const k=th.dataset.k; if(sortKey===k) sortDir=-sortDir; else {sortKey=k;sortDir=1;} render(); });
}
function select(n, e){
  const idx = items.indexOf(n);
  if(e && (e.metaKey||e.ctrlKey)){                              // toggle one
    if(selSet.has(n.id)){ selSet.delete(n.id); if(sel&&sel.id===n.id) sel=lastSel(); }
    else { selSet.add(n.id); sel=n; }
    anchorIdx=idx;
  } else if(e && e.shiftKey && anchorIdx>=0){                   // range
    const a=Math.min(anchorIdx,idx), b=Math.max(anchorIdx,idx);
    selSet=new Set(items.slice(a,b+1).map(x=>x.id)); sel=n;
  } else { selSet=new Set([n.id]); anchorIdx=idx; sel=n; }      // single
  markSelection();
  if(sel){ document.body.classList.toggle("nodet",false); $("#details").classList.add("on"); renderDetails(sel); if(sel.kind==="file") prewarmDrag(sel); }
  setStatus();
}
function lastSel(){ let id=null; for(const x of selSet) id=x; return items.find(n=>n.id===id)||null; }
function markSelection(){ $$("#list [data-i]").forEach(el=>{ const it=items[+el.dataset.i]; el.classList.toggle("sel", !!(it && selSet.has(it.id))); }); }
function selectedNodes(){ return items.filter(n=>selSet.has(n.id)); }

/* ── drag-out-as-κ: a selected file is pre-warmed into a blob (the real bytes) + its holo://κ, so
   dragging it OUT lands a droppable file on the desktop AND a content-address link in any text field. */
const dragBlobs = new Map();          // node.id → { url, mime, link }
function holoLinkOf(n){ const w=dragBlobs.get(n.id); if(w&&w.link) return w.link; if(n.did) return "holo://"+String(n.did).split(":").pop(); return ""; }
async function prewarmDrag(n){
  if(!n || n.kind!=="file" || dragBlobs.has(n.id)) return;
  if(n.bytes!=null && n.bytes>32*1024*1024) return;          // cap pre-warm to keep selection snappy
  try{ const {bytes,mime}=await HoloFiles.read(n,32*1024*1024); const url=URL.createObjectURL(new Blob([bytes],{type:mime||"application/octet-stream"})); const hex=n.did?String(n.did).split(":").pop():await sha256hexLocal(bytes); dragBlobs.set(n.id,{ url, mime:mime||"application/octet-stream", link:"holo://"+hex }); }catch{}
}

async function preview(n){
  if(n.kind!=="file") return;
  const k = kindOf(n.name); const box = $("#dprev"); if(!box) return;
  if(k==="image"){ try{ const {bytes,mime}=await HoloFiles.read(n, 1<<20); const url=URL.createObjectURL(new Blob([bytes],{type:mime})); box.innerHTML=`<img src="${url}" alt="">`; }catch{} }

async function doVerify(n, btn){
  btn.disabled=true; const box=$("#dprev"); const rip=document.createElement("div"); rip.className="ripple"; box&&box.appendChild(rip); setTimeout(()=>rip.remove(),900);
  btn.innerHTML = I.shield+"<span>Re-deriving…</span>";
  let r; try{ r = await HoloFiles.verify(n); }catch(e){ r={ok:false, reason:e.message||String(e)}; }
  btn.disabled=false;
  if(r.ok===true){ btn.className="vbtnbig ok"; btn.innerHTML=I.verified+"<span>Verified κ re-derives (Law L5)</span>"; toast("✓ "+n.name+" re-derives to its content address"); }
  else if(r.ok===false){ btn.className="vbtnbig bad"; btn.innerHTML=I.x+"<span>Refused bytes do not match κ</span>"; toast("✗ "+(r.reason||"content address mismatch")); }
  else { btn.className="vbtnbig"; btn.innerHTML=I.shield+"<span>"+(r.reason||"no pinned κ")+"</span>"; toast(r.reason||"no pinned κ to check"); }
}

function copySel(){ const ns=clipNodes(); if(!ns.length) return; clip={mode:"copy",nodes:ns,source:cur().source}; toast(`Copied ${ns.length} item${ns.length===1?"":"s"}`); }
function cutSel(){ const ns=clipNodes(); if(!ns.length) return; clip={mode:"cut",nodes:ns,source:cur().source}; markSelection(); toast(`Cut ${ns.length} item${ns.length===1?"":"s"} · paste to move`); }
async function uniqueName(name){ const have=new Set((await childrenOf(cur())).map(k=>k.name)); if(!have.has(name)) return name; const d=name.lastIndexOf("."); const b=d>0?name.slice(0,d):name, x=d>0?name.slice(d):""; let i=1,c; do{ c=`${b} (copy${i>1?" "+i:""})${x}`; i++; }while(have.has(c)); return c; }

  if(clip.source==="opfs" && dest.source==="opfs"){ let ok=0; for(const n of clip.nodes){ try{ if(clip.mode==="copy"){ await HoloFiles.copyHome(n.path, dest.path, await uniqueName(n.name)); } else { await HoloFiles.moveHome(n.path, dest.path); } ok++; }catch{} } listCache.clear(); if(clip.mode==="cut") clip=null; sel=null; selSet.clear(); render(); toast(`Pasted ${ok} item${ok===1?"":"s"}`); return; }
  if(clip.source==="desktop" && dest.source==="desktop"){ for(const n of clip.nodes){ clip.mode==="copy"?HoloFiles.deskCopy(n,dest):HoloFiles.deskMove(n,dest); } if(clip.mode==="cut") clip=null; toast("Pasted"); return; }

  const desk=all.filter(n=>n.source==="desktop"); if(desk.length){ if(!confirm(`Delete ${desk.length===1?desk[0].name:desk.length+" items"} from the desktop?`)) return; desk.forEach(n=>HoloFiles.deskRemove(n)); sel=null; selSet.clear(); toast(`Deleted ${desk.length} item${desk.length===1?"":"s"}`); return; }
  const tr=all.filter(n=>n.source==="trash"); if(tr.length){ if(!confirm(`Permanently delete ${tr.length===1?tr[0].name:tr.length+" items"}? This cannot be undone.`)) return; for(const n of tr){ try{ await HoloFiles.removeTrash(n); }catch{} } listCache.clear(); sel=null; selSet.clear(); render(); toast(`Permanently deleted ${tr.length} item${tr.length===1?"":"s"}`); return; }

}
function applyFilter(list){ const q=$("#q").value.trim().toLowerCase(); return q?list.filter(n=>n.name.toLowerCase().includes(q)):list; }
function sortItems(list){
  const key=sortKey; const dir=(n)=> n.kind==="dir"||n.kind==="app"?0:1;
  return list.slice().sort((a,b)=> dir(a)-dir(b) || cmp(a,b)*sortDir );
  function cmp(a,b){ if(key==="bytes") return (a.bytes||0)-(b.bytes||0); if(key==="kind") return typeLabel(a).localeCompare(typeLabel(b)); if(key==="did") return (a.did||"").localeCompare(b.did||""); return a.name.localeCompare(b.name,undefined,{numeric:true}); }
}
const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const kshort=(d)=>{ const h=String(d||"").split(":").pop(); return h?h.slice(0,10)+"…":""; };

/* ── Command palette (Ctrl/⌘+P) — fuzzy-run any explorer action, like VS Code / Files ── */
const modLabel=(k)=> (P.apple?"⌘":"Ctrl")+" "+k;
let _palItems=[], _palSel=0;
function paletteCommands(){
  const C=[]; const add=(label,run,hint)=>C.push({label,run,hint:hint||""});
  add("New folder",()=>$("#newfolder").click(),"new");
  if(sel) add("Rename",()=>renameSel(),"F2");
  if(sel||selSet.size) add("Delete",()=>deleteSel(),"Del");
  if(sel||selSet.size){ add("Copy",()=>copySel(),modLabel("C")); add("Cut",()=>cutSel(),modLabel("X")); }
  add("Paste",()=>pasteHere(),modLabel("V"));
  add("Select all",()=>{ if(items.length){ selSet=new Set(items.map(n=>n.id)); sel=items[items.length-1]; anchorIdx=items.length-1; markSelection(); setStatus(); } },modLabel("A"));
  add("Refresh",()=>{ listCache.clear(); render(); },modLabel("R"));
  ["details","list","tiles","grid","columns"].forEach(v=>add("View: "+v.charAt(0).toUpperCase()+v.slice(1),()=>setView(v),"view"));
  add("Sort by name",()=>{ sortKey="name"; sortDir=1; render(); },"sort");
  add("Sort by size",()=>{ sortKey="bytes"; sortDir=-1; render(); },"sort");
  add("Sort by type",()=>{ sortKey="kind"; sortDir=1; render(); },"sort");
  LOCS.forEach(l=>add("Go to "+l.name,()=>openLocation(l),"go"));

function paintPalette(term){ const all=paletteCommands(); const t=term.trim().toLowerCase(); _palItems=t?all.filter(c=>c.label.toLowerCase().includes(t)):all; _palSel=0;
  const l=$("#cmdpl"); l.innerHTML=_palItems.length?_palItems.map((c,i)=>`<div class="row${i===0?" sel":""}" data-i="${i}"><span>${esc(c.label)}</span><span class="h">${esc(c.hint)}</span></div>`).join(""):`<div class="none">No matching command</div>`;

/* ── Holo Search — the unified omnibox: local substrate · identifier resolve · open web ── */
async function runLocalSearch(){
  const q=$("#q").value.trim();
  if(!q){ searchMode=false; render(); return; }
  searchMode=true; $("#list").innerHTML=`<div class="empty">Searching the substrate…</div>`;
  let res=[]; try{ res=await HoloFiles.searchAll(q); }catch{}
  if($("#q").value.trim()!==q) return;                 // a newer keystroke won
  items=res; sel=null; renderSearchResults(q,res); setStatus();
}
async function runEnter(){
  const q=$("#q").value.trim(); if(!q) return;
  let r=null; try{ r=await HoloFiles.resolveInput(q); }catch{}
  if(r && r.kind==="node"){ openLocation(LOCS[3]); $("#q").value=""; searchMode=false; setTimeout(()=>select(r.node),60); toast("Resolved κ → "+r.node.name); return; }
  await runWebSearch(q);
}
async function runWebSearch(q){
  searchMode=true; $("#list").innerHTML=`<div class="empty">Searching the open web no AI, every fact re-derivable…</div>`;
  let web; try{ web=await HoloFiles.webSearch(q); }catch(e){ $("#list").innerHTML=`<div class="empty"><div>Open-web search needs a connection.</div><div style="color:var(--faint);font:var(--holo-text-sm,1rem) var(--mono)">${esc(e.message||e)}</div></div>`; return; }
  renderWeb(q,web);
}
function renderSearchResults(q,res){
  const list=$("#list");
  if(!res.length){ list.innerHTML=`<div class="empty"><div>No local matches for “${esc(q)}”.</div><button class="ebtn" id="goweb">${I.globe}<span>Search the open web for “${esc(q)}”</span></button></div>`; const b=$("#goweb"); if(b) b.onclick=()=>runWebSearch(q); return; }
  const groups={}; res.forEach((n,i)=>{ (groups[n._where]=groups[n._where]||[]).push(i); });
  let html=`<div class="srhead"><span>${res.length} match${res.length===1?"":"es"} for <b>${esc(q)}</b> across Home · Cloud · Holospaces · OS Runtime</span><a id="goweb">${I.globe} search the open web ↵</a></div>`;
  for(const g of Object.keys(groups)) html+=`<div class="sgrp">${esc(g)}</div><div class="listv">`+groups[g].map(i=>rowList(res[i],i)).join("")+`</div>`;

  html+=`<div class="sgrp">Sources</div><div class="listv">`+results.slice(0,18).map((r)=>`<div class="lrow webrow" data-u="${esc(r.url||"")}"><span class="gl" style="width:18px;height:18px;color:#7cc4ff">${I.open}</span><div class="t"><div>${esc(r.name||r.title||r.url||"")}</div><div class="wsub">${esc(String(r.description||"").slice(0,130))}</div></div><span class="meta">${esc(String(r.foundBy||(r.sources&&r.sources.join(", "))||""))}</span></div>`).join("")+`</div>`;

/* ── Holo Cloud actions ─────────────────────────────────────────────────────────────── */
async function sendToCloud(n){
  if(!window.HoloWebDAV){ toast("Holo Cloud unavailable"); return; }
  const sn=(selSet.size>1&&selSet.has(n.id))?selectedNodes().filter(x=>x.kind==="file"):[n];
  toast(`Sending ${sn.length===1?n.name:sn.length+" files"} to Holo Cloud…`);
  let ok=0,last=null; for(const x of sn){ try{ last=await HoloFiles.sendToCloud(x); ok++; }catch{} }
  listCache.clear(); toast(`✓ ${ok} in Holo Cloud${(ok===1&&last)?` · ${kshort(last.did)}`:""}`);
  if(ok) osNotify({title:`${ok} file${ok===1?"":"s"} saved to Holo Cloud`, body:(ok===1?n.name:ok+" files")+" — synced across your devices.", deepLink:{kind:"address",value:"cloud"}, icon:"☁"});
}
async function copyKappa(n){
  let did=n.did;
  if(!did){ try{ const {bytes}=await HoloFiles.read(n,64*1024*1024); did="did:holo:sha256:"+await sha256hexLocal(bytes); }catch{} }
  if(!did){ toast("No content address"); return; }
  const link="holo://"+String(did).split(":").pop();
  (navigator.clipboard?navigator.clipboard.writeText(link):Promise.reject()).then(()=>toast("Copied "+link),()=>toast(link));
}
async function sha256hexLocal(bytes){ const b=await crypto.subtle.digest("SHA-256",bytes); return Array.from(new Uint8Array(b),x=>x.toString(16).padStart(2,"0")).join(""); }
function openInCloud(){ launchHolospace("cloud"); toast("Opening Holo Cloud…"); }

/* ── OS integration: raise an item in the OS Inbox (Holo Notify) from inside the app frame ────
   Files holds nothing — it asks the shell (the one notification surface) over postMessage. If
   we're running standalone (no shell), it's a no-op; the in-app toast already gave feedback. One
   bridge, reusable by every app. */
function osNotify(note){ try{ parent.postMessage({ type:"holo-notify", op:"notify", note:{
  title:String(note.title||""), body:String(note.body||""), sender:note.sender||"Files",
  severity:note.severity||"ok", icon:note.icon||"🗂", deepLink:note.deepLink||null } }, "*"); }catch(e){} }

/* ── Share by κ — the content-address superpower, made tangible ────────────────────────────────
   Any object becomes a portable, self-verifying address. A QR of holo://<κ> that anyone can scan
   and RE-DERIVE (Law L1: identity = content; Law L5: verify on receipt). Self-contained + offline:
   the QR encoder is a local module, no CDN, no server. "Save to Holo Cloud" keeps it synced across
   your devices. Nothing here claims a reach it does not have. */
async function kappaHexOf(n){
  if(n&&n.did) return String(n.did).split(":").pop();
  try{ const {bytes}=await HoloFiles.read(n, 256*1024*1024); return await sha256hexLocal(bytes); }catch{ return ""; }
}

async function askQAbout(n){

}

function loadTab(i){ if(i===activeTab||i<0||i>=tabs.length) return; snapshotTab(); activeTab=i; applyTab(); searchMode=false; const q=$("#q"); if(q) q.value=""; render(); }
function newTab(loc){ snapshotTab(); tabs.push(makeTab(loc)); activeTab=tabs.length-1; applyTab(); searchMode=false; const q=$("#q"); if(q) q.value=""; render(); }
function closeTab(i){ if(tabs.length<=1) return; snapshotTab(); tabs.splice(i,1); if(activeTab>i) activeTab--; else if(activeTab===i) activeTab=Math.min(i,tabs.length-1); applyTab(); render(); }

    if(dt.files && dt.files.length){ e.preventDefault(); const files=[...dt.files], dest=cur().path; toast(`Uploading ${files.length} file${files.length===1?"":"s"}…`); let ok=0; for(const f of files){ try{ await HoloFiles.createFile(dest, f.name, await f.arrayBuffer()); ok++; }catch{} } listCache.delete(cur().id); render(); toast(`Uploaded ${ok} file${ok===1?"":"s"} to ${cur().name}`); return; }

    +`<div class="mi sepb" data-dir="asc"><span class="mck">${sortDir>0?"✓":""}</span><span>Ascending</span></div><div class="mi" data-dir="desc"><span class="mck">${sortDir<0?"✓":""}</span><span>Descending</span></div>`
    +`<div class="mhdr sepb">Group by</div>`+grps.map(([k,l])=>`<div class="mi" data-gb="${k}"><span class="mck">${groupBy===k?"✓":""}</span><span>${l}</span></div>`).join("");
  $$("#sortmenu .mi").forEach(el=> el.onclick=(ev)=>{ ev.stopPropagation(); if(el.dataset.sk){ if(sortKey===el.dataset.sk) sortDir=-sortDir; else {sortKey=el.dataset.sk;sortDir=1;} } else if(el.dataset.dir){ sortDir=el.dataset.dir==="asc"?1:-1; } else if(el.dataset.gb){ groupBy=el.dataset.gb; try{localStorage.setItem("holo.files.group",groupBy);}catch{} } try{localStorage.setItem("holo.files.sort",sortKey+":"+sortDir);}catch{} closeSortMenu(); searchMode?runLocalSearch():render(); });
  m.style.left=Math.max(8,Math.min(rb.right-250,innerWidth-258))+"px"; m.style.top=(rb.bottom+6)+"px"; m.classList.add("on");
}
const closeSortMenu=()=>$("#sortmenu").classList.remove("on");
$("#sortBtn").onclick=(e)=>{ e.stopPropagation(); closeMenus(); $("#sortmenu").classList.contains("on")?closeSortMenu():openSortMenu(); };
addEventListener("click",closeSortMenu);

// .zip archives — extract a dropped/selected archive, or compress files into one (real DEFLATE, no CDN)
const writablePath=()=> (cur()&&cur().source==="opfs")?cur().path:"/home/user";
async function doExtract(n){ const dest=writablePath(); toast("Extracting "+n.name+"…"); try{ const r=await HoloFiles.extractZip(n,dest); listCache.clear(); (cur()&&cur().source==="opfs")?render():openLocation(LOCS[0]); toast(`✓ Extracted ${r.count} file${r.count===1?"":"s"} → ${r.folder}/`); }catch(e){ toast("Extract failed: "+(e.message||e)); } }
async function doCompress(n){ const nodes=(selSet.size>1&&selSet.has(n.id))?selectedNodes().filter(x=>x.kind==="file"):[n]; const dest=writablePath(); const name=(nodes.length===1?nodes[0].name.replace(/\.[^.]+$/,""):"archive")+".zip"; toast(`Compressing ${nodes.length} file${nodes.length===1?"":"s"}…`); try{ const r=await HoloFiles.compressToZip(nodes,dest,name); listCache.clear(); (cur()&&cur().source==="opfs")?render():openLocation(LOCS[0]); toast(`✓ ${r.name} · ${fmtBytes(r.bytes)}`); }catch(e){ toast("Compress failed: "+(e.message||e)); } }

document.body.insertAdjacentHTML("beforeend", `<div id="sortmenu"></div>`);
document.head.insertAdjacentHTML("beforeend", `<style>
#sortmenu{position:fixed;z-index:71;min-width:212px;background:#0e1422f7;border:1px solid var(--line2);border-radius:10px;padding:5px;box-shadow:0 16px 50px #000a;backdrop-filter:blur(12px);display:none} #sortmenu.on{display:block}
#sortmenu .mhdr{padding:8px 12px 4px;font:600 var(--holo-text-sm,1rem) var(--sys);text-transform:uppercase;letter-spacing:.05em;color:var(--faint)} #sortmenu .mhdr.sepb{border-top:1px solid var(--line);margin-top:4px} #sortmenu .mck{width:14px;display:inline-block;color:var(--accent)}
.grouphdr{font:600 var(--holo-text-sm,1rem) var(--sys);color:var(--faint);padding:9px 12px 3px;text-transform:uppercase;letter-spacing:.04em} .grouphdr small{font-weight:400;opacity:.7;margin-left:5px} table.det tr.grouphdr td{background:var(--bg);border:0;padding-top:11px;height:auto}
.gstat{display:inline-flex;align-items:center;gap:5px;font-size:var(--holo-text-sm,1rem)} .gdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex:0 0 auto} .st-sealed{color:var(--ok)} .st-local{color:var(--faint)}
</style>`);

/* the shell can deep-link Files to a location: ?at=home|fhs|holospaces|os|cloud|desktop
   or to a specific desktop node: ?go=desktop:<id> (folder-icon → "Open in Files"). */
const atParam = new URLSearchParams(location.search).get("at");
const goParam = new URLSearchParams(location.search).get("go");
const pickReq = new URLSearchParams(location.search).get("pick");   // the shell's Holo Files service opened us as a modal picker
const DESKTOP = LOCS[LOCS.length-1];   // the Desktop location (appended last)

/* ── picker mode: return the chosen file's bytes to the shell, which derives its κ for the app ── */
let pickMode = !!pickReq;
function choosePick(n){ if(!pickReq||!n||n.kind!=="file") return; HoloFiles.read(n, 256*1024*1024).then(({bytes,mime})=>{ try{ parent.postMessage({type:"holo-files-pick", reqId:pickReq, name:n.name, bytes, mime}, "*"); }catch(e){} }).catch(e=>toast("Couldn't read: "+(e.message||e))); }
function cancelPick(){ try{ parent.postMessage({type:"holo-files-pick", reqId:pickReq, cancel:true}, "*"); }catch(e){} }
if(pickMode){
  document.head.insertAdjacentHTML("beforeend","<style>body.pickmode #list{padding-bottom:62px}#pickbar{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--chrome,#161b22);border-top:1px solid var(--line,#30363d);z-index:60;font:var(--holo-text-sm,1rem) var(--sys,system-ui)}#pickbar .msg{color:var(--dim,#8b949e)}#pickbar button{padding:7px 16px;border-radius:9px;border:1px solid var(--line,#30363d);background:var(--bg,#0d1117);color:var(--ink,#e6edf5);cursor:pointer;font:inherit}#pickbar button.primary{background:var(--accent,#2f81f7);color:#fff;border-color:transparent;font-weight:600}</style>");
  document.body.classList.add("pickmode");
  document.body.insertAdjacentHTML("beforeend",'<div id="pickbar"><span class="msg" id="pickmsg">Choose a file to open</span><span style="flex:1"></span><button id="pickcancel">Cancel</button><button id="pickchoose" class="primary">Choose</button></div>');
  $("#pickcancel").onclick=cancelPick;
  $("#pickchoose").onclick=()=>{ if(sel && sel.kind==="file") choosePick(sel); else toast("Select a file first"); };
}

/* live unification: when the shell's desktop world changes, refresh if we're viewing Desktop */
HoloFiles.onDesktopChange(()=>{ const c=cur&&cur(); if(c && c.source==="desktop"){ listCache.clear(); render(); } });

/* ── first run: seed Home so Files opens like a native desktop ────────────────────────────
   A fresh OPFS Home is empty, which reads as "broken/empty" rather than a real file manager.
   On first run only, create the standard user folders (the ones every native Files app shows)
   plus a short welcome note. One-time + idempotent: a folder the user later deletes stays
   deleted (we never re-seed). Holo Cloud + This Hologram remain one sidebar click away. */
async function seedHome(){
  if(localStorage.getItem("holo.files.seeded")) return;
  try{
    for(const f of ["Desktop","Documents","Downloads","Pictures","Music","Videos"]){ try{ await HoloFiles.mkdir("/home/user", f); }catch{} }
    try{ await HoloFiles.createFile("/home/user/Documents","Welcome to Holo Files.txt",
      "Welcome to Holo Files — your files on Hologram OS.\n\n"+
      "Home is private, writable, and stored on this device. Every object is content-addressed (κ) and self-verifying.\n\n"+
      "From the sidebar you can also reach:\n"+
      "  • Holo Cloud — your end-to-end-encrypted cloud\n"+
      "  • This Hologram — the live OS file registry\n"+
      "  • Desktop — the holospace desktop the shell shows\n"); }catch{}
  }catch{}
  localStorage.setItem("holo.files.seeded","1");
}

/* ── boot ───────────────────────────────────────────────────────────────────────────── */
reflectView();
tabs=[makeTab()]; activeTab=0; setupDnD();
renderSide();
(async()=>{
  if(goParam && goParam.indexOf("desktop:")===0){ openLocation(DESKTOP,false); const id=goParam.slice("desktop:".length);
    setTimeout(async()=>{ try{ const kids=await childrenOf(DESKTOP); const t=kids.find(k=>k._deskId===id); if(t) drillInto(t,false); }catch(e){} }, 360); }
  else if(pickMode) openLocation(LOCS[0],false);   // picker starts in Home
  else if(atParam==="desktop") openLocation(DESKTOP,false);
  else if(atParam==="fhs") openLocation(LOCS[1],false);
  else if(atParam==="holospaces") openLocation(LOCS[2],false);
  else if(atParam==="os") openLocation(LOCS[3],false);
  else if(atParam==="cloud") openLocation(LOCS[4],false);
  else if(atParam==="homedir") openLocation(LOCS[0],false);
  else { await seedHome(); openLocation(LOCS[0],false); }   // default: Home — the native "my files" landing, populated with real folders
})();
</script>
<!-- ── Holo UI standardization — composed from CANONICAL SHELL OBJECTS ────────────────────────
       Not a per-app facade: Holo Files renders the first-party shell objects from apps/ui (Tile,
       StatusBar) BY THEIR κ, via window.HoloRender. One source of truth, themed by --holo-* tokens,
       rendered with no compile on the hot path (warm rebind is sub-ms, so the status bar re-renders
       freely). The native quick-access tiles + status spans remain as a pre-HoloRender fallback only.
       Stateful / bidirectional controls (search · views · sort · Verify) stay native by design. -->
<script type="module">
  const SHELL = {
    tile:      "holo://sha256:ff5ef77e183baa5bf9d3d25da2c20f876e652f9d9faa3fdfff444e660109b36b",
    statusbar: "holo://sha256:00304bda8f4ccddcf79d2ad1488ad25cf3ff5d8eced6bc2231728661c96530bb",
  };
  const ready = async () => { for (let i = 0; i < 160 && !window.HoloRender; i++) await new Promise((r) => setTimeout(r, 50)); return window.HoloRender || null; };
  const shieldSvg = () => { const b = document.querySelector("#status .badge svg"); return b ? b.outerHTML : ""; };

  // the Home quick-access tiles → the canonical Tile object (rebuilt one-way each Home visit; we read
  // the painted native tile so the live "N apps" count + glyph carry over, then delegate the click)
  function facadeCards() {
    const HR = window.HoloRender; if (!HR) return;
    document.querySelectorAll("#qgrid .qcard").forEach((orig) => {
      if (orig.dataset.holoUi) return; orig.dataset.holoUi = "1";
      const icon = (orig.querySelector(".qi") || {}).innerHTML || "";
      const title = (orig.querySelector(".qn") || {}).textContent || "";
      const subtitle = (orig.querySelector(".qd") || {}).textContent || "";
      const trailing = (orig.querySelector(".qx") || {}).textContent || "";
      const s = document.createElement("div"); orig.style.display = "none"; orig.after(s);
      HR.render(s, SHELL.tile, { props: { icon, title, subtitle, trailing, onClick: () => orig.click() } })
        .catch(() => { orig.style.display = ""; s.remove(); orig.dataset.holoUi = ""; });
    });
  }

  // the status bar → the canonical StatusBar object, re-rendered with fresh data on every setStatus
  async function statusRender(data) {
    const HR = window.HoloRender; if (!HR || !data) return false;
    const st = document.getElementById("status"); if (!st) return false;
    const d = data.home ? {} : data;
    try {
      await HR.render(st, SHELL.statusbar, { props: { items: d.items, folders: d.folders, files: d.files, sel: d.sel, selKappa: d.selKappa, shield: shieldSvg() } });
      if (!st.dataset.holoK) {                                // strip the app's own bar chrome ONLY once the object mounted — the StatusBar provides it
        st.dataset.holoK = "1";
        st.style.height = "auto"; st.style.minHeight = "0"; st.style.padding = "0";
        st.style.borderTop = "0"; st.style.background = "none"; st.style.gap = "0";
      }
      return true;
    } catch (e) { return false; }                            // resolve failure → the native bar (chrome + spans) stays as fallback
  }

  window.HoloFacade = { cards: facadeCards, status: statusRender };
  (async () => { const HR = await ready(); if (!HR) return; facadeCards(); if (window.__lastFilesStatus) statusRender(window.__lastFilesStatus); })();
</script>
